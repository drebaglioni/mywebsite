<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Baglioni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="homepage">
    <nav class="nav-overlay">
        <div class="logo-minimal">HOME</div>
        <div class="nav-links">
            <a href="about.html">01 About</a>
            <a href="projects.html" class="projects-gated-link" data-projects-gated="true" aria-disabled="true">02 Projects</a>
            <a href="other.html">03 Library</a>
        </div>
        <div class="projects-gate-toast" id="projectsGateToast" role="status" aria-live="polite" aria-hidden="true">
            <div class="projects-gate-title">PROJECTS ARE IN THE WORKSHOP</div>
            <div class="projects-gate-copy">Still prototyping. Try the library in the meantime.</div>
            <a href="other.html" class="projects-gate-cta">GO TO LIBRARY</a>
        </div>
    </nav>

    <main class="hero-canvas">
        <div class="quantum-layer" aria-hidden="true">
            <div id="quantumCanvasContainer"></div>
        </div>

        <aside class="info-tab">
            <div class="meta-body">
                <span class="quote-shout">&ldquo;Why does he have to shout?&rdquo; &mdash; Queen Elizabeth II</span>
            </div>
        </aside>

        <div class="type-anchor">
            <div class="display-text">ANDREA</div>
            <div class="display-text alt">BAGLIONI</div>
        </div>

        <div class="system-specs">
            BERKELEY, CA<br>
            PORTFOLIO // 2026
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const mediaReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        const gateToastAutoDismissMs = 2600;
        const blockedLinkAnimationMs = 260;
        const projectsGatedLink = document.querySelector('.projects-gated-link');
        const projectsGateToast = document.getElementById('projectsGateToast');
        const currentUrl = new URL(window.location.href);
        const quantumCanvasContainer = document.getElementById('quantumCanvasContainer');
        const typeAnchor = document.querySelector('.type-anchor');

        let gateToastTimer = null;
        const quantumState = {
            initialized: false,
            active: false,
            rafId: null,
            introStartTs: null,
            scene: null,
            camera: null,
            renderer: null,
            pointCloud: null,
            cloudMaterial: null,
            targetX: 0,
            targetY: 0,
            currentX: 0,
            currentY: 0,
            parallaxX: 0,
            parallaxY: 0
        };

        function hideProjectsGateToast() {
            if (!projectsGateToast) {
                return;
            }
            projectsGateToast.classList.remove('is-visible');
            projectsGateToast.setAttribute('aria-hidden', 'true');
        }

        function showProjectsGateToast() {
            if (!projectsGateToast) {
                return;
            }

            if (gateToastTimer !== null) {
                window.clearTimeout(gateToastTimer);
            }

            projectsGateToast.classList.add('is-visible');
            projectsGateToast.setAttribute('aria-hidden', 'false');
            gateToastTimer = window.setTimeout(() => {
                hideProjectsGateToast();
                gateToastTimer = null;
            }, gateToastAutoDismissMs);
        }

        function resetTypeParallax() {
            quantumState.parallaxX = 0;
            quantumState.parallaxY = 0;
            if (typeAnchor) {
                typeAnchor.style.transform = '';
            }
        }

        function initQuantumHero() {
            if (quantumState.initialized || !window.THREE || !quantumCanvasContainer) {
                return;
            }

            const THREE = window.THREE;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 160);
            camera.position.set(4.4, 0.0, 22.5);

            const renderer = new THREE.WebGLRenderer({
                alpha: true,
                antialias: true,
                powerPreference: 'high-performance'
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.domElement.setAttribute('aria-hidden', 'true');
            quantumCanvasContainer.appendChild(renderer.domElement);

            const geometry = new THREE.TorusKnotGeometry(6.0, 1.85, 520, 96);
            geometry.scale(1.18, 1.34, 0.94);
            const vertexCount = geometry.attributes.position.count;
            const seeds = new Float32Array(vertexCount);
            const sizeSeeds = new Float32Array(vertexCount);

            for (let i = 0; i < vertexCount; i += 1) {
                seeds[i] = Math.random();
                sizeSeeds[i] = Math.random();
            }

            geometry.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));
            geometry.setAttribute('aSizeSeed', new THREE.BufferAttribute(sizeSeeds, 1));

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uIntro: { value: 0 },
                    uPointer: { value: new THREE.Vector2(0, 0) }
                },
                vertexShader: `
                    uniform float uTime;
                    uniform float uIntro;
                    uniform vec2 uPointer;
                    attribute float aSeed;
                    attribute float aSizeSeed;
                    varying float vSeed;
                    varying float vDepth;

                    void main() {
                        vec3 displaced = position;
                        float pulse = sin((uTime * 0.72) + aSeed * 6.2831 + position.y * 0.09);
                        float shimmer = cos((uTime * 0.93) + aSeed * 4.7 + position.x * 0.06);
                        displaced += normal * (pulse * 0.22 + shimmer * 0.08);
                        displaced.x += uPointer.x * (0.22 + aSeed * 0.16);
                        displaced.y += uPointer.y * (0.18 + (1.0 - aSeed) * 0.14);

                        vec4 mvPosition = modelViewMatrix * vec4(displaced, 1.0);
                        float depthScale = 38.0 / -mvPosition.z;
                        float size = (0.8 + aSizeSeed * 2.9 + sin(uTime * 1.2 + aSeed * 8.0) * 0.35) * depthScale;
                        gl_PointSize = clamp(size, 0.8, 5.2);
                        gl_Position = projectionMatrix * mvPosition;

                        vSeed = aSeed;
                        vDepth = clamp(depthScale / 7.0, 0.0, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uIntro;
                    varying float vSeed;
                    varying float vDepth;

                    void main() {
                        vec2 center = gl_PointCoord.xy - vec2(0.5);
                        float dist = length(center);
                        if (dist > 0.5) {
                            discard;
                        }

                        vec3 darkBase = vec3(0.02, 0.08, 0.30);
                        vec3 midAccent = vec3(0.03, 0.22, 0.66);
                        float blend = clamp(vSeed * 0.65 + vDepth * 0.55, 0.0, 1.0);
                        vec3 color = mix(darkBase, midAccent, blend);
                        float alpha = smoothstep(0.5, 0.0, dist) * (0.54 + vDepth * 0.34) * uIntro;
                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                depthTest: true,
                blending: THREE.NormalBlending
            });
            const pointCloud = new THREE.Points(geometry, material);
            pointCloud.position.set(2.1, 0.1, -0.8);
            pointCloud.rotation.set(0.14, 0.34, -0.12);
            scene.add(pointCloud);

            quantumState.scene = scene;
            quantumState.camera = camera;
            quantumState.renderer = renderer;
            quantumState.pointCloud = pointCloud;
            quantumState.cloudMaterial = material;
            quantumState.initialized = true;
        }

        function updateQuantumViewport() {
            if (!quantumState.initialized || !quantumState.camera || !quantumState.renderer) {
                return;
            }

            quantumState.camera.aspect = window.innerWidth / window.innerHeight;
            quantumState.camera.updateProjectionMatrix();
            quantumState.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
            quantumState.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function shouldEnableQuantumMotion() {
            return (
                window.innerWidth > 768 &&
                !mediaReducedMotion.matches &&
                Boolean(window.THREE) &&
                Boolean(quantumCanvasContainer)
            );
        }

        function animateQuantumHero(timestamp) {
            if (!quantumState.active || !quantumState.initialized) {
                quantumState.rafId = null;
                return;
            }

            if (quantumState.introStartTs === null) {
                quantumState.introStartTs = timestamp;
            }

            const introElapsed = (timestamp - quantumState.introStartTs) / 1000;
            const introProgress = Math.min(1, introElapsed / 1.2);
            quantumState.currentX += (quantumState.targetX - quantumState.currentX) * 0.03;
            quantumState.currentY += (quantumState.targetY - quantumState.currentY) * 0.03;

            if (quantumState.pointCloud && quantumState.cloudMaterial) {
                const rotYTarget = 0.36 + quantumState.currentX * 0.52;
                const rotXTarget = -0.08 + quantumState.currentY * 0.34;

                quantumState.pointCloud.rotation.y += (rotYTarget - quantumState.pointCloud.rotation.y) * 0.048;
                quantumState.pointCloud.rotation.x += (rotXTarget - quantumState.pointCloud.rotation.x) * 0.048;
                quantumState.pointCloud.rotation.z += 0.0009;
                quantumState.pointCloud.position.x = 2.1 + quantumState.currentX * 0.32;
                quantumState.pointCloud.position.y = 0.1 + quantumState.currentY * 0.24;
                quantumState.cloudMaterial.uniforms.uTime.value = timestamp * 0.001;
                quantumState.cloudMaterial.uniforms.uIntro.value = introProgress;
                quantumState.cloudMaterial.uniforms.uPointer.value.set(quantumState.currentX, quantumState.currentY);
            }

            if (typeAnchor) {
                const targetParallaxX = -quantumState.currentX * 4.5;
                const targetParallaxY = -quantumState.currentY * 4.5;
                quantumState.parallaxX += (targetParallaxX - quantumState.parallaxX) * 0.07;
                quantumState.parallaxY += (targetParallaxY - quantumState.parallaxY) * 0.07;
                typeAnchor.style.transform = `translate3d(${quantumState.parallaxX.toFixed(2)}px, ${quantumState.parallaxY.toFixed(2)}px, 0)`;
            }

            if (quantumState.renderer && quantumState.scene && quantumState.camera) {
                quantumState.renderer.render(quantumState.scene, quantumState.camera);
            }

            quantumState.rafId = requestAnimationFrame(animateQuantumHero);
        }

        function updateMotionState() {
            const shouldEnable = shouldEnableQuantumMotion();
            document.body.classList.toggle('is-quantum-active', shouldEnable);

            if (shouldEnable && !quantumState.initialized) {
                initQuantumHero();
                updateQuantumViewport();
            }

            quantumState.active = shouldEnable && quantumState.initialized;

            if (!quantumState.active) {
                if (quantumState.rafId !== null) {
                    cancelAnimationFrame(quantumState.rafId);
                    quantumState.rafId = null;
                }
                quantumState.introStartTs = null;
                quantumState.targetX = 0;
                quantumState.targetY = 0;
                quantumState.currentX = 0;
                quantumState.currentY = 0;
                resetTypeParallax();
                return;
            }

            if (quantumState.rafId === null) {
                quantumState.rafId = requestAnimationFrame(animateQuantumHero);
            }
        }

        document.addEventListener('pointermove', (event) => {
            if (!quantumState.active) {
                return;
            }
            quantumState.targetX = (event.clientX / window.innerWidth - 0.5) * 2;
            quantumState.targetY = (event.clientY / window.innerHeight - 0.5) * 2;
        }, { passive: true });

        document.addEventListener('visibilitychange', updateMotionState);
        window.addEventListener('resize', () => {
            updateQuantumViewport();
            updateMotionState();
        }, { passive: true });

        if (typeof mediaReducedMotion.addEventListener === 'function') {
            mediaReducedMotion.addEventListener('change', updateMotionState);
        } else if (typeof mediaReducedMotion.addListener === 'function') {
            mediaReducedMotion.addListener(updateMotionState);
        }

        if (projectsGatedLink) {
            projectsGatedLink.addEventListener('click', (event) => {
                event.preventDefault();
                showProjectsGateToast();

                if (!mediaReducedMotion.matches) {
                    projectsGatedLink.classList.remove('is-blocked-hit');
                    void projectsGatedLink.offsetWidth;
                    projectsGatedLink.classList.add('is-blocked-hit');
                    window.setTimeout(() => {
                        projectsGatedLink.classList.remove('is-blocked-hit');
                    }, blockedLinkAnimationMs);
                }
            });
        }

        if (currentUrl.searchParams.get('projects') === 'locked') {
            showProjectsGateToast();
            currentUrl.searchParams.delete('projects');
            window.history.replaceState({}, '', currentUrl.pathname + currentUrl.search + currentUrl.hash);
        }

        updateMotionState();
    </script>
</body>
</html>
