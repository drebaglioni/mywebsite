<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrea Baglioni</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="homepage">
    <nav class="nav-overlay">
        <div class="logo-minimal">HOME</div>
        <div class="nav-links">
            <a href="about.html">01 About</a>
            <a href="projects.html">02 Projects</a>
            <a href="other.html">03 Library</a>
        </div>
    </nav>

    <main class="hero-canvas">
        <div class="geo-layer">
            <div class="shape shape-circle s1"></div>
            <div class="shape s2"></div>
            <div class="shape shape-circle s3"></div>
        </div>

        <aside class="info-tab">
            <div class="meta-header">Profile // 01</div>
            <div class="meta-body">
                <span class="quote-shout">&ldquo;Why does he have to shout?&rdquo; &mdash; Queen Elizabeth II</span>
            </div>
            <div class="meta-footer">
                Currently available for selected collaborations.
            </div>
        </aside>

        <div class="type-anchor">
            <div class="display-text">ANDREA</div>
            <div class="display-text alt">BAGLIONI</div>
        </div>

        <div class="system-specs">
            BERKELEY, CA<br>
            PORTFOLIO // 2026
        </div>
    </main>

    <script>
        const frictionBlue = 0.06;
        const frictionCircleOne = 0.09;
        const frictionCircleTwo = 0.07;
        const mediaReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        let targetX = 0;
        let targetY = 0;

        let currentX_Blue = 0;
        let currentY_Blue = 0;
        let currentX_CircleOne = 0;
        let currentY_CircleOne = 0;
        let currentX_CircleTwo = 0;
        let currentY_CircleTwo = 0;

        const blue = document.querySelector('.s2');
        const circleOne = document.querySelector('.s1');
        const circleTwo = document.querySelector('.s3');

        let animationFrameId = null;
        let motionEnabled = false;

        function setTransforms() {
            if (blue) {
                blue.style.transform = `translate(${currentX_Blue}px, ${currentY_Blue}px)`;
            }

            if (circleOne) {
                circleOne.style.transform = `translate(${currentX_CircleOne}px, ${currentY_CircleOne}px)`;
            }

            if (circleTwo) {
                circleTwo.style.transform = `translate(${currentX_CircleTwo}px, ${currentY_CircleTwo}px)`;
            }
        }

        function animate() {
            if (!motionEnabled) {
                animationFrameId = null;
                return;
            }

            const blueX = targetX * -25;
            const blueY = targetY * -30;
            currentX_Blue += (blueX - currentX_Blue) * frictionBlue;
            currentY_Blue += (blueY - currentY_Blue) * frictionBlue;

            const circleOneX = targetX * 50;
            const circleOneY = targetY * 45;
            currentX_CircleOne += (circleOneX - currentX_CircleOne) * frictionCircleOne;
            currentY_CircleOne += (circleOneY - currentY_CircleOne) * frictionCircleOne;

            const circleTwoX = targetX * 35;
            const circleTwoY = targetY * 55;
            currentX_CircleTwo += (circleTwoX - currentX_CircleTwo) * frictionCircleTwo;
            currentY_CircleTwo += (circleTwoY - currentY_CircleTwo) * frictionCircleTwo;

            setTransforms();
            animationFrameId = requestAnimationFrame(animate);
        }

        function updateMotionState() {
            motionEnabled = window.innerWidth > 768 && !mediaReducedMotion.matches && !document.hidden;

            if (!motionEnabled) {
                targetX = 0;
                targetY = 0;
            }

            if (motionEnabled && animationFrameId === null) {
                animationFrameId = requestAnimationFrame(animate);
            }
        }

        document.addEventListener('mousemove', (e) => {
            if (!motionEnabled) {
                return;
            }
            targetX = (e.clientX / window.innerWidth - 0.5) * 2;
            targetY = (e.clientY / window.innerHeight - 0.5) * 2;
        }, { passive: true });

        document.addEventListener('visibilitychange', updateMotionState);
        window.addEventListener('resize', updateMotionState, { passive: true });
        if (typeof mediaReducedMotion.addEventListener === 'function') {
            mediaReducedMotion.addEventListener('change', updateMotionState);
        } else if (typeof mediaReducedMotion.addListener === 'function') {
            mediaReducedMotion.addListener(updateMotionState);
        }

        setTransforms();
        updateMotionState();
    </script>
</body>
</html>
