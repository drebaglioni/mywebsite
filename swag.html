<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swag — Studio Baglioni</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">

    <style>
        html {
            scroll-snap-type: y proximity;
            scroll-padding-top: 64px;
            scroll-behavior: smooth;
        }

        :root {
            --swag-bg: #EFE7DD;
            --swag-paper: #EFE7DD;
            --swag-ink: #2b2622;
            --swag-rule: rgba(43, 38, 34, 0.10);
            --swag-mute: rgba(43, 38, 34, 0.50);
        }

        body.swag-page {
            margin: 0;
            background: var(--swag-bg);
            color: var(--swag-ink);
            font-family: "Newsreader", Georgia, "Times New Roman", serif;
            font-feature-settings: "ss01" on, "liga" on;
            -webkit-font-smoothing: antialiased;
            line-height: 1.45;
        }

        body.swag-page .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: var(--swag-bg);
            z-index: 100;
        }

        body.swag-page .logo-minimal {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.16em;
            color: var(--swag-ink);
            text-decoration: none;
        }

        body.swag-page .nav-links {
            display: flex;
            gap: 26px;
        }

        body.swag-page .nav-links a {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--swag-ink);
            text-decoration: none;
            opacity: 0.62;
            transition: opacity 240ms ease;
        }

        body.swag-page .nav-links a:hover,
        body.swag-page .nav-links a:focus-visible {
            opacity: 1;
        }

        body.swag-page .nav-links a[aria-current="page"] {
            opacity: 1;
            text-decoration: underline;
            text-underline-offset: 5px;
            text-decoration-thickness: 1px;
        }

        body.swag-page main { padding-top: 0; }

        .swag-collection { display: flex; flex-direction: column; }

        .swag-spread {
            min-height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 3fr) minmax(280px, 1fr);
            gap: clamp(40px, 6vw, 96px);
            padding: 88px clamp(32px, 6vw, 80px) 64px;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            isolation: isolate;
        }

        .swag-stage-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 1;
            pointer-events: none;
            mix-blend-mode: normal;
            filter: saturate(0.92) contrast(1.18);
        }

        .swag-imagery {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .swag-hero {
            position: relative;
            aspect-ratio: 4 / 5;
            max-height: clamp(420px, 78vh, 920px);
            max-width: 100%;
            background: var(--hero-bg, var(--swag-paper));
            overflow: hidden;
            transition: background-color 360ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        .swag-hero img {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1), opacity 240ms ease;
        }

        .swag-hero:hover img { transform: scale(1.02); }

        .swag-hero.is-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--swag-mute);
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            text-align: center;
            padding: 24px;
        }

        .swag-hero.is-empty > span {
            position: relative;
            z-index: 4;
        }

        .swag-view-toggle {
            display: inline-flex;
            align-items: baseline;
            gap: 0;
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--swag-mute);
        }

        .swag-view-toggle button {
            background: none;
            border: none;
            font: inherit;
            color: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            padding: 8px 6px;
            cursor: pointer;
            transition: color 200ms ease;
        }

        .swag-view-toggle button[aria-pressed="true"] {
            color: var(--swag-ink);
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 1px;
        }

        .swag-view-toggle .toggle-divider {
            color: var(--swag-mute);
            opacity: 0.5;
            padding: 0 2px;
        }

        .swag-view-toggle button:disabled {
            opacity: 0.28;
            cursor: not-allowed;
            text-decoration: none !important;
        }

        .swag-view-toggle button:not(:disabled):hover { color: var(--swag-ink); }

        .swag-spec {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 22px;
            max-width: 360px;
        }

        .swag-edition {
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.20em;
            text-transform: uppercase;
            color: var(--swag-mute);
            margin: 0;
        }

        .swag-name {
            font-family: "Newsreader", Georgia, serif;
            font-weight: 400;
            font-size: clamp(40px, 5vw, 72px);
            line-height: 0.96;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .swag-subtitle {
            font-family: "Newsreader", Georgia, serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(15px, 1.3vw, 18px);
            color: var(--swag-mute);
            margin: -10px 0 0;
        }

        .swag-caption {
            font-family: "Newsreader", Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: clamp(17px, 1.45vw, 22px);
            line-height: 1.4;
            color: var(--swag-ink);
            margin: 0;
            max-width: 30ch;
        }

        .swag-datasheet {
            margin: 0;
            display: grid;
            grid-template-columns: max-content 1fr;
            row-gap: 6px;
            column-gap: 18px;
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            line-height: 1.55;
        }

        .swag-datasheet dt {
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--swag-mute);
        }

        .swag-datasheet dd {
            margin: 0;
            color: var(--swag-ink);
        }

        .swag-colorways {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .swag-colorways-label {
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--swag-mute);
        }

        .swag-colorways-label strong {
            color: var(--swag-ink);
            font-weight: 500;
        }

        .swag-swatches {
            display: flex;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .swag-swatches li { display: inline-flex; }

        .swag-swatch {
            width: 14px;
            height: 14px;
            border-radius: 999px;
            border: none;
            padding: 0;
            cursor: pointer;
            background: var(--dot, #ccc);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
            transition: transform 200ms ease, box-shadow 200ms ease;
        }

        .swag-swatch:hover { transform: translateY(-1px); }

        .swag-swatch[aria-pressed="true"] {
            box-shadow: 0 0 0 2px var(--swag-bg), 0 0 0 3px var(--swag-ink);
        }

        .swag-cta {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 4px;
        }

        .swag-buy {
            font-family: "Newsreader", Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: 17px;
            color: var(--swag-ink);
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-thickness: 1px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: text-decoration-thickness 180ms ease;
        }

        .swag-buy:hover { text-decoration-thickness: 2px; }

        .swag-status {
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--swag-mute);
        }

        .swag-closing {
            min-height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 36px;
            padding: 120px 24px;
            text-align: center;
            box-sizing: border-box;
        }

        .swag-closing-eyebrow {
            font-family: "IBM Plex Mono", monospace;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--swag-mute);
            margin: 0;
        }

        .swag-closing-line {
            font-family: "Newsreader", Georgia, serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(26px, 3.4vw, 48px);
            line-height: 1.25;
            max-width: 22ch;
            color: var(--swag-ink);
            margin: 0;
            letter-spacing: -0.01em;
        }

        .swag-closing-contact {
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--swag-ink);
            text-decoration: underline;
            text-underline-offset: 5px;
            text-decoration-thickness: 1px;
        }

        @media (max-width: 860px) {
            html { scroll-snap-type: none; }

            .swag-spread {
                grid-template-columns: 1fr;
                gap: 36px;
                padding: 96px 24px 56px;
                min-height: auto;
            }

            .swag-spec { max-width: 100%; }

            .swag-closing { min-height: auto; padding: 96px 24px; }
        }

        @media (max-width: 560px) {
            body.swag-page .nav-overlay {
                padding: 0 18px;
                height: 56px;
            }

            body.swag-page .nav-links { gap: 14px; }

            body.swag-page .nav-links a { font-size: 10.5px; letter-spacing: 0.12em; }

            html { scroll-padding-top: 56px; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; scroll-snap-type: none; }

            .swag-hero,
            .swag-hero img,
            .swag-swatch,
            .swag-buy,
            .swag-view-toggle button {
                transition: none;
            }

            .swag-hero:hover img { transform: none; }

            .swag-stage-canvas {
                opacity: 0.44;
                filter: saturate(0.8) contrast(0.98);
            }
        }
    </style>
</head>
<body class="swag-page">
    <nav class="nav-overlay" aria-label="Primary">
        <a class="logo-minimal" href="index.html">HOME</a>
        <div class="nav-links">
            <a href="about.html">01 About</a>
            <a href="projects.html" class="projects-gated-link" data-projects-gated="true" aria-disabled="true">02 Projects</a>
            <a href="other.html">03 Library</a>
            <a href="swag.html" aria-current="page">04 Swag</a>
        </div>
    </nav>

    <main>
        <section class="swag-collection" id="swag-collection" aria-live="polite"></section>

        <section class="swag-closing">
            <p class="swag-closing-eyebrow">Studio Baglioni — Berkeley</p>
            <p class="swag-closing-line">Sampling closes summer '26. Write to the studio to inquire ahead of release.</p>
            <a class="swag-closing-contact" href="mailto:aristotlecheckmate@gmail.com">aristotlecheckmate@gmail.com ↗</a>
        </section>
    </main>

    <template id="swag-spread-template">
        <article class="swag-spread">
            <canvas class="swag-stage-canvas" data-stage-canvas aria-hidden="true"></canvas>
            <div class="swag-imagery">
                <div class="swag-hero" data-hero>
                    <img alt="" data-hero-img>
                </div>
                <div class="swag-view-toggle" role="group" aria-label="View">
                    <button type="button" data-view="front" aria-pressed="true">Front</button>
                    <span class="toggle-divider" aria-hidden="true">·</span>
                    <button type="button" data-view="back" aria-pressed="false">Back</button>
                </div>
            </div>
            <div class="swag-spec">
                <p class="swag-edition" data-edition></p>
                <h2 class="swag-name" data-name></h2>
                <p class="swag-subtitle" data-subtitle></p>
                <p class="swag-caption" data-caption></p>
                <dl class="swag-datasheet">
                    <dt>Material</dt><dd data-material></dd>
                    <dt>Build</dt><dd data-construction></dd>
                    <dt>Sizes</dt><dd data-sizes></dd>
                </dl>
                <div class="swag-colorways">
                    <div class="swag-colorways-label">Colorway · <strong data-active-colorway></strong></div>
                    <ul class="swag-swatches" data-swatches role="listbox" aria-label="Choose colorway"></ul>
                </div>
                <div class="swag-cta" data-cta></div>
            </div>
        </article>
    </template>

    <script src="scripts/swag.js" defer></script>
</body>
</html>
