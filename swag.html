<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swag / Studio Baglioni</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        html {
            scroll-behavior: smooth;
            scroll-snap-type: y proximity;
            scroll-padding-top: 72px;
        }

        body.swag-page {
            --swag-black: #080806;
            --swag-ink: #11110d;
            --swag-cream: #f2ead7;
            --swag-paper: #e6dcc7;
            --swag-blue: #1238ff;
            --swag-orange: #ff4f00;
            --swag-rule: rgba(8, 8, 6, 0.22);
            --swag-soft-rule: rgba(242, 234, 215, 0.18);

            margin: 0;
            background: var(--swag-black);
            color: var(--swag-cream);
            font-family: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.05;
            overflow-x: hidden;
            cursor: default !important;
        }

        body.swag-page::before { display: none; }

        body.swag-page a,
        body.swag-page button {
            cursor: pointer !important;
        }

        body.swag-page .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            display: grid;
            grid-template-columns: minmax(120px, 1fr) auto;
            align-items: center;
            gap: 24px;
            padding: 0 clamp(18px, 3vw, 42px);
            background: rgba(8, 8, 6, 0.92);
            color: var(--swag-cream);
            border-bottom: 1px solid var(--swag-soft-rule);
            backdrop-filter: blur(14px);
            z-index: 100;
        }

        body.swag-page .logo-minimal,
        body.swag-page .nav-links a {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--swag-cream);
        }

        body.swag-page .logo-minimal {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        body.swag-page .logo-minimal::before {
            content: "";
            width: 48px;
            height: 12px;
            background:
                linear-gradient(
                    90deg,
                    var(--swag-orange) 0 12px,
                    transparent 12px 18px,
                    var(--swag-blue) 18px 30px,
                    transparent 30px 36px,
                    var(--swag-cream) 36px 48px
                );
            flex: 0 0 auto;
        }

        body.swag-page .nav-links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: clamp(12px, 2vw, 28px);
            min-width: 0;
        }

        body.swag-page .nav-links a {
            opacity: 0.62;
            white-space: nowrap;
            transition: color 160ms ease, opacity 160ms ease;
        }

        body.swag-page .nav-links a:hover,
        body.swag-page .nav-links a:focus-visible {
            color: var(--swag-orange);
            opacity: 1;
            outline: none;
        }

        body.swag-page .nav-links a[aria-current="page"] {
            color: var(--swag-orange);
            opacity: 1;
        }

        body.swag-page main {
            min-height: 100vh;
            padding-top: 72px;
        }

        .swag-collection {
            display: flex;
            flex-direction: column;
        }

        .swag-spread {
            --piece-accent: var(--swag-orange);
            --piece-backdrop: #1b2133;
            min-height: calc(100vh - 72px);
            scroll-snap-align: start;
            position: relative;
            display: grid;
            grid-template-columns: minmax(92px, 10vw) minmax(0, 1.04fr) minmax(380px, 0.64fr);
            gap: clamp(18px, 2.6vw, 44px);
            align-items: stretch;
            padding: clamp(18px, 3vw, 42px);
            overflow: hidden;
            isolation: isolate;
            background:
                linear-gradient(90deg, rgba(255, 79, 0, 0.16) 0 1px, transparent 1px 100%),
                linear-gradient(0deg, rgba(242, 234, 215, 0.08) 0 1px, transparent 1px 100%),
                radial-gradient(circle at 80% 16%, color-mix(in oklab, var(--piece-accent) 38%, transparent) 0%, transparent 34%),
                var(--swag-black);
            background-size: 42px 42px, 42px 42px, auto, auto;
        }

        .swag-spread:nth-child(even) {
            grid-template-columns: minmax(92px, 10vw) minmax(380px, 0.64fr) minmax(0, 1.04fr);
        }

        .swag-stage-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.9;
            pointer-events: none;
            image-rendering: pixelated;
            mix-blend-mode: screen;
        }

        .swag-index-rail {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
            border-right: 1px solid var(--swag-soft-rule);
            padding-right: clamp(14px, 1.8vw, 26px);
        }

        .swag-edition {
            margin: 0;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(22px, 4.6vw, 72px);
            font-weight: 700;
            letter-spacing: 0;
            color: var(--piece-accent);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .swag-system-label {
            margin: 0;
            max-width: 10ch;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1.45;
            text-transform: uppercase;
            color: rgba(242, 234, 215, 0.66);
        }

        .swag-imagery {
            position: relative;
            z-index: 3;
            display: grid;
            grid-template-rows: auto auto;
            align-self: center;
            min-width: 0;
            background:
                linear-gradient(135deg, #d8d6ce 0%, #f0eee8 100%);
            box-shadow: inset 0 0 0 1px rgba(242, 234, 215, 0.18);
            overflow: visible;
        }

        .swag-imagery::before,
        .swag-imagery::after {
            content: "";
            position: absolute;
            pointer-events: none;
            z-index: 6;
            image-rendering: pixelated;
        }

        .swag-imagery::before {
            top: -12px;
            left: -12px;
            width: min(190px, 22vw);
            height: min(210px, 24vw);
            background:
                linear-gradient(var(--piece-accent), var(--piece-accent)) 0 0 / 24px 24px no-repeat,
                linear-gradient(rgba(242, 234, 215, 0.72), rgba(242, 234, 215, 0.72)) 36px 0 / 12px 12px no-repeat,
                linear-gradient(rgba(242, 234, 215, 0.45), rgba(242, 234, 215, 0.45)) 0 48px / 36px 12px no-repeat,
                linear-gradient(rgba(18, 56, 255, 0.68), rgba(18, 56, 255, 0.68)) 60px 24px / 18px 18px no-repeat,
                linear-gradient(rgba(242, 234, 215, 0.34), rgba(242, 234, 215, 0.34)) 24px 84px / 12px 48px no-repeat,
                linear-gradient(rgba(8, 8, 6, 0.8), rgba(8, 8, 6, 0.8)) 72px 72px / 36px 36px no-repeat;
        }

        .swag-imagery::after {
            right: -10px;
            bottom: 46px;
            width: min(170px, 20vw);
            height: min(160px, 18vw);
            background:
                linear-gradient(var(--piece-accent), var(--piece-accent)) right bottom / 42px 18px no-repeat,
                linear-gradient(rgba(242, 234, 215, 0.5), rgba(242, 234, 215, 0.5)) right 42px bottom 30px / 18px 54px no-repeat,
                linear-gradient(rgba(18, 56, 255, 0.54), rgba(18, 56, 255, 0.54)) right 72px bottom 0 / 30px 30px no-repeat,
                linear-gradient(rgba(8, 8, 6, 0.84), rgba(8, 8, 6, 0.84)) right 18px bottom 72px / 54px 18px no-repeat;
        }

        .swag-spread:nth-child(even) .swag-imagery {
            grid-column: 3;
            grid-row: 1;
        }

        .swag-hero {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            padding: clamp(16px, 2.2vw, 34px);
            overflow: hidden;
            background: #e7e5de;
            clip-path: polygon(
                0 28px,
                28px 28px,
                28px 0,
                calc(100% - 64px) 0,
                calc(100% - 64px) 16px,
                100% 16px,
                100% calc(100% - 86px),
                calc(100% - 22px) calc(100% - 86px),
                calc(100% - 22px) 100%,
                54px 100%,
                54px calc(100% - 24px),
                0 calc(100% - 24px)
            );
        }

        .swag-hero::before {
            content: "";
            position: absolute;
            inset: clamp(14px, 2vw, 30px);
            border: 1px solid rgba(242, 234, 215, 0.22);
            box-shadow:
                -14px -14px 0 -8px var(--piece-accent),
                18px -18px 0 -11px rgba(242, 234, 215, 0.72),
                22px 22px 0 -14px rgba(18, 56, 255, 0.62);
            z-index: 2;
            pointer-events: none;
        }

        .swag-hero::after {
            content: "";
            position: absolute;
            left: -10%;
            right: -10%;
            bottom: -22%;
            height: 42%;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.52) 0%, transparent 64%);
            z-index: 1;
            pointer-events: none;
        }

        .swag-hero img {
            position: relative;
            z-index: 2;
            width: auto;
            max-width: 100%;
            height: auto;
            min-height: 0;
            max-height: clamp(420px, 58vh, 660px);
            object-fit: contain;
            background: #f2f2f0;
            display: block;
            filter: contrast(1.08) saturate(0.94);
            transition: transform 560ms cubic-bezier(0.22, 1, 0.36, 1), filter 240ms ease;
        }

        .swag-hero:hover img {
            transform: scale(1.018);
            filter: contrast(1.12) saturate(1);
        }

        .swag-hero.is-empty {
            min-height: clamp(420px, 68vh, 780px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: rgba(242, 234, 215, 0.76);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1.45;
            text-align: center;
            text-transform: uppercase;
        }

        .swag-view-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid rgba(242, 234, 215, 0.12);
            background: rgba(8, 8, 6, 0.68);
        }

        .swag-view-toggle button {
            min-height: 46px;
            border: 0;
            border-right: 1px solid rgba(242, 234, 215, 0.14);
            background: transparent;
            color: rgba(242, 234, 215, 0.88);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            transition: background-color 160ms ease, color 160ms ease;
        }

        .swag-view-toggle button:last-child { border-right: 0; }

        .swag-view-toggle button:not([aria-pressed="true"]) {
            background: rgba(242, 234, 215, 0.08);
        }

        .swag-view-toggle button:disabled {
            color: rgba(242, 234, 215, 0.25);
            cursor: not-allowed !important;
        }

        .swag-view-toggle button:not(:disabled):hover {
            color: var(--swag-black);
            background: var(--swag-cream);
        }

        .swag-view-toggle button[aria-pressed="true"] {
            background: #101010;
            color: var(--swag-cream);
            box-shadow: inset 0 0 0 1px rgba(242, 234, 215, 0.54);
        }

        .toggle-divider { display: none; }

        .swag-spec {
            position: relative;
            z-index: 3;
            display: grid;
            grid-template-rows: auto auto auto auto;
            gap: 14px;
            align-self: center;
            min-width: 0;
            color: var(--swag-cream);
            background: transparent;
            border: 0;
            box-shadow: none;
        }

        .swag-spread:nth-child(even) .swag-spec {
            grid-column: 2;
            grid-row: 1;
        }

        .swag-spec-header {
            position: relative;
            width: calc(100% + clamp(34px, 4.4vw, 68px));
            margin-left: calc(clamp(34px, 4.4vw, 68px) * -1);
            padding: clamp(16px, 2.2vw, 28px);
            background: var(--swag-cream);
            color: var(--swag-black);
            border: 2px solid var(--swag-black);
            box-shadow: 10px 10px 0 color-mix(in oklab, var(--piece-accent) 86%, #000 14%);
            clip-path: polygon(
                0 0,
                calc(100% - 26px) 0,
                calc(100% - 26px) 14px,
                100% 14px,
                100% 100%,
                18px 100%,
                18px calc(100% - 12px),
                0 calc(100% - 12px)
            );
        }

        .swag-spec-header::after {
            content: "";
            position: absolute;
            right: 18px;
            bottom: 16px;
            width: 88px;
            height: 34px;
            background:
                linear-gradient(var(--swag-black), var(--swag-black)) 0 0 / 8px 34px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 14px 0 / 4px 34px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 24px 0 / 12px 34px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 44px 0 / 5px 34px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 58px 0 / 15px 34px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 82px 0 / 6px 34px no-repeat;
            opacity: 0.18;
            pointer-events: none;
        }

        .swag-kicker {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin: 0 0 clamp(14px, 1.7vw, 22px);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1.3;
            text-transform: uppercase;
        }

        .swag-name {
            margin: 0;
            font-size: clamp(54px, 7.2vw, 112px);
            font-weight: 700;
            letter-spacing: 0;
            line-height: 0.76;
            text-transform: uppercase;
            overflow-wrap: anywhere;
        }

        .swag-subtitle {
            display: inline-block;
            margin: 14px 0 0;
            padding: 7px 9px;
            max-width: 22ch;
            background: var(--swag-black);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            line-height: 1.35;
            text-transform: uppercase;
            color: var(--swag-cream);
        }

        .swag-caption {
            margin: 0;
            padding: clamp(16px, 2vw, 24px);
            width: min(100%, 31ch);
            justify-self: end;
            background: var(--swag-black);
            color: var(--swag-cream);
            border: 2px solid var(--swag-cream);
            box-shadow: -8px 8px 0 color-mix(in oklab, var(--piece-accent) 76%, #000 24%);
            font-size: clamp(19px, 1.8vw, 28px);
            font-weight: 700;
            letter-spacing: 0;
            line-height: 1.02;
            transform: rotate(-1.2deg) translateX(10px);
        }

        .swag-datasheet {
            position: relative;
            margin: 0;
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 4px;
            align-content: start;
            width: min(100%, 440px);
            padding: 12px;
            background: var(--swag-black);
            color: var(--swag-cream);
            border: 2px solid var(--swag-cream);
            box-shadow: 7px 7px 0 color-mix(in oklab, var(--piece-accent) 74%, #000 26%);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            transform: translateX(-16px);
        }

        .swag-datasheet::before {
            content: "TECHNICAL DOSSIER";
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            min-height: 28px;
            padding: 0 8px;
            background: var(--piece-accent);
            color: var(--swag-black);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.16em;
            line-height: 1;
            text-transform: uppercase;
        }

        .swag-datasheet::after {
            content: "";
            position: absolute;
            top: 18px;
            right: 18px;
            width: 78px;
            height: 16px;
            background:
                linear-gradient(var(--swag-black), var(--swag-black)) 0 0 / 4px 16px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 9px 0 / 8px 16px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 24px 0 / 3px 16px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 34px 0 / 11px 16px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 52px 0 / 5px 16px no-repeat,
                linear-gradient(var(--swag-black), var(--swag-black)) 66px 0 / 12px 16px no-repeat;
            opacity: 0.72;
            pointer-events: none;
        }

        .swag-datasheet dt,
        .swag-datasheet dd {
            min-height: 48px;
            margin: 0;
            padding: 11px 12px;
            font-size: 10px;
            line-height: 1.35;
        }

        .swag-datasheet dt {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--swag-cream);
            color: var(--swag-black);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-align: center;
            text-transform: uppercase;
        }

        .swag-datasheet dd {
            display: block;
            min-width: 0;
            background: rgba(242, 234, 215, 0.1);
            border: 1px solid rgba(242, 234, 215, 0.18);
            color: var(--swag-cream);
            font-weight: 700;
            overflow-wrap: anywhere;
            word-break: normal;
        }

        .swag-controls {
            display: grid;
            gap: 12px;
            grid-template-columns: minmax(0, 1fr);
        }

        .swag-colorways {
            display: grid;
            gap: 12px;
            width: min(88%, 390px);
            justify-self: end;
            padding: 14px 16px;
            background: var(--swag-cream);
            color: var(--swag-black);
            border: 2px solid var(--swag-black);
            box-shadow: 6px 6px 0 color-mix(in oklab, var(--piece-accent) 84%, #000 16%);
            transform: rotate(1deg);
        }

        .swag-colorways-label {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1.3;
            text-transform: uppercase;
        }

        .swag-colorways-label strong {
            font: inherit;
            color: var(--piece-accent);
            text-align: right;
        }

        .swag-swatches {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .swag-swatches li { min-width: 0; }

        .swag-swatch {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 2px solid var(--swag-black);
            background: var(--dot, #999);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
            transition: transform 150ms ease, box-shadow 150ms ease;
        }

        .swag-swatch::after {
            content: "";
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(8, 8, 6, 0.42);
        }

        .swag-swatch:hover {
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--swag-black);
        }

        .swag-swatch[aria-pressed="true"] {
            box-shadow: 0 0 0 3px var(--piece-accent);
        }

        .swag-cta {
            display: grid;
            min-height: 58px;
            width: min(100%, 430px);
            justify-self: start;
        }

        .swag-buy,
        .swag-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 58px;
            padding: 0 16px;
            background: var(--piece-accent);
            color: var(--swag-black);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            line-height: 1.3;
            text-decoration: none;
            text-transform: uppercase;
        }

        .swag-buy::after,
        .swag-status::after {
            content: "+";
            color: var(--swag-black);
            font-size: 22px;
            line-height: 1;
        }

        .swag-buy:hover {
            background: var(--swag-cream);
            color: var(--swag-black);
        }

        .swag-buy:hover::after { color: var(--swag-black); }

        .swag-closing {
            min-height: calc(100vh - 72px);
            scroll-snap-align: start;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(260px, 420px);
            align-items: end;
            gap: clamp(24px, 5vw, 80px);
            padding: clamp(28px, 5vw, 72px);
            background:
                linear-gradient(90deg, rgba(255, 79, 0, 0.24) 0 1px, transparent 1px 100%),
                linear-gradient(0deg, rgba(242, 234, 215, 0.1) 0 1px, transparent 1px 100%),
                var(--swag-black);
            background-size: 42px 42px;
            border-top: 1px solid var(--swag-soft-rule);
        }

        .swag-closing-eyebrow {
            margin: 0 0 18px;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.14em;
            line-height: 1.4;
            text-transform: uppercase;
            color: var(--swag-orange);
        }

        .swag-closing-line {
            margin: 0;
            max-width: 11ch;
            font-size: clamp(64px, 11vw, 168px);
            font-weight: 700;
            letter-spacing: 0;
            line-height: 0.78;
            text-transform: uppercase;
        }

        .swag-closing-contact {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            min-height: 76px;
            padding: 0 20px;
            border: 2px solid var(--swag-cream);
            color: var(--swag-cream);
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            line-height: 1.4;
            text-decoration: none;
            text-transform: uppercase;
            word-break: break-word;
        }

        .swag-closing-contact:hover {
            border-color: var(--swag-orange);
            background: var(--swag-orange);
            color: var(--swag-black);
        }

        @media (max-width: 1080px) {
            .swag-spread,
            .swag-spread:nth-child(even) {
                grid-template-columns: minmax(64px, 0.16fr) minmax(0, 1fr);
                gap: 18px;
            }

            .swag-imagery,
            .swag-spread:nth-child(even) .swag-imagery,
            .swag-spec,
            .swag-spread:nth-child(even) .swag-spec {
                grid-column: 2;
            }

            .swag-imagery,
            .swag-spread:nth-child(even) .swag-imagery {
                grid-row: 1;
            }

            .swag-spec,
            .swag-spread:nth-child(even) .swag-spec {
                grid-row: 2;
            }

            .swag-index-rail {
                grid-row: 1 / span 2;
            }

            .swag-hero img {
                min-height: clamp(440px, 62vh, 720px);
            }
        }

        @media (max-width: 680px) {
            html {
                scroll-snap-type: none;
                scroll-padding-top: 58px;
            }

            body.swag-page .nav-overlay {
                height: 58px;
                grid-template-columns: auto minmax(0, 1fr);
                gap: 12px;
                padding: 0 14px;
            }

            body.swag-page .logo-minimal,
            body.swag-page .nav-links a {
                font-size: 9px;
                letter-spacing: 0.09em;
            }

            body.swag-page .logo-minimal {
                width: auto;
                overflow: visible;
                white-space: nowrap;
            }

            body.swag-page .logo-minimal::before {
                width: 35px;
                height: 9px;
                background:
                    linear-gradient(
                        90deg,
                        var(--swag-orange) 0 9px,
                        transparent 9px 13px,
                        var(--swag-blue) 13px 22px,
                        transparent 22px 26px,
                        var(--swag-cream) 26px 35px
                    );
            }

            body.swag-page .nav-links {
                justify-content: flex-end;
                gap: 9px;
            }

            body.swag-page .nav-links a {
                display: none;
            }

            body.swag-page .nav-links::after {
                content: "04 SWAG";
                position: fixed;
                top: 25px;
                left: 118px;
                color: var(--swag-orange);
                font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.09em;
                line-height: 1;
                text-transform: uppercase;
            }

            body.swag-page main { padding-top: 58px; }

            .swag-spread,
            .swag-spread:nth-child(even) {
                min-height: auto;
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 14px;
                background-size: 28px 28px, 28px 28px, auto, auto;
            }

            .swag-index-rail {
                grid-column: 1;
                grid-row: 1;
                min-height: 54px;
                display: grid;
                grid-template-columns: auto 1fr;
                align-items: center;
                gap: 18px;
                border-right: 0;
                border-bottom: 1px solid var(--swag-soft-rule);
                padding: 0 0 14px;
            }

            .swag-edition {
                writing-mode: horizontal-tb;
                transform: none;
                font-size: 34px;
            }

            .swag-system-label {
                display: none;
            }

            .swag-imagery,
            .swag-spread:nth-child(even) .swag-imagery,
            .swag-spec,
            .swag-spread:nth-child(even) .swag-spec {
                grid-column: 1;
                min-width: 0;
                max-width: 100%;
                box-sizing: border-box;
            }

            .swag-imagery,
            .swag-spread:nth-child(even) .swag-imagery {
                grid-row: 2;
                overflow: hidden;
            }

            .swag-imagery::before {
                top: -6px;
                left: -6px;
                width: 108px;
                height: 120px;
                background:
                    linear-gradient(var(--piece-accent), var(--piece-accent)) 0 0 / 18px 18px no-repeat,
                    linear-gradient(rgba(242, 234, 215, 0.64), rgba(242, 234, 215, 0.64)) 28px 0 / 10px 10px no-repeat,
                    linear-gradient(rgba(18, 56, 255, 0.58), rgba(18, 56, 255, 0.58)) 44px 20px / 14px 14px no-repeat,
                    linear-gradient(rgba(242, 234, 215, 0.32), rgba(242, 234, 215, 0.32)) 0 42px / 34px 10px no-repeat;
            }

            .swag-imagery::after {
                right: -4px;
                bottom: 44px;
                width: 92px;
                height: 92px;
                background:
                    linear-gradient(var(--piece-accent), var(--piece-accent)) right bottom / 28px 12px no-repeat,
                    linear-gradient(rgba(242, 234, 215, 0.42), rgba(242, 234, 215, 0.42)) right 32px bottom 22px / 12px 34px no-repeat,
                    linear-gradient(rgba(18, 56, 255, 0.42), rgba(18, 56, 255, 0.42)) right 48px bottom 0 / 18px 18px no-repeat;
            }

            .swag-hero {
                padding: 14px;
                clip-path: polygon(
                    0 18px,
                    18px 18px,
                    18px 0,
                    calc(100% - 38px) 0,
                    calc(100% - 38px) 10px,
                    100% 10px,
                    100% calc(100% - 42px),
                    calc(100% - 14px) calc(100% - 42px),
                    calc(100% - 14px) 100%,
                    34px 100%,
                    34px calc(100% - 14px),
                    0 calc(100% - 14px)
                );
            }

            .swag-spec,
            .swag-spread:nth-child(even) .swag-spec {
                grid-row: 3;
                align-self: stretch;
                gap: 12px;
                box-shadow: none;
            }

            .swag-spec-header {
                width: auto;
                margin-left: 0;
                padding: 18px;
                box-shadow: 6px 6px 0 color-mix(in oklab, var(--piece-accent) 86%, #000 14%);
            }

            .swag-spec-header::after {
                width: 58px;
                height: 24px;
                right: 14px;
                bottom: 12px;
                background:
                    linear-gradient(var(--swag-black), var(--swag-black)) 0 0 / 6px 24px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 11px 0 / 3px 24px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 20px 0 / 9px 24px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 36px 0 / 4px 24px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 48px 0 / 10px 24px no-repeat;
            }

            .swag-hero img {
                min-height: 0;
                height: auto;
                max-height: min(58vh, 440px);
            }

            .swag-view-toggle button {
                min-height: 46px;
                font-size: 10px;
            }

            .swag-kicker {
                margin-bottom: 18px;
                font-size: 9px;
            }

            .swag-kicker span:last-child {
                display: none;
            }

            .swag-name {
                font-size: clamp(56px, 19vw, 86px);
            }

            .swag-subtitle {
                font-size: 10px;
            }

            .swag-caption {
                width: auto;
                justify-self: stretch;
                max-width: 100%;
                box-sizing: border-box;
                padding: 18px;
                font-size: 24px;
                transform: none;
                box-shadow: 6px 6px 0 color-mix(in oklab, var(--piece-accent) 76%, #000 24%);
            }

            .swag-datasheet {
                grid-template-columns: 1fr;
                width: auto;
                max-width: 100%;
                box-sizing: border-box;
                transform: none;
                padding: 10px;
                box-shadow: 6px 6px 0 color-mix(in oklab, var(--piece-accent) 74%, #000 26%);
            }

            .swag-datasheet::before {
                min-height: 26px;
                padding-right: 88px;
                font-size: 9px;
                letter-spacing: 0.12em;
            }

            .swag-datasheet::after {
                top: 15px;
                right: 15px;
                width: 62px;
                height: 14px;
                background:
                    linear-gradient(var(--swag-black), var(--swag-black)) 0 0 / 4px 14px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 8px 0 / 6px 14px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 21px 0 / 3px 14px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 30px 0 / 9px 14px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 46px 0 / 4px 14px no-repeat,
                    linear-gradient(var(--swag-black), var(--swag-black)) 56px 0 / 6px 14px no-repeat;
            }

            .swag-datasheet dt,
            .swag-datasheet dd {
                min-height: 52px;
                padding: 10px;
            }

            .swag-datasheet dt {
                font-size: 9px;
                min-height: 34px;
                justify-content: flex-start;
                padding-left: 12px;
            }

            .swag-datasheet dd {
                font-size: 9px;
                min-height: auto;
                padding: 12px;
                white-space: normal;
            }

            .swag-swatches {
                grid-template-columns: repeat(auto-fit, minmax(36px, 1fr));
            }

            .swag-colorways,
            .swag-cta {
                width: auto;
                justify-self: stretch;
                max-width: 100%;
                box-sizing: border-box;
                transform: none;
            }

            .swag-closing {
                min-height: auto;
                grid-template-columns: 1fr;
                align-items: start;
                padding: 80px 18px;
                background-size: 28px 28px;
            }

            .swag-closing-line {
                max-width: 9ch;
                font-size: clamp(58px, 22vw, 104px);
            }
        }

        @media (max-width: 430px) {
            body.swag-page .nav-links a {
                font-size: 8px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
                scroll-snap-type: none;
            }

            .swag-hero img,
            .swag-swatch,
            .swag-buy,
            .swag-view-toggle button {
                transition: none;
            }

            .swag-hero:hover img {
                transform: none;
            }

            .swag-stage-canvas {
                opacity: 0.38;
            }
        }
    </style>
</head>
<body class="swag-page">
    <nav class="nav-overlay" aria-label="Primary">
        <a class="logo-minimal" href="index.html">HOME</a>
        <div class="nav-links">
            <a href="about.html">01 About</a>
            <a href="projects.html" class="projects-gated-link" data-projects-gated="true" aria-disabled="true">02 Projects</a>
            <a href="other.html">03 Library</a>
            <a href="swag.html" aria-current="page">04 Swag</a>
        </div>
    </nav>

    <main>
        <section class="swag-collection" id="swag-collection" aria-live="polite"></section>

        <section class="swag-closing">
            <div>
                <p class="swag-closing-eyebrow">Studio Baglioni / Berkeley</p>
                <p class="swag-closing-line">Sampling closes summer 26.</p>
            </div>
            <a class="swag-closing-contact" href="mailto:aristotlecheckmate@gmail.com">aristotlecheckmate@gmail.com</a>
        </section>
    </main>

    <template id="swag-spread-template">
        <article class="swag-spread">
            <canvas class="swag-stage-canvas" data-stage-canvas aria-hidden="true"></canvas>
            <aside class="swag-index-rail" aria-hidden="true">
                <p class="swag-edition" data-edition></p>
                <p class="swag-system-label">Pixel knit field</p>
            </aside>
            <div class="swag-imagery">
                <div class="swag-hero" data-hero>
                    <img alt="" data-hero-img>
                </div>
                <div class="swag-view-toggle" role="group" aria-label="View">
                    <button type="button" data-view="front" aria-pressed="true">Front</button>
                    <span class="toggle-divider" aria-hidden="true">/</span>
                    <button type="button" data-view="back" aria-pressed="false">Back</button>
                </div>
            </div>
            <div class="swag-spec">
                <header class="swag-spec-header">
                    <p class="swag-kicker">
                        <span data-status-label></span>
                        <span data-edition-small></span>
                    </p>
                    <h2 class="swag-name" data-name></h2>
                    <p class="swag-subtitle" data-subtitle></p>
                </header>
                <p class="swag-caption" data-caption></p>
                <dl class="swag-datasheet">
                    <dt>Material</dt><dd data-material></dd>
                    <dt>Build</dt><dd data-construction></dd>
                    <dt>Sizes</dt><dd data-sizes></dd>
                </dl>
                <div class="swag-controls">
                    <div class="swag-colorways">
                        <div class="swag-colorways-label">Colorway <strong data-active-colorway></strong></div>
                        <ul class="swag-swatches" data-swatches role="listbox" aria-label="Choose colorway"></ul>
                    </div>
                    <div class="swag-cta" data-cta></div>
                </div>
            </div>
        </article>
    </template>

    <script src="scripts/swag.js" defer></script>
</body>
</html>
