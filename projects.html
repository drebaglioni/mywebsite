<!DOCTYPE html>
<html lang="en" class="projects-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <style>
        html.projects-root,
        html.projects-root body.projects-specimen {
            height: auto;
            min-height: 100%;
        }

        body.projects-specimen {
            --paper: #f4ebcd;
            --paper-dark: #e4d7b0;
            --blue: #06459e;
            --blue-ink: #052c73;
            --blue-soft: rgba(6, 69, 158, 0.18);
            --blue-faint: rgba(6, 69, 158, 0.08);

            min-height: 100%;
            background: var(--paper);
            color: var(--blue);
            overflow: hidden;
            cursor: default !important;
        }

        body.projects-specimen::before {
            display: none;
        }

        body.projects-specimen a {
            cursor: pointer !important;
        }

        .specimen-sheet {
            min-height: 100vh;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            background:
                linear-gradient(90deg, var(--blue-faint) 1px, transparent 1px),
                linear-gradient(var(--blue-faint) 1px, transparent 1px),
                radial-gradient(circle at 46% 43%, rgba(6, 69, 158, 0.12) 0 1px, transparent 1.25px) 0 0 / 8px 8px,
                var(--paper);
            background-size: 4.8vw 4.8vw, 4.8vw 4.8vw, 8px 8px, auto;
        }

        .specimen-sheet::before,
        .specimen-sheet::after {
            content: "";
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        .specimen-sheet::before {
            inset: 18px;
            border: 1px solid rgba(6, 69, 158, 0.18);
        }

        .specimen-sheet::after {
            display: none;
        }

        .pixel-field {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            opacity: 0.44;
            pointer-events: none;
            mix-blend-mode: multiply;
            mask-image: radial-gradient(ellipse at 50% 48%, transparent 0 20%, rgba(0, 0, 0, 0.32) 29%, #000 46%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 48%, transparent 0 20%, rgba(0, 0, 0, 0.32) 29%, #000 46%);
        }

        .site-nav {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            height: 48px;
            padding: 0 30px;
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: lowercase;
        }

        .site-nav a {
            color: var(--blue);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-size: inherit;
            line-height: 1;
            text-transform: lowercase;
        }

        .site-nav a:hover,
        .site-nav a:focus-visible,
        .site-nav a[aria-current="page"] {
            background: var(--blue);
            color: var(--paper);
            outline: none;
        }

        .figure-field {
            position: relative;
            z-index: 5;
            min-height: calc(100vh - 48px);
        }

        .subject {
            position: absolute;
            z-index: 8;
            left: 50%;
            top: 51%;
            width: min(30vw, 390px);
            transform: translate(-50%, -50%);
            opacity: 0.94;
            filter: grayscale(1) sepia(1) saturate(8) hue-rotate(178deg) brightness(0.68) contrast(1.9);
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        .fold-fragment {
            position: absolute;
            z-index: 5;
            width: min(31vw, 450px);
            opacity: 0.48;
            filter: grayscale(1) sepia(1) saturate(9) hue-rotate(179deg) brightness(0.82) contrast(1.65);
            mix-blend-mode: multiply;
            pointer-events: none;
            transform-origin: 42% 46%;
        }

        .fold-fragment.fragment-a {
            left: 4vw;
            top: 21vh;
            transform: rotate(-8deg);
        }

        .fold-fragment.fragment-b {
            right: 4vw;
            bottom: 12vh;
            transform: scaleX(-1) rotate(6deg);
            opacity: 0.42;
        }

        .diagram-lines {
            position: absolute;
            inset: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mask-image: radial-gradient(ellipse at 50% 50%, transparent 0 23%, rgba(0, 0, 0, 0.18) 32%, #000 52%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, transparent 0 23%, rgba(0, 0, 0, 0.18) 32%, #000 52%);
        }

        .diagram-lines path,
        .diagram-lines circle {
            fill: none;
            stroke: var(--blue);
            stroke-width: 1.2;
            vector-effect: non-scaling-stroke;
        }

        .diagram-lines .parametric {
            opacity: 0.25;
        }

        .diagram-lines .primary-curve {
            opacity: 0.42;
            stroke-width: 1.4;
        }

        .diagram-lines .soft-curve {
            opacity: 0.16;
        }

        .project-node {
            position: absolute;
            z-index: 12;
            display: block;
            width: max-content;
            max-width: calc(100vw - 56px);
            color: var(--blue);
            text-decoration: none;
            isolation: isolate;
        }

        .project-node.vault {
            left: 6vw;
            top: 16vh;
        }

        .project-node.library {
            right: 7vw;
            top: 21vh;
        }

        .project-node.mind {
            right: 13vw;
            bottom: 13vh;
        }

        .project-node.swag {
            left: 15vw;
            bottom: 11vh;
        }

        .project-node.half {
            left: 40vw;
            bottom: 25vh;
        }

        .node-label {
            display: inline-block;
            margin: 0 0 8px 0.35rem;
            padding: 3px 6px 4px;
            background: var(--paper);
            border: 1px solid var(--blue);
            font-family: "Courier New", Courier, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: lowercase;
        }

        .node-title {
            position: relative;
            display: block;
            padding: 0.01em 0.13em 0.08em;
            font-family: "Avenir Next Condensed", "Helvetica Neue", "Arial Narrow", Arial, sans-serif;
            font-size: clamp(3.4rem, 7vw, 7rem);
            font-weight: 900;
            line-height: 0.88;
            letter-spacing: 0.015em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .node-title::before {
            content: "";
            position: absolute;
            inset: 0.06em -0.02em 0.03em -0.02em;
            z-index: -1;
            background: rgba(244, 235, 205, 0.94);
            border: 1px solid rgba(6, 69, 158, 0.36);
            transform: rotate(var(--label-tilt, -1deg));
        }

        .project-node:hover,
        .project-node:focus-visible,
        .project-node.is-active {
            outline: none;
        }

        .project-node:hover .node-label,
        .project-node:focus-visible .node-label,
        .project-node.is-active .node-label {
            background: var(--blue);
            color: var(--paper);
        }

        .project-node:hover .node-title,
        .project-node:focus-visible .node-title,
        .project-node.is-active .node-title {
            color: var(--paper);
        }

        .project-node:hover .node-title::before,
        .project-node:focus-visible .node-title::before,
        .project-node.is-active .node-title::before {
            background: var(--blue);
            border-color: var(--blue);
        }

        .project-node:hover .node-title,
        .project-node:focus-visible .node-title,
        .project-node.is-active .node-title {
            text-decoration: underline;
            text-decoration-thickness: 0.06em;
            text-underline-offset: 0.1em;
        }

        .project-node.vault {
            --label-tilt: -1.5deg;
        }

        .project-node.library {
            --label-tilt: 1.25deg;
        }

        .project-node.mind {
            --label-tilt: -0.35deg;
        }

        .project-node.mind .node-title {
            font-size: clamp(3rem, 5.8vw, 6.35rem);
        }

        .project-node.swag {
            --label-tilt: -0.7deg;
        }

        .project-node.half {
            --label-tilt: 1deg;
        }

        .project-node.half .node-title {
            font-size: clamp(3.1rem, 6.2vw, 6.6rem);
        }

        @media (max-width: 900px) {
            body.projects-specimen {
                overflow: auto;
            }

            .specimen-sheet {
                min-height: 100svh;
            }

            .site-nav {
                display: flex;
                height: 44px;
                width: 100%;
                padding: 0 10px;
                gap: clamp(18px, 9vw, 42px);
                font-size: 7px;
                justify-content: flex-start;
            }

            .figure-field {
                min-height: calc(100svh - 44px);
            }

            .subject {
                left: 55vw;
                top: 50vh;
                bottom: auto;
                width: min(56vw, 245px);
                transform: translate(-50%, -48%);
                opacity: 0.58;
            }

            .fold-fragment {
                width: 69vw;
                opacity: 0.28;
            }

            .fold-fragment.fragment-a {
                left: -18vw;
                top: 22vh;
                transform: rotate(-9deg);
            }

            .fold-fragment.fragment-b {
                right: -26vw;
                bottom: 14vh;
                transform: scaleX(-1) rotate(7deg);
            }

            .project-node {
                width: max-content;
                max-width: calc(100vw - 32px);
            }

            .project-node.vault {
                left: 7vw;
                top: 14vh;
            }

            .project-node.library {
                left: 18vw;
                right: auto;
                top: 34vh;
            }

            .project-node.mind {
                left: 7vw;
                right: auto;
                bottom: 29vh;
            }

            .project-node.swag {
                left: 22vw;
                bottom: 10vh;
            }

            .project-node.half {
                left: 11vw;
                bottom: 18vh;
            }

            .node-label {
                font-size: 9px;
                margin-bottom: 6px;
            }

            .node-title {
                font-size: clamp(2.6rem, 12.4vw, 4rem);
                line-height: 0.92;
            }

            .project-node.mind .node-title {
                font-size: clamp(2rem, 9.7vw, 3.35rem);
            }

            .project-node.half .node-title {
                font-size: clamp(2.2rem, 10.4vw, 3.55rem);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .pixel-field {
                opacity: 0.48;
            }
        }
    </style>
</head>
<body class="projects-specimen">
    <main class="specimen-sheet">
        <canvas class="pixel-field" id="pixelField" aria-hidden="true"></canvas>

        <nav class="site-nav" aria-label="Primary">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
            <a href="projects.html" aria-current="page">projects</a>
            <a href="other.html">library</a>
            <a href="swag.html">swag</a>
        </nav>

        <section class="figure-field" aria-label="Projects">
            <img class="fold-fragment fragment-a" src="assets/images/projects/folded-mask.png" alt="">
            <img class="fold-fragment fragment-b" src="assets/images/projects/folded-mask.png" alt="">
            <img class="subject" src="assets/images/projects/dark-figure.png" alt="">

            <svg class="diagram-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <path class="primary-curve" id="primaryCurve"></path>
                <path class="parametric soft-curve" id="secondaryCurve"></path>
                <path class="parametric soft-curve" id="tertiaryCurve"></path>
            </svg>

            <a class="project-node vault is-active" data-project="vault" href="https://vault.drebaglioni.com" target="_blank" rel="noopener noreferrer">
                <span class="node-label">vault.drebaglioni.com</span><br>
                <span class="node-title">The Vault</span>
            </a>

            <a class="project-node library" data-project="library" href="other.html">
                <span class="node-label">other.html</span><br>
                <span class="node-title">Library</span>
            </a>

            <a class="project-node mind" data-project="mind" href="https://mind.drebaglioni.com" target="_blank" rel="noopener noreferrer">
                <span class="node-label">mind.drebaglioni.com</span><br>
                <span class="node-title">My Actual Mind</span>
            </a>

            <a class="project-node swag" data-project="swag" href="swag.html">
                <span class="node-label">swag.html</span><br>
                <span class="node-title">Swag</span>
            </a>

            <a class="project-node half" data-project="half" href="https://sf-half-course-atlas.a-baglioni.chatgpt.site" target="_blank" rel="noopener noreferrer">
                <span class="node-label">sf-half-course-atlas</span><br>
                <span class="node-title">SF Half</span>
            </a>
        </section>
    </main>

    <script>
        const nodes = Array.from(document.querySelectorAll(".project-node"));
        const canvas = document.getElementById("pixelField");
        const ctx = canvas.getContext("2d");
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
        const primaryCurve = document.getElementById("primaryCurve");
        const secondaryCurve = document.getElementById("secondaryCurve");
        const tertiaryCurve = document.getElementById("tertiaryCurve");

        const projectState = {
            vault: { x: 0.18, y: 0.2, phase: 0 },
            library: { x: 0.52, y: 0.43, phase: Math.PI * 0.62 },
            mind: { x: 0.72, y: 0.72, phase: Math.PI * 1.58 },
            swag: { x: 0.25, y: 0.77, phase: Math.PI * 1.14 },
            half: { x: 0.46, y: 0.68, phase: Math.PI * 1.86 }
        };

        const pixelState = {
            active: "vault",
            width: 0,
            height: 0,
            dpr: 1,
            frame: 0,
            points: []
        };

        function resizeCanvas() {
            pixelState.dpr = Math.min(window.devicePixelRatio || 1, 2);
            pixelState.width = window.innerWidth;
            pixelState.height = window.innerHeight;
            canvas.width = Math.floor(pixelState.width * pixelState.dpr);
            canvas.height = Math.floor(pixelState.height * pixelState.dpr);
            canvas.style.width = `${pixelState.width}px`;
            canvas.style.height = `${pixelState.height}px`;
            ctx.setTransform(pixelState.dpr, 0, 0, pixelState.dpr, 0, 0);
            buildPoints();
        }

        function buildPoints() {
            const count = Math.floor(Math.min(1180, Math.max(520, pixelState.width * pixelState.height / 1800)));
            pixelState.points = [];

            for (let i = 0; i < count; i += 1) {
                const t = i / count;
                const theta = t * Math.PI * 2;
                const band = (i % 5) - 2;
                const lissajousX = Math.sin(3 * theta + Math.PI / 5) * 0.31;
                const lissajousY = Math.sin(2 * theta) * 0.22;
                pixelState.points.push({
                    x: 0.5 + lissajousX + band * 0.012,
                    y: 0.5 + lissajousY - band * 0.009,
                    s: 1 + (i % 3),
                    p: theta,
                    v: 0.45 + (i % 13) * 0.045
                });
            }
        }

        function buildParametricPath(cx, cy, rx, ry, phase = 0, loops = 1, steps = 180) {
            let path = "";
            for (let i = 0; i <= steps; i += 1) {
                const t = (i / steps) * Math.PI * 2 * loops;
                const x = cx + Math.sin(3 * t + phase) * rx;
                const y = cy + Math.sin(2 * t) * ry;
                path += `${i === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)} `;
            }
            return path.trim();
        }

        function drawDiagramPaths() {
            primaryCurve.setAttribute("d", buildParametricPath(50, 50, 37, 22, Math.PI / 5, 1.08, 280));
            secondaryCurve.setAttribute("d", buildParametricPath(50, 50, 31, 17, Math.PI * 0.62, 1.08, 280));
            tertiaryCurve.setAttribute("d", buildParametricPath(50, 50, 43, 27, Math.PI * 1.14, 1.08, 280));
        }

        function drawPixels() {
            ctx.clearRect(0, 0, pixelState.width, pixelState.height);
            ctx.fillStyle = "#06459e";

            const target = projectState[pixelState.active] || projectState.vault;
            const time = reducedMotion.matches ? 0 : pixelState.frame * 0.02;

            pixelState.points.forEach((point, index) => {
                const phaseWave = Math.sin(point.p * 3 + target.phase + time * point.v);
                const pullX = (target.x - point.x) * 0.08;
                const pullY = (target.y - point.y) * 0.08;
                const jitterX = phaseWave * 0.012;
                const jitterY = Math.cos(point.p * 2 + target.phase + time * 0.7) * 0.014;
                const x = (point.x + pullX + jitterX) * pixelState.width;
                const y = (point.y + pullY + jitterY) * pixelState.height;
                const snap = index % 7 === 0 ? 8 : 4;
                const px = Math.round(x / snap) * snap;
                const py = Math.round(y / snap) * snap;

                if (index % 11 === 0) {
                    ctx.fillRect(px, py, point.s * 5, point.s);
                } else {
                    ctx.fillRect(px, py, point.s, point.s);
                }
            });

            pixelState.frame += 1;
            window.requestAnimationFrame(drawPixels);
        }

        function setActive(projectKey) {
            const project = projectState[projectKey];
            if (!project) {
                return;
            }

            pixelState.active = projectKey;
            nodes.forEach((node) => {
                node.classList.toggle("is-active", node.dataset.project === projectKey);
            });
        }

        nodes.forEach((node) => {
            node.addEventListener("mouseenter", () => setActive(node.dataset.project));
            node.addEventListener("focus", () => setActive(node.dataset.project));
        });

        window.addEventListener("resize", resizeCanvas, { passive: true });
        drawDiagramPaths();
        resizeCanvas();
        drawPixels();
    </script>
</body>
</html>
