<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Index</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="library-page">
    <main class="library-layout">
        <aside class="library-sidebar">
            <a class="library-home-link" href="index.html">HOME</a>

            <header class="library-header">
                <h1>Library<br>Index</h1>
                <span class="library-volume">Vol. 01</span>
            </header>

            <section class="filter-group" aria-label="Search">
                <label class="filter-title" for="library-search">
                    <span>Search</span>
                    <span>[TXT]</span>
                </label>
                <input id="library-search" class="search-input" type="search" placeholder="Title, author, notes..." autocomplete="off">
            </section>

            <section class="filter-group" aria-label="Subject filter">
                <div class="filter-title">
                    <span>Subject</span>
                    <span>[SBJ]</span>
                </div>
                <div class="filter-list" id="subject-filters"></div>
            </section>

            <section class="filter-group" aria-label="Year filter">
                <div class="filter-title">
                    <span>Year</span>
                    <span>[YR]</span>
                </div>
                <div class="filter-list" id="year-filters"></div>
            </section>

            <section class="filter-group" aria-label="Format filter">
                <div class="filter-title">
                    <span>Format</span>
                    <span>[FMT]</span>
                </div>
                <div class="filter-list" id="format-filters"></div>
            </section>

            <section class="filter-group" aria-label="Status filter">
                <div class="filter-title">
                    <span>Status</span>
                    <span>[STS]</span>
                </div>
                <div class="filter-list" id="status-filters"></div>
            </section>

            <section class="filter-group" aria-label="Sort options">
                <div class="filter-title">
                    <span>Sort</span>
                    <span>[ORD]</span>
                </div>
                <select id="sort-select" class="sort-select">
                    <option value="recent">Recently finished</option>
                    <option value="rating">Rating high-low</option>
                    <option value="title">Title A-Z</option>
                </select>
            </section>

            <p class="library-sync-note">Data source: <code>data/library.json</code> (synced from Obsidian export)</p>
        </aside>

        <section class="library-main">
            <div class="library-main-header">
                <h2>Reading Shelf</h2>
                <span id="result-count">0 items</span>
            </div>

            <div class="cover-grid" id="book-shelf" aria-live="polite"></div>
            <div class="library-empty" id="empty-state" hidden>No entries match your current filters.</div>
        </section>

        <aside class="library-detail" id="library-detail" aria-live="polite">
            <h3>Entry Detail</h3>
            <div id="detail-content" class="detail-content">Select an entry to see details.</div>
        </aside>
    </main>

    <script>
        const KNOWN_SUBJECT_HUES = {
            ai: 226,
            philosophy: 282,
            literature: 14,
            memory: 40
        };
        const BALANCED_HUE_WHEEL = [12, 38, 68, 96, 128, 166, 196, 222, 252, 286, 318, 346];
        const OPEN_LIBRARY_CACHE = new Map();
        const CARD_TONE_CACHE = new Map();
        const CARD_TONE_PENDING = new Map();
        const DEFAULT_CARD_TONE = {
            top: '#e9dfcf',
            bottom: '#d7cab5'
        };

        const state = {
            items: [],
            itemById: new Map(),
            selectedId: null,
            filterOptions: null,
            renderScheduled: false,
            filters: {
                subjects: new Set(),
                years: new Set(),
                formats: new Set(),
                statuses: new Set(),
                search: '',
                sort: 'recent'
            }
        };

        const refs = {
            subjectFilters: document.getElementById('subject-filters'),
            yearFilters: document.getElementById('year-filters'),
            formatFilters: document.getElementById('format-filters'),
            statusFilters: document.getElementById('status-filters'),
            sortSelect: document.getElementById('sort-select'),
            searchInput: document.getElementById('library-search'),
            shelf: document.getElementById('book-shelf'),
            count: document.getElementById('result-count'),
            empty: document.getElementById('empty-state'),
            detail: document.getElementById('detail-content')
        };

        function normalizeText(value) {
            return (value || '').toString().trim();
        }

        function escapeHtml(value) {
            return normalizeText(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeAttr(value) {
            return escapeHtml(value)
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function capitalize(value) {
            return value
                .split('-')
                .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
        }

        function isAudioFormat(item) {
            return item.format === 'podcast' || item.format === 'audiobook';
        }

        function hashCode(input) {
            let hash = 0;
            for (let i = 0; i < input.length; i += 1) {
                hash = ((hash << 5) - hash) + input.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function clamp(min, value, max) {
            return Math.max(min, Math.min(value, max));
        }

        function normalizedSubject(value) {
            return normalizeText(value).toLowerCase().replace(/\s+/g, '-');
        }

        function hexToRgb(hexColor) {
            const hex = normalizeText(hexColor).replace('#', '');
            if (!/^[a-fA-F0-9]{6}$/.test(hex)) {
                return null;
            }
            return {
                r: parseInt(hex.slice(0, 2), 16),
                g: parseInt(hex.slice(2, 4), 16),
                b: parseInt(hex.slice(4, 6), 16)
            };
        }

        function getRelativeLuminance(hexColor) {
            const rgb = hexToRgb(hexColor);
            if (!rgb) {
                return null;
            }

            const [r, g, b] = [rgb.r, rgb.g, rgb.b].map((channel) => {
                const normalized = channel / 255;
                return normalized <= 0.03928
                    ? normalized / 12.92
                    : Math.pow((normalized + 0.055) / 1.055, 2.4);
            });

            return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        }

        function hslToHex(h, s, l) {
            const saturation = clamp(0, s, 100) / 100;
            const lightness = clamp(0, l, 100) / 100;
            const hue = ((h % 360) + 360) % 360;

            const c = (1 - Math.abs(2 * lightness - 1)) * saturation;
            const x = c * (1 - Math.abs(((hue / 60) % 2) - 1));
            const m = lightness - c / 2;

            let rPrime = 0;
            let gPrime = 0;
            let bPrime = 0;

            if (hue < 60) {
                rPrime = c;
                gPrime = x;
            } else if (hue < 120) {
                rPrime = x;
                gPrime = c;
            } else if (hue < 180) {
                gPrime = c;
                bPrime = x;
            } else if (hue < 240) {
                gPrime = x;
                bPrime = c;
            } else if (hue < 300) {
                rPrime = x;
                bPrime = c;
            } else {
                rPrime = c;
                bPrime = x;
            }

            const toHex = (value) => {
                const channel = Math.round((value + m) * 255);
                return channel.toString(16).padStart(2, '0');
            };

            return '#' + toHex(rPrime) + toHex(gPrime) + toHex(bPrime);
        }

        function rgbToHex(r, g, b) {
            const toHex = (value) => clamp(0, Math.round(value), 255).toString(16).padStart(2, '0');
            return '#' + toHex(r) + toHex(g) + toHex(b);
        }

        function rgbToHsl(r, g, b) {
            const red = clamp(0, r, 255) / 255;
            const green = clamp(0, g, 255) / 255;
            const blue = clamp(0, b, 255) / 255;

            const max = Math.max(red, green, blue);
            const min = Math.min(red, green, blue);
            const delta = max - min;

            let hue = 0;
            if (delta !== 0) {
                if (max === red) {
                    hue = ((green - blue) / delta) % 6;
                } else if (max === green) {
                    hue = ((blue - red) / delta) + 2;
                } else {
                    hue = ((red - green) / delta) + 4;
                }
            }
            hue = Math.round((hue * 60 + 360) % 360);

            const lightness = (max + min) / 2;
            const saturation = delta === 0 ? 0 : delta / (1 - Math.abs(2 * lightness - 1));

            return {
                h: hue,
                s: saturation * 100,
                l: lightness * 100
            };
        }

        function buildCardToneFromHex(hexColor) {
            const rgb = hexToRgb(hexColor);
            if (!rgb) {
                return {
                    top: DEFAULT_CARD_TONE.top,
                    bottom: DEFAULT_CARD_TONE.bottom
                };
            }

            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            const softenedSaturation = clamp(6, hsl.s * 0.36, 24);
            const topLightness = clamp(82, 72 + hsl.l * 0.2, 92);
            const bottomLightness = clamp(74, topLightness - 8, 86);

            return {
                top: hslToHex(hsl.h, softenedSaturation, topLightness),
                bottom: hslToHex(hsl.h, Math.min(30, softenedSaturation + 2), bottomLightness)
            };
        }

        function extractDominantColorFromImage(urlValue) {
            const url = normalizeText(urlValue);
            if (!url) {
                return Promise.resolve('');
            }

            return new Promise((resolve) => {
                const image = new Image();
                let settled = false;

                const finish = (value) => {
                    if (settled) {
                        return;
                    }
                    settled = true;
                    resolve(value || '');
                };

                const timeoutId = setTimeout(() => finish(''), 4500);

                image.crossOrigin = 'anonymous';
                image.referrerPolicy = 'no-referrer';
                image.decoding = 'async';

                image.onerror = () => {
                    clearTimeout(timeoutId);
                    finish('');
                };

                image.onload = () => {
                    clearTimeout(timeoutId);
                    try {
                        const sampleSize = 24;
                        const canvas = document.createElement('canvas');
                        canvas.width = sampleSize;
                        canvas.height = sampleSize;
                        const context = canvas.getContext('2d', { willReadFrequently: true });
                        if (!context) {
                            finish('');
                            return;
                        }

                        context.drawImage(image, 0, 0, sampleSize, sampleSize);
                        const imageData = context.getImageData(0, 0, sampleSize, sampleSize).data;

                        function aggregate(allowExtremes) {
                            let sumR = 0;
                            let sumG = 0;
                            let sumB = 0;
                            let sumWeight = 0;

                            for (let i = 0; i < imageData.length; i += 4) {
                                const alpha = imageData[i + 3] / 255;
                                if (alpha < 0.45) {
                                    continue;
                                }

                                const red = imageData[i];
                                const green = imageData[i + 1];
                                const blue = imageData[i + 2];
                                const max = Math.max(red, green, blue);
                                const min = Math.min(red, green, blue);
                                const saturation = max === 0 ? 0 : (max - min) / max;
                                const luminance = (0.2126 * red + 0.7152 * green + 0.0722 * blue) / 255;

                                if (!allowExtremes && (luminance < 0.05 || luminance > 0.95)) {
                                    continue;
                                }

                                const weight = alpha * (0.5 + saturation * 1.4);
                                sumR += red * weight;
                                sumG += green * weight;
                                sumB += blue * weight;
                                sumWeight += weight;
                            }

                            if (sumWeight < 1) {
                                return '';
                            }

                            return rgbToHex(sumR / sumWeight, sumG / sumWeight, sumB / sumWeight);
                        }

                        const dominantColor = aggregate(false) || aggregate(true);
                        finish(dominantColor);
                    } catch (error) {
                        finish('');
                    }
                };

                image.src = url;
            });
        }

        function getSubjectHue(subjectKey) {
            const normalizedKey = normalizedSubject(subjectKey);
            if (Object.prototype.hasOwnProperty.call(KNOWN_SUBJECT_HUES, normalizedKey)) {
                return KNOWN_SUBJECT_HUES[normalizedKey];
            }
            return BALANCED_HUE_WHEEL[hashCode(normalizedKey + '-hue') % BALANCED_HUE_WHEEL.length];
        }

        function getTopicKey(item) {
            return normalizeText((item.subjects && item.subjects[0]) || item.format);
        }

        function resolveTopicBaseColor(item) {
            const hue = getSubjectHue(getTopicKey(item));
            return hslToHex(hue, 18, 38);
        }

        function requestCardToneForItem(item) {
            const coverUrl = normalizeText(item._ui.coverUrl);
            if (!coverUrl) {
                return;
            }

            if (CARD_TONE_CACHE.has(coverUrl)) {
                const cached = CARD_TONE_CACHE.get(coverUrl);
                let changed = false;
                if (item._ui.cardToneTop !== cached.top || item._ui.cardToneBottom !== cached.bottom) {
                    item._ui.cardToneTop = cached.top;
                    item._ui.cardToneBottom = cached.bottom;
                    changed = true;
                }
                if (changed) {
                    scheduleRender();
                }
                return;
            }

            if (CARD_TONE_PENDING.has(coverUrl)) {
                return;
            }

            const samplingPromise = extractDominantColorFromImage(coverUrl)
                .then((dominantColor) => {
                    const tone = buildCardToneFromHex(dominantColor || item._ui.topicColor);
                    CARD_TONE_CACHE.set(coverUrl, tone);

                    let changed = false;
                    state.items.forEach((entry) => {
                        if (normalizeText(entry._ui.coverUrl) !== coverUrl) {
                            return;
                        }
                        if (entry._ui.cardToneTop !== tone.top || entry._ui.cardToneBottom !== tone.bottom) {
                            entry._ui.cardToneTop = tone.top;
                            entry._ui.cardToneBottom = tone.bottom;
                            changed = true;
                        }
                    });

                    if (changed) {
                        scheduleRender();
                    }
                })
                .catch(() => {})
                .finally(() => {
                    CARD_TONE_PENDING.delete(coverUrl);
                });

            CARD_TONE_PENDING.set(coverUrl, samplingPromise);
        }

        function buildFallbackCoverTitle(title) {
            const normalized = normalizeText(title);
            if (normalized.length <= 42) {
                return normalized;
            }
            return normalized.slice(0, 39).trimEnd() + '...';
        }

        function buildPosterTitle(title) {
            const normalized = normalizeText(title);
            if (normalized.length <= 64) {
                return normalized;
            }
            return normalized.slice(0, 61).trimEnd() + '...';
        }

        function getSourceDomain(urlValue) {
            const raw = normalizeText(urlValue);
            if (!raw) {
                return 'SOURCE';
            }
            try {
                const domain = new URL(raw).hostname.replace(/^www\./, '');
                return domain.toUpperCase();
            } catch (error) {
                return 'SOURCE';
            }
        }

        function extractYouTubeId(urlValue) {
            const raw = normalizeText(urlValue);
            if (!raw) {
                return '';
            }

            const shortMatch = raw.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
            if (shortMatch) {
                return shortMatch[1];
            }

            const watchMatch = raw.match(/[?&]v=([A-Za-z0-9_-]{11})/);
            if (watchMatch) {
                return watchMatch[1];
            }

            const embedMatch = raw.match(/\/embed\/([A-Za-z0-9_-]{11})/);
            if (embedMatch) {
                return embedMatch[1];
            }

            return '';
        }

        function getInitialCoverUrl(rawItem) {
            const manualCover = normalizeText(rawItem.cover_image || rawItem.cover_url || rawItem.cover || rawItem.image);
            if (manualCover) {
                return manualCover;
            }

            if (rawItem.format === 'podcast') {
                const youtubeId = extractYouTubeId(rawItem.url);
                if (youtubeId) {
                    return 'https://img.youtube.com/vi/' + youtubeId + '/hqdefault.jpg';
                }
            }

            return '';
        }

        function makeBookCoverKey(item) {
            return [normalizeText(item.title).toLowerCase(), normalizeText(item._author).toLowerCase()].join('|');
        }

        async function fetchOpenLibraryCover(item) {
            const cacheKey = makeBookCoverKey(item);
            if (OPEN_LIBRARY_CACHE.has(cacheKey)) {
                return OPEN_LIBRARY_CACHE.get(cacheKey);
            }

            const query = new URLSearchParams();
            query.set('title', normalizeText(item.title));
            query.set('limit', '4');
            if (item._author && item._author.toLowerCase() !== 'unknown') {
                query.set('author', item._author);
            }

            let coverUrl = '';
            try {
                const response = await fetch('https://openlibrary.org/search.json?' + query.toString());
                if (response.ok) {
                    const payload = await response.json();
                    const docs = Array.isArray(payload.docs) ? payload.docs : [];
                    const match = docs.find((doc) => doc.cover_i || (Array.isArray(doc.isbn) && doc.isbn.length > 0));
                    if (match) {
                        if (match.cover_i) {
                            coverUrl = 'https://covers.openlibrary.org/b/id/' + String(match.cover_i) + '-L.jpg';
                        } else if (Array.isArray(match.isbn) && match.isbn.length > 0) {
                            coverUrl = 'https://covers.openlibrary.org/b/isbn/' + encodeURIComponent(match.isbn[0]) + '-L.jpg';
                        }
                    }
                }
            } catch (error) {
                coverUrl = '';
            }

            OPEN_LIBRARY_CACHE.set(cacheKey, coverUrl);
            return coverUrl;
        }

        async function hydrateMissingBookCovers(items) {
            const pending = items.filter((item) =>
                (item.format === 'book' || item.format === 'audiobook') && !normalizeText(item._ui.coverUrl)
            );

            if (pending.length === 0) {
                return;
            }

            const results = await Promise.all(pending.map(async (item) => ({
                id: item.id,
                coverUrl: await fetchOpenLibraryCover(item)
            })));

            let changed = false;
            results.forEach((result) => {
                if (!result.coverUrl) {
                    return;
                }
                const target = state.itemById.get(result.id);
                if (target && target._ui.coverUrl !== result.coverUrl) {
                    target._ui.coverUrl = result.coverUrl;
                    changed = true;
                }
            });

            if (changed) {
                scheduleRender();
            }
        }

        function isColorDark(hexColor) {
            const luminance = getRelativeLuminance(hexColor);
            if (luminance == null) {
                return false;
            }
            return luminance < 0.42;
        }

        function prepareItem(rawItem) {
            const author = normalizeText(rawItem.author) || 'Unknown';
            const subjects = Array.isArray(rawItem.subjects) ? rawItem.subjects : [];
            const primarySubject = subjects.length > 0 ? subjects[0] : rawItem.format;
            const topicColor = resolveTopicBaseColor({ subjects, format: rawItem.format });
            const cardTone = buildCardToneFromHex(topicColor);

            return {
                ...rawItem,
                _author: author,
                _primarySubject: primarySubject,
                _searchBlob: [rawItem.title, author, normalizeText(rawItem.notes)]
                    .filter(Boolean)
                    .join(' ')
                    .toLowerCase(),
                _ui: {
                    coverUrl: getInitialCoverUrl(rawItem),
                    fallbackCoverTitle: buildFallbackCoverTitle(rawItem.title),
                    posterTitle: buildPosterTitle(rawItem.title),
                    domainLabel: getSourceDomain(rawItem.url),
                    subjectDisplay: normalizeText(primarySubject).replace(/-/g, ' ').toUpperCase(),
                    topicColor,
                    cardToneTop: cardTone.top,
                    cardToneBottom: cardTone.bottom
                }
            };
        }

        function collectFilterOptions(items) {
            const subjects = new Set();
            const years = new Set();
            const formats = new Set();
            const statuses = new Set();

            items.forEach((item) => {
                item.subjects.forEach((subject) => subjects.add(subject));
                years.add(String(item.year));
                formats.add(item.format);
                statuses.add(item.status);
            });

            return {
                subjects: Array.from(subjects).sort((a, b) => a.localeCompare(b)),
                years: Array.from(years).sort((a, b) => Number(b) - Number(a)),
                formats: Array.from(formats).sort((a, b) => a.localeCompare(b)),
                statuses: Array.from(statuses).sort((a, b) => a.localeCompare(b))
            };
        }

        function buildFilterButtons(container, values, filterKey, formatLabel) {
            container.innerHTML = '';
            const fragment = document.createDocumentFragment();

            values.forEach((value) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'filter-item';
                button.dataset.value = value;
                button.dataset.filterKey = filterKey;
                const label = formatLabel ? formatLabel(value) : value;
                button.innerHTML = '<span class="filter-box" aria-hidden="true"></span>' + label;
                fragment.appendChild(button);
            });

            container.appendChild(fragment);
        }

        function updateFilterButtonState(container, filterKey) {
            container.querySelectorAll('.filter-item').forEach((button) => {
                const value = button.dataset.value;
                button.classList.toggle('active', state.filters[filterKey].has(value));
            });
        }

        function applyFilters(items) {
            const query = state.filters.search.toLowerCase();

            const filtered = items.filter((item) => {
                const subjectMatch = state.filters.subjects.size === 0 ||
                    item.subjects.some((subject) => state.filters.subjects.has(subject));

                const yearMatch = state.filters.years.size === 0 ||
                    state.filters.years.has(String(item.year));

                const formatMatch = state.filters.formats.size === 0 ||
                    state.filters.formats.has(item.format);

                const statusMatch = state.filters.statuses.size === 0 ||
                    state.filters.statuses.has(item.status);

                const searchMatch = query.length === 0 || item._searchBlob.includes(query);

                return subjectMatch && yearMatch && formatMatch && statusMatch && searchMatch;
            });

            if (state.filters.sort === 'rating') {
                filtered.sort((a, b) => {
                    const ra = a.rating == null ? -1 : a.rating;
                    const rb = b.rating == null ? -1 : b.rating;
                    if (rb !== ra) {
                        return rb - ra;
                    }
                    return a.title.localeCompare(b.title);
                });
            } else if (state.filters.sort === 'title') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else {
                filtered.sort((a, b) => {
                    const da = a.finished || '';
                    const db = b.finished || '';
                    if (da !== db) {
                        return db.localeCompare(da);
                    }
                    if (b.year !== a.year) {
                        return b.year - a.year;
                    }
                    return a.title.localeCompare(b.title);
                });
            }

            return filtered;
        }

        function renderShelf(items) {
            refs.shelf.innerHTML = '';
            const fragment = document.createDocumentFragment();

            items.forEach((item, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'cover-item';
                button.dataset.id = item.id;
                button.dataset.format = item.format;
                button.title = item.title;
                button.setAttribute('aria-label', item.title);
                button.style.setProperty('--topic-accent', item._ui.topicColor);
                button.style.setProperty('--card-tint-a', item._ui.cardToneTop);
                button.style.setProperty('--card-tint-b', item._ui.cardToneBottom);

                if (state.selectedId === item.id) {
                    button.classList.add('selected');
                }
                if (isAudioFormat(item)) {
                    button.classList.add('audio-item');
                }
                if (item.format === 'article') {
                    button.classList.add('article-item');
                }

                const safeAuthor = escapeHtml(item._author);
                const safeSubject = escapeHtml(item._ui.subjectDisplay);
                const fallbackTitle = escapeHtml(item._ui.fallbackCoverTitle);
                const posterTitle = escapeHtml(item._ui.posterTitle);
                const domainLabel = escapeHtml(item._ui.domainLabel);
                const fallbackTitleAttr = escapeAttr(item._ui.fallbackCoverTitle);
                const fallbackAuthorAttr = escapeAttr(item._author);
                const fallbackSubjectAttr = escapeAttr(item._ui.subjectDisplay);
                const coverUrl = normalizeText(item._ui.coverUrl);
                const hasCover = Boolean(coverUrl);
                const useArticlePoster = item.format === 'article';
                const posterVariant = 'poster-v' + String(hashCode(item.id + '-poster') % 3);
                const loadingStrategy = index < 9 ? 'eager' : 'lazy';
                const fetchPriority = index < 4 ? 'high' : 'auto';

                let surfaceContent = '';
                if (useArticlePoster) {
                    surfaceContent = [
                        '<span class="article-poster ' + posterVariant + '">',
                            '<span class="poster-kicker">FIELD NOTE</span>',
                            '<strong class="poster-title">' + posterTitle + '</strong>',
                            '<span class="poster-chip">ARTICLE</span>',
                            '<span class="poster-rule"></span>',
                            '<span class="poster-domain">' + domainLabel + '</span>',
                            '<span class="poster-subject">' + safeSubject + '</span>',
                            '<span class="poster-orb" aria-hidden="true"></span>',
                        '</span>'
                    ].join('');
                } else if (hasCover) {
                    requestCardToneForItem(item);
                    surfaceContent = '<img class="cover-image" src="' + escapeAttr(coverUrl) + '" alt="Cover for ' + escapeAttr(item.title) + '" loading="' + loadingStrategy + '" fetchpriority="' + fetchPriority + '" decoding="async" data-fallback-title="' + fallbackTitleAttr + '" data-fallback-author="' + fallbackAuthorAttr + '" data-fallback-subject="' + fallbackSubjectAttr + '">';
                } else {
                    surfaceContent = [
                        '<span class="cover-fallback">',
                            '<strong>' + fallbackTitle + '</strong>',
                            '<small>' + safeAuthor + '</small>',
                            '<small>' + safeSubject + '</small>',
                        '</span>'
                    ].join('');
                }

                button.innerHTML = [
                    '<span class="cover-card">',
                        '<span class="cover-surface">' +
                            surfaceContent +
                            (isAudioFormat(item) ? '<span class="cover-audio-chip">AUDIO</span>' : '') +
                        '</span>',
                    '</span>'
                ].join('');

                fragment.appendChild(button);
            });

            refs.shelf.appendChild(fragment);
        }

        function renderDetail() {
            if (!state.selectedId) {
                refs.detail.textContent = 'Select an entry to see details.';
                return;
            }

            const selected = state.itemById.get(state.selectedId);
            if (!selected) {
                refs.detail.textContent = 'Select an entry to see details.';
                return;
            }

            const subjects = selected.subjects.length > 0
                ? selected.subjects.map(capitalize).join(', ')
                : 'None';
            const rating = selected.rating == null ? 'Unrated' : String(selected.rating) + '/5';
            const finished = selected.finished || 'Not set';
            const notes = normalizeText(selected.notes) || 'No notes yet.';

            let html = '';
            html += '<h4>' + selected.title + '</h4>';
            html += '<p><strong>Author:</strong> ' + selected._author + '</p>';
            html += '<p><strong>Format:</strong> ' + capitalize(selected.format) + '</p>';
            html += '<p><strong>Status:</strong> ' + capitalize(selected.status) + '</p>';
            html += '<p><strong>Year:</strong> ' + String(selected.year) + '</p>';
            html += '<p><strong>Finished:</strong> ' + finished + '</p>';
            html += '<p><strong>Rating:</strong> ' + rating + '</p>';
            html += '<p><strong>Subjects:</strong> ' + subjects + '</p>';
            html += '<p><strong>Notes:</strong> ' + notes + '</p>';

            if (selected.url) {
                html += '<a class="detail-link" href="' + selected.url + '" target="_blank" rel="noreferrer">Open Source ↗</a>';
            }

            refs.detail.innerHTML = html;
        }

        function renderNow() {
            const filtered = applyFilters(state.items);
            refs.empty.hidden = filtered.length !== 0;
            refs.count.textContent = filtered.length + (filtered.length === 1 ? ' item' : ' items');

            updateFilterButtonState(refs.subjectFilters, 'subjects');
            updateFilterButtonState(refs.yearFilters, 'years');
            updateFilterButtonState(refs.formatFilters, 'formats');
            updateFilterButtonState(refs.statusFilters, 'statuses');

            if (state.selectedId && !filtered.some((item) => item.id === state.selectedId)) {
                state.selectedId = null;
            }

            renderShelf(filtered);
            renderDetail();
        }

        function scheduleRender() {
            if (state.renderScheduled) {
                return;
            }
            state.renderScheduled = true;
            requestAnimationFrame(() => {
                state.renderScheduled = false;
                renderNow();
            });
        }

        function debounce(fn, delay) {
            let timerId = null;
            return function debounced(...args) {
                if (timerId !== null) {
                    clearTimeout(timerId);
                }
                timerId = setTimeout(() => {
                    timerId = null;
                    fn(...args);
                }, delay);
            };
        }

        async function loadLibrary() {
            try {
                const response = await fetch('data/library.json');
                if (!response.ok) {
                    throw new Error('Failed to load data/library.json (' + response.status + ')');
                }
                const data = await response.json();
                const rawItems = Array.isArray(data) ? data : [];
                state.items = rawItems.map(prepareItem);
                state.itemById = new Map(state.items.map((item) => [item.id, item]));
                state.filterOptions = collectFilterOptions(state.items);

                buildFilterButtons(refs.subjectFilters, state.filterOptions.subjects, 'subjects', capitalize);
                buildFilterButtons(refs.yearFilters, state.filterOptions.years, 'years');
                buildFilterButtons(refs.formatFilters, state.filterOptions.formats, 'formats', capitalize);
                buildFilterButtons(refs.statusFilters, state.filterOptions.statuses, 'statuses', capitalize);

                scheduleRender();
                hydrateMissingBookCovers(state.items);
            } catch (error) {
                refs.shelf.innerHTML = '';
                refs.empty.hidden = false;
                refs.empty.textContent = 'Could not load library data: ' + error.message;
                refs.detail.textContent = 'Fix data/library.json or sync from Obsidian and reload.';
            }
        }

        function onFilterClick(event) {
            const button = event.target.closest('.filter-item');
            if (!button) {
                return;
            }
            const filterKey = button.dataset.filterKey;
            const value = button.dataset.value;
            if (!filterKey || !value) {
                return;
            }
            if (state.filters[filterKey].has(value)) {
                state.filters[filterKey].delete(value);
            } else {
                state.filters[filterKey].add(value);
            }
            scheduleRender();
        }

        refs.subjectFilters.addEventListener('click', onFilterClick);
        refs.yearFilters.addEventListener('click', onFilterClick);
        refs.formatFilters.addEventListener('click', onFilterClick);
        refs.statusFilters.addEventListener('click', onFilterClick);

        refs.shelf.addEventListener('click', (event) => {
            const cover = event.target.closest('.cover-item');
            if (!cover) {
                return;
            }
            const itemId = cover.dataset.id;
            state.selectedId = state.selectedId === itemId ? null : itemId;
            scheduleRender();
        });

        refs.shelf.addEventListener('error', (event) => {
            const image = event.target.closest('.cover-image');
            if (!image) {
                return;
            }
            const fallback = image.parentElement ? image.parentElement.querySelector('.cover-fallback') : null;
            if (fallback) {
                image.remove();
                return;
            }
            const fallbackTitle = normalizeText(image.getAttribute('data-fallback-title')) || 'COVER UNAVAILABLE';
            const fallbackAuthor = normalizeText(image.getAttribute('data-fallback-author')) || 'SOURCE IMAGE FAILED';
            const fallbackSubject = normalizeText(image.getAttribute('data-fallback-subject')) || 'TRY AGAIN LATER';
            const created = document.createElement('span');
            created.className = 'cover-fallback';
            created.innerHTML = '<strong>' + escapeHtml(fallbackTitle) + '</strong><small>' + escapeHtml(fallbackAuthor) + '</small><small>' + escapeHtml(fallbackSubject) + '</small>';
            if (image.parentElement) {
                image.parentElement.appendChild(created);
            }
            image.remove();
        }, true);

        const updateSearch = debounce((value) => {
            state.filters.search = value;
            scheduleRender();
        }, 120);

        refs.searchInput.addEventListener('input', (event) => {
            updateSearch(event.target.value.toLowerCase());
        });

        refs.sortSelect.addEventListener('change', (event) => {
            state.filters.sort = event.target.value;
            scheduleRender();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && state.selectedId) {
                state.selectedId = null;
                scheduleRender();
            }
        });

        document.addEventListener('click', (event) => {
            if (!state.selectedId) {
                return;
            }

            const clickedSpine = event.target.closest('.cover-item');
            const clickedDetail = event.target.closest('.library-detail');
            if (!clickedSpine && !clickedDetail) {
                state.selectedId = null;
                scheduleRender();
            }
        });

        loadLibrary();
    </script>
</body>
</html>
