<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap');

        html {
            background: #151310;
        }

        body.about-vector {
            background:
                radial-gradient(circle at 72% 40%, rgba(47, 50, 99, 0.42) 0%, transparent 42%),
                radial-gradient(circle at 20% 85%, rgba(96, 46, 36, 0.38) 0%, transparent 34%),
                #151310;
            color: #f1e8d3;
            overflow: hidden;
            cursor: default !important;
        }

        body.about-vector::before {
            display: none;
        }

        body.about-vector a {
            cursor: pointer !important;
        }

        body.about-vector {
            --meta-size: clamp(0.74rem, 0.78vw, 0.88rem);
            --key-size: var(--meta-size);
            --value-size: clamp(1.2rem, 2.56vw, 3.2rem);
            --row-height: auto;
            --row-gap: clamp(0.72rem, 1.35vw, 1.35rem);
            --key-col-width: clamp(88px, 10.4vw, 148px);
            --about-paper: #151310;
            --about-ink: #f1e8d3;
            --about-muted: rgba(241, 232, 211, 0.6);
            --about-blue: #9eadff;
            --about-blue-soft: rgba(158, 173, 255, 0.54);
            --about-orange: #ff7048;
            --about-cyan: #8bd7c8;
            --about-pressure: 0;
        }

        body.about-vector .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 84px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 260;
            pointer-events: none;
        }

        body.about-vector .nav-overlay > * {
            pointer-events: auto;
        }

        body.about-vector .logo-minimal {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 1.13rem;
            font-weight: 900;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--about-ink);
            text-shadow: 0 0 18px rgba(255, 112, 72, 0.16);
            line-height: 1;
        }

        body.about-vector .nav-links {
            display: flex;
            gap: 30px;
        }

        body.about-vector .nav-links a {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.095em;
            text-transform: uppercase;
            line-height: 1;
            text-decoration: none;
            color: var(--about-ink);
            opacity: 0.76;
            transition: color 160ms ease, opacity 160ms ease, text-decoration-color 160ms ease;
        }

        body.about-vector .nav-links a:hover,
        body.about-vector .nav-links a:focus-visible {
            color: var(--about-blue);
            opacity: 1;
            outline: none;
        }

        body.about-vector .nav-links a[aria-current="page"] {
            color: var(--about-blue);
            opacity: 1;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 0.28em;
            text-decoration-color: var(--about-blue-soft);
            pointer-events: none;
        }

        .about-shell {
            width: min(1540px, 100%);
            height: 100vh;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            align-items: center;
            gap: 0;
            padding: clamp(5.7rem, 11vh, 7.2rem) clamp(1.35rem, 3.2vw, 3.1rem) clamp(4.5rem, 7.6vh, 5.4rem);
            position: relative;
            z-index: 2;
        }

        .about-index {
            align-self: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
            width: min(1320px, 92vw);
            padding: 0;
            position: relative;
            z-index: 3;
            mix-blend-mode: normal;
        }

        .about-index::before {
            display: none;
        }

        .about-line {
            display: grid;
            grid-template-columns: var(--key-col-width) minmax(0, 1fr);
            gap: var(--row-gap);
            align-items: center;
            min-height: var(--row-height);
            padding: clamp(0.55rem, 1.25vh, 0.95rem) 0 clamp(0.68rem, 1.45vh, 1.05rem);
            border-top: 1px solid rgba(241, 232, 211, 0.19);
            opacity: 1;
            transition:
                opacity 180ms ease,
                border-color 180ms ease,
                transform 180ms ease,
                filter 180ms ease;
        }

        .about-line:last-of-type {
            border-bottom: 1px solid rgba(241, 232, 211, 0.19);
        }

        .about-index.has-active .about-line:not(.is-active) {
            opacity: 0.42;
            filter: saturate(0.55);
        }

        .about-line.is-active {
            border-color: rgba(255, 112, 72, 0.58);
            transform: translateX(clamp(4px, 0.55vw, 9px));
            filter: saturate(1.28);
        }

        .about-line.is-active + .about-line {
            border-top-color: rgba(255, 112, 72, 0.4);
        }

        .about-key {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-weight: 700;
            font-size: var(--key-size);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--about-cyan);
            white-space: nowrap;
            line-height: 1;
            opacity: 0.78;
            align-self: start;
            padding-top: 0.34em;
            transition: color 160ms ease, opacity 160ms ease, text-shadow 160ms ease;
        }

        .about-line.is-active .about-key {
            color: var(--about-orange);
            opacity: 1;
            text-shadow: 0 0 18px rgba(255, 112, 72, 0.34);
        }

        .about-value {
            font-family: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: var(--value-size);
            letter-spacing: 0;
            text-transform: uppercase;
            line-height: 0.9;
            color: var(--about-ink);
            text-shadow:
                0 0 24px rgba(158, 173, 255, 0.14),
                0 0 1px rgba(241, 232, 211, 0.5);
            transition: color 160ms ease, text-shadow 160ms ease, transform 160ms ease;
        }

        .about-line.is-active .about-value {
            color: #fff7df;
            text-shadow:
                0 0 28px rgba(255, 112, 72, 0.18),
                0 0 18px rgba(139, 215, 200, 0.18),
                0 0 1px rgba(255, 247, 223, 0.72);
        }

        .about-value-home,
        .about-value-previous,
        .about-value-learning,
        .about-value-social {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: clamp(0.32rem, 0.82vw, 0.72rem);
            white-space: nowrap;
        }

        .about-sep {
            opacity: 0.95;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 0.64em;
            letter-spacing: 0;
            color: var(--about-orange);
            transform: translateY(-0.04em);
            transition: color 160ms ease, opacity 160ms ease, text-shadow 160ms ease;
        }

        .about-line.is-active .about-sep,
        .about-formula-sep {
            text-shadow: 0 0 16px rgba(255, 112, 72, 0.44);
        }

        .about-formula-sep {
            color: var(--about-orange);
        }

        .place-token {
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            color: inherit;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            line-height: inherit;
            text-decoration: underline;
            text-decoration-color: transparent;
            text-underline-offset: 0.16em;
            transition: color 150ms ease, text-decoration-color 150ms ease, opacity 150ms ease;
            cursor: pointer !important;
        }

        .place-token:hover,
        .place-token:focus-visible {
            color: var(--about-cyan);
            opacity: 1;
            text-decoration-color: var(--about-orange);
            outline: none;
        }

        .about-line-social {
            margin-top: 0;
        }

        .about-value-social {
            gap: clamp(0.32rem, 0.82vw, 0.72rem);
        }

        .about-line:not(.about-line-social) .about-value:not(.about-value-home):not(.about-value-previous) {
            white-space: nowrap;
        }

        .about-value-social a {
            font-family: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: var(--value-size);
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
            color: inherit;
            text-decoration: underline;
            text-decoration-color: rgba(255, 112, 72, 0.64);
            text-decoration-thickness: 0.08em;
            text-underline-offset: 0.16em;
            line-height: 0.9;
            transition: color 160ms ease, opacity 160ms ease, text-decoration-color 160ms ease;
        }

        .about-value-social a:hover,
        .about-value-social a:focus-visible {
            color: var(--about-cyan);
            opacity: 1;
            text-decoration-color: var(--about-orange);
            outline: none;
        }

        .about-place-preview {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: min(52vw, 780px);
            max-width: none;
            margin: 0;
            border: 0;
            background: transparent;
            box-shadow: none;
            overflow: hidden;
            opacity: 0;
            transform: translateX(28px) scale(1.02);
            pointer-events: none;
            transition: opacity 260ms ease, transform 260ms ease;
            z-index: 1;
            mix-blend-mode: screen;
            mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.88) 22%, black 100%);
            -webkit-mask-image: linear-gradient(90deg, transparent 0%, rgba(0, 0, 0, 0.88) 22%, black 100%);
        }

        .about-place-preview.is-visible {
            opacity: 0.5;
            transform: translateX(0) scale(1);
        }

        .about-place-preview img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.22) saturate(0.95) contrast(1.16) brightness(0.78) blur(0.7px);
            transition: filter 320ms ease, transform 420ms ease;
            transform: scale(1.012);
        }

        body.about-place-active .about-place-preview {
            opacity: 0.68;
            transform: translateX(0) scale(1.018);
        }

        body.about-place-active .about-place-preview img {
            filter: grayscale(0.05) saturate(1.28) contrast(1.24) brightness(0.96) blur(0.28px);
            transform: scale(1.04);
        }

        .about-place-preview figcaption {
            position: absolute;
            right: 0.72rem;
            bottom: 0.66rem;
            background: rgba(21, 19, 16, 0.42);
            color: rgba(241, 232, 211, 0.68);
            padding: 0.26rem 0.44rem;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            line-height: 1;
        }

        .about-art {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .about-formula {
            position: fixed;
            left: clamp(1.35rem, 3.2vw, 3.1rem);
            bottom: clamp(1.3rem, 3.4vh, 2.4rem);
            max-width: min(860px, 62vw);
            margin-top: 0;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.54rem, 0.68vw, 0.74rem);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(139, 215, 200, 0.58);
            text-align: left;
            padding-right: 0;
            user-select: none;
            z-index: 3;
            text-shadow: 0 0 18px rgba(139, 215, 200, 0.2);
            transition: color 180ms ease, opacity 180ms ease, text-shadow 180ms ease;
        }

        body.about-active .about-formula {
            color: rgba(139, 215, 200, 0.82);
            text-shadow:
                0 0 24px rgba(139, 215, 200, 0.34),
                0 0 18px rgba(255, 112, 72, 0.12);
        }

        .about-field {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            isolation: isolate;
            pointer-events: none;
            background:
                radial-gradient(circle at 78% 46%, rgba(158, 173, 255, 0.18) 0%, transparent 52%),
                radial-gradient(circle at 72% 28%, rgba(139, 215, 200, 0.1) 0%, transparent 34%),
                linear-gradient(90deg, rgba(21, 19, 16, 0.2), rgba(21, 19, 16, 0));
        }

        .about-field::before,
        .about-field::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
        }

        .about-field::before {
            background:
                repeating-linear-gradient(
                    180deg,
                    rgba(241, 232, 211, 0.06) 0,
                    rgba(241, 232, 211, 0.06) 1px,
                    transparent 1px,
                    transparent 7px
                );
            mix-blend-mode: screen;
        }

        .about-field::after {
            background:
                linear-gradient(
                    90deg,
                    transparent 0%,
                    rgba(139, 215, 200, 0.11) 43%,
                    rgba(255, 112, 72, 0.16) 50%,
                    rgba(158, 173, 255, 0.1) 56%,
                    transparent 100%
                );
            transform: translateX(calc(-28vw + var(--about-pressure) * 52vw));
            mix-blend-mode: screen;
        }

        body.about-active {
            --about-pressure: 1;
        }

        body.about-active .about-field::before {
            opacity: 0.58;
        }

        body.about-active .about-field::after {
            opacity: 0.82;
        }

        .about-attractor-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.88;
            mix-blend-mode: screen;
            filter: saturate(1.05) contrast(1.08);
            transition: opacity 200ms ease, filter 200ms ease;
        }

        body.about-active .about-attractor-canvas {
            opacity: 1;
            filter: saturate(1.32) contrast(1.24);
        }

        @media screen and (max-width: 899px) {
            body.about-vector {
                overflow: auto;
                --meta-size: 0.66rem;
                --key-size: var(--meta-size);
                --value-size: clamp(1.18rem, 7.4vw, 2rem);
                --row-height: auto;
                --row-gap: 0.55rem;
                --key-col-width: 76px;
            }

            .about-shell {
                height: auto;
                min-height: 100vh;
                grid-template-columns: 1fr;
                align-items: start;
                gap: 1.2rem;
                padding: 4.9rem 1rem 1.3rem;
            }

            .about-value-home,
            .about-value-previous,
            .about-value-learning,
            .about-value-social {
                gap: 0.3rem;
                flex-wrap: wrap;
                white-space: normal;
            }

            .about-line:not(.about-line-social) .about-value:not(.about-value-home):not(.about-value-previous) {
                white-space: normal;
                text-wrap: balance;
            }

            .about-place-preview {
                display: none;
            }

            .about-index {
                order: 1;
                width: 100%;
                padding-bottom: 0.1rem;
            }

            .about-art {
                position: relative;
                order: 2;
                height: 50vh;
                min-height: 300px;
            }

            .about-line {
                align-items: start;
                padding: 0.64rem 0 0.78rem;
            }

            .about-formula {
                font-size: 0.5rem;
                margin-top: 0.22rem;
                position: relative;
                left: auto;
                right: auto;
                bottom: auto;
                max-width: none;
                color: rgba(139, 215, 200, 0.62);
            }

            .about-field {
                position: relative;
                inset: auto;
                width: 100%;
                height: 50vh;
                min-height: 300px;
                overflow: hidden;
            }

            .about-index.has-active .about-line:not(.is-active) {
                opacity: 1;
                filter: none;
            }

            .about-line.is-active {
                transform: none;
            }

        }

        @media (max-width: 768px) {
            body.about-vector .nav-overlay {
                padding: 0 24px;
                height: 68px;
                justify-content: flex-start;
            }

            body.about-vector .logo-minimal {
                font-size: 1.02rem;
            }

            body.about-vector .nav-links {
                position: fixed;
                left: 12px;
                right: 12px;
                bottom: calc(10px + env(safe-area-inset-bottom));
                display: flex;
                gap: 8px;
                align-items: center;
                justify-content: space-between;
                border: 1px solid rgba(139, 215, 200, 0.5);
                border-radius: 0;
                padding: 8px;
                background: rgba(21, 19, 16, 0.86);
                backdrop-filter: blur(10px);
                z-index: 280;
            }

            body.about-vector .nav-links a {
                flex: 1;
                text-align: center;
                font-size: 10px;
                letter-spacing: 0.08em;
                border: 1px solid rgba(241, 232, 211, 0.18);
                border-radius: 0;
                padding: 8px 4px;
                background: rgba(241, 232, 211, 0.05);
            }

            .about-shell {
                padding-bottom: calc(6.8rem + env(safe-area-inset-bottom));
            }

            .about-art {
                margin-bottom: -1px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .place-token,
            .about-value-social a {
                transition: color 120ms linear, opacity 120ms linear, text-decoration-color 120ms linear;
            }

            .about-place-preview {
                transition: opacity 120ms linear;
                transform: none;
            }

            .about-line,
            .about-key,
            .about-value,
            .about-sep,
            .about-formula,
            .about-attractor-canvas,
            .about-field::before,
            .about-field::after {
                transition: none;
            }

            .about-attractor-canvas {
                opacity: 0.88;
                filter: saturate(0.9) contrast(0.98);
            }
        }
    </style>
</head>
<body class="about-vector">
    <nav class="nav-overlay" aria-label="Primary">
        <a class="logo-minimal" href="index.html">HOME</a>
        <div class="nav-links">
            <a href="about.html" aria-current="page">01 About</a>
            <a href="projects.html">02 Projects</a>
            <a href="other.html">03 Library</a>
            <a href="swag.html">04 Swag</a>
        </div>
    </nav>
    <main class="about-shell">
        <section class="about-index" aria-label="About index">
            <div class="about-line">
                <span class="about-key">HOME</span>
                <span class="about-value about-value-home">
                    <button class="place-token" type="button" data-place="artegna">ARTEGNA</button>
                    <span class="about-sep">/</span>
                    <button class="place-token" type="button" data-place="merthyr">MERTHYR TYDFIL</button>
                    <span class="about-sep">/</span>
                    <button class="place-token" type="button" data-place="sf">SAN FRANCISCO</button>
                </span>
            </div>
            <div class="about-line">
                <span class="about-key">PREVIOUS</span>
                <span class="about-value about-value-previous">
                    <span>PRINCETON</span>
                    <span class="about-sep">/</span>
                    <span>SQUARE</span>
                    <span class="about-sep">/</span>
                    <span>ALGOLIA</span>
                    <span class="about-sep">/</span>
                    <span>SOLANA</span>
                </span>
            </div>
            <div class="about-line">
                <span class="about-key">LEARNING</span>
                <span class="about-value about-value-learning">
                    <span>KOREAN</span>
                    <span class="about-sep">/</span>
                    <span>CHESS</span>
                    <span class="about-sep">/</span>
                    <span>FRONTIER TECH</span>
                </span>
            </div>
            <div class="about-line">
                <span class="about-key">FOOTBALL</span>
                <span class="about-value">INTER MILAN</span>
            </div>
            <div class="about-line about-line-social">
                <span class="about-key">SOCIAL</span>
                <span class="about-value about-value-social">
                    <a href="https://x.com/drebaglioni" target="_blank" rel="noopener noreferrer">X</a>
                    <span class="about-sep">/</span>
                    <a href="https://www.linkedin.com/in/andrea-baglioni-3b5a2735/" target="_blank" rel="noopener noreferrer">LINKEDIN</a>
                </span>
            </div>
            <figure class="about-place-preview" id="aboutPlacePreview" aria-live="polite" aria-hidden="true">
                <img id="aboutPlacePreviewImg" alt="">
                <figcaption id="aboutPlacePreviewLabel"></figcaption>
            </figure>
        </section>

        <section class="about-art" aria-label="Vector-field composition">
            <div class="about-field" aria-hidden="true">
                <canvas class="about-attractor-canvas" id="aboutAttractorCanvas"></canvas>
            </div>
            <div class="about-formula">r=(.28+.82u)(1+.18sin(5theta+phi)+.08cos(9theta-.7phi)) <span class="about-formula-sep">/</span> z=.34sin(3theta+phi)</div>
        </section>
    </main>

    <script>
        const mediaReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        const currentUrl = new URL(window.location.href);
        const field = document.querySelector('.about-field');
        const aboutAttractorCanvas = document.getElementById('aboutAttractorCanvas');
        const aboutAttractorCtx = aboutAttractorCanvas ? aboutAttractorCanvas.getContext('2d', { alpha: true }) : null;
        const desktopMotionQuery = window.matchMedia('(min-width: 900px)');
        const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        const motionOverride = new URLSearchParams(window.location.search).get('motion') === 'on';
        const aboutIndex = document.querySelector('.about-index');
        const aboutLines = Array.from(document.querySelectorAll('.about-line'));
        const placeTokens = Array.from(document.querySelectorAll('.place-token'));
        const placePreview = document.getElementById('aboutPlacePreview');
        const placePreviewImg = document.getElementById('aboutPlacePreviewImg');
        const placePreviewLabel = document.getElementById('aboutPlacePreviewLabel');
        const placeImageMap = {
            artegna: { src: 'assets/images/about/home-artegna.jpg', label: 'ARTEGNA', alt: 'Artegna town view' },
            merthyr: { src: 'assets/images/about/home-merthyr.jpg', label: 'MERTHYR TYDFIL', alt: 'Merthyr Tydfil town view' },
            sf: { src: 'assets/images/about/home-sanfrancisco.jpg', label: 'SAN FRANCISCO', alt: 'San Francisco skyline view' }
        };
        let attractorFrame = null;
        let attractorEnabled = false;
        let placeHideTimer = null;
        const aboutAttractor = {
            dpr: 1,
            width: 0,
            height: 0,
            targetX: 0,
            targetY: 0,
            pointerX: 0,
            pointerY: 0,
            targetIntensity: 0,
            intensity: 0,
            staticDrawn: false
        };

        function canShowPlacePreview() {
            return desktopMotionQuery.matches;
        }

        function hidePlacePreview(withDelay = true) {
            if (!placePreview) {
                return;
            }

            const hide = () => {
                placePreview.classList.remove('is-visible');
                placePreview.setAttribute('aria-hidden', 'true');
                document.body.classList.remove('about-place-active');
            };

            if (placeHideTimer !== null) {
                window.clearTimeout(placeHideTimer);
                placeHideTimer = null;
            }

            if (withDelay) {
                placeHideTimer = window.setTimeout(hide, 90);
                return;
            }

            hide();
        }

        function showPlacePreview(placeKey) {
            if (!canShowPlacePreview() || !placePreview || !placePreviewImg || !placePreviewLabel) {
                return;
            }

            const place = placeImageMap[placeKey];
            if (!place) {
                return;
            }

            if (placeHideTimer !== null) {
                window.clearTimeout(placeHideTimer);
                placeHideTimer = null;
            }

            placePreviewImg.src = place.src;
            placePreviewImg.alt = place.alt;
            placePreviewLabel.textContent = place.label;
            placePreview.classList.add('is-visible');
            placePreview.setAttribute('aria-hidden', 'false');
            document.body.classList.add('about-place-active');
        }

        function setActiveAboutLine(line) {
            if (!aboutIndex) {
                return;
            }

            aboutLines.forEach((candidate) => {
                candidate.classList.toggle('is-active', candidate === line);
            });

            aboutIndex.classList.toggle('has-active', Boolean(line));
            document.body.classList.toggle('about-active', Boolean(line));
            aboutAttractor.targetIntensity = line ? 1 : 0;
        }

        function resizeAboutAttractor() {
            if (!aboutAttractorCanvas || !aboutAttractorCtx || !field) {
                return;
            }

            const rect = field.getBoundingClientRect();
            const dpr = Math.min(window.devicePixelRatio || 1, 1.35);
            const width = Math.max(1, Math.round(rect.width));
            const height = Math.max(1, Math.round(rect.height));
            const pixelWidth = Math.round(width * dpr);
            const pixelHeight = Math.round(height * dpr);

            if (aboutAttractorCanvas.width !== pixelWidth || aboutAttractorCanvas.height !== pixelHeight) {
                aboutAttractorCanvas.width = pixelWidth;
                aboutAttractorCanvas.height = pixelHeight;
                aboutAttractorCanvas.style.width = width + 'px';
                aboutAttractorCanvas.style.height = height + 'px';
                aboutAttractor.dpr = dpr;
                aboutAttractor.width = width;
                aboutAttractor.height = height;
                aboutAttractor.staticDrawn = false;
            }
        }

        function drawAboutAttractor(timestamp, isStatic = false) {
            if (!aboutAttractorCanvas || !aboutAttractorCtx || aboutAttractor.width === 0 || aboutAttractor.height === 0) {
                return;
            }

            const ctx = aboutAttractorCtx;
            const width = aboutAttractor.width;
            const height = aboutAttractor.height;
            const dpr = aboutAttractor.dpr;
            const time = (timestamp || 0) * 0.001;
            const drift = isStatic ? 0.9 : time;

            aboutAttractor.pointerX += (aboutAttractor.targetX - aboutAttractor.pointerX) * (isStatic ? 1 : 0.035);
            aboutAttractor.pointerY += (aboutAttractor.targetY - aboutAttractor.pointerY) * (isStatic ? 1 : 0.035);
            aboutAttractor.intensity += (aboutAttractor.targetIntensity - aboutAttractor.intensity) * (isStatic ? 1 : 0.08);
            const pressure = aboutAttractor.intensity;

            const centerX = width * (0.68 + aboutAttractor.pointerX * (0.024 + pressure * 0.02));
            const centerY = height * (0.5 + aboutAttractor.pointerY * (0.02 + pressure * 0.018));
            const radius = Math.min(width, height) * (1.22 + pressure * 0.1);
            const rotation = -0.18 + drift * (0.026 + pressure * 0.028) + aboutAttractor.pointerX * (0.08 + pressure * 0.08);
            const cosR = Math.cos(rotation);
            const sinR = Math.sin(rotation);
            const grid = Math.max(1.32, Math.min(2.5, Math.min(width, height) * (0.003 - pressure * 0.00045)));
            const pixelSize = Math.max(1.08, grid * (0.72 + pressure * 0.14));
            const phase = drift * (0.26 + pressure * 0.2);
            const driftX = Math.sin(drift * 0.11) * 0.14 + aboutAttractor.pointerX * 0.04;
            const driftY = Math.cos(drift * 0.09) * 0.12 + aboutAttractor.pointerY * 0.04;

            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, width, height);
            ctx.lineCap = 'butt';
            ctx.lineJoin = 'miter';

            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, width, height);
            ctx.clip();

            function hash2(ix, iy) {
                let h = (ix * 374761393) ^ (iy * 668265263) ^ 0x6d2b79f5;
                h = (h ^ (h >>> 13)) >>> 0;
                h = Math.imul(h, 1274126177) >>> 0;
                return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
            }

            function pixelPoint(theta, lane) {
                const laneT = lane / 96;
                const localPhase = phase + laneT * Math.PI * 0.9;
                const shell = (0.18 + laneT * 0.98)
                    * (1
                        + 0.19 * Math.sin(5 * theta + localPhase)
                        + 0.08 * Math.cos(9 * theta - localPhase * 0.72)
                        + 0.035 * Math.sin(14 * theta + localPhase * 0.34));
                const curl = 0.075 * Math.sin(3 * theta + localPhase);
                const x = Math.cos(theta + curl) * shell
                    + 0.08 * Math.cos(2 * theta - localPhase) * laneT;
                const y = Math.sin(theta - curl) * shell * (0.83 + laneT * 0.12)
                    + 0.07 * Math.sin(4 * theta + localPhase) * (1 - laneT * 0.3);
                const z = 0.32 * Math.sin(3 * theta + localPhase)
                    + 0.18 * Math.cos(7 * theta - localPhase);
                const rx = x * cosR - z * sinR;
                const rz = x * sinR + z * cosR;
                const lift = y * Math.cos(0.32) - rz * Math.sin(0.32);
                const depth = 1.08 / (2.5 - rz * 0.18);

                return {
                    x: centerX + rx * radius * depth * 1.54,
                    y: centerY + lift * radius * depth * 1.18,
                    depth,
                    laneT
                };
            }

            const inkBuckets = [[], [], [], [], []];
            const trailPixels = [];
            const accentPixels = [];
            const ghostPixels = [];

            const laneMax = 106 + Math.round(pressure * 22);
            for (let lane = 0; lane <= laneMax; lane += 1) {
                const laneT = lane / 96;
                const steps = 240 + Math.round(Math.min(1.1, laneT) * (150 + pressure * 54));
                for (let i = 0; i < steps; i += 1) {
                    const theta = (i / steps) * Math.PI * 2;
                    const grain = hash2(lane, i);
                    if (grain < 0.1 - pressure * 0.045 && lane % 3 !== 0) {
                        continue;
                    }

                    const point = pixelPoint(theta + grain * (0.002 + pressure * 0.006), lane);
                    if (point.x < -grid || point.x > width + grid || point.y < -grid || point.y > height + grid) {
                        continue;
                    }

                    const shimmer = Math.sin(drift * (1.2 + pressure * 1.4) + lane * 0.41 + i * 0.07);
                    const size = pixelSize * (0.42 + grain * (0.74 + pressure * 0.22) + point.depth * 0.12);
                    const x = Math.round((point.x + (grain - 0.5) * grid * (0.42 + pressure * 0.8)) / grid) * grid;
                    const y = Math.round((point.y + (hash2(i, lane) - 0.5) * grid * (0.42 + pressure * 0.8)) / grid) * grid;

                    if (lane > 84 && i % (pressure > 0.5 ? 6 : 9) === 0 && grain > 0.28 - pressure * 0.1) {
                        accentPixels.push([x, y, size * (0.98 + pressure * 0.24)]);
                    } else if (grain > 0.78 - pressure * 0.07 || shimmer > 0.82 - pressure * 0.12) {
                        ghostPixels.push([x, y, size * (0.8 + pressure * 0.12)]);
                    } else if (lane % (pressure > 0.5 ? 4 : 5) === 0 && grain > 0.44 - pressure * 0.12) {
                        trailPixels.push([x + grid * (1.15 + pressure * 1.2), y + grid * 0.4, size * (0.72 + pressure * 0.2)]);
                    } else {
                        const bucket = Math.min(4, Math.floor((point.laneT * 3.8 + point.depth * 1.3 + grain * 0.7) % 5));
                        inkBuckets[bucket].push([x, y, size]);
                    }
                }
            }

            const inkAlpha = isStatic
                ? [0.15, 0.21, 0.28, 0.36, 0.46].map((alpha) => alpha + pressure * 0.1)
                : [0.17, 0.24, 0.32, 0.41, 0.52].map((alpha) => alpha + pressure * 0.12);
            inkBuckets.forEach((pixels, bucket) => {
                ctx.fillStyle = `rgba(158, 173, 255, ${inkAlpha[bucket]})`;
                pixels.forEach(([x, y, size]) => {
                    ctx.fillRect(x, y, size, size);
                });
            });

            ctx.fillStyle = `rgba(139, 215, 200, ${(isStatic ? 0.08 : 0.11) + pressure * 0.08})`;
            trailPixels.forEach(([x, y, size]) => {
                ctx.fillRect(x, y, size * 1.65, size);
            });

            ctx.fillStyle = `rgba(255, 112, 72, ${(isStatic ? 0.18 : 0.24) + pressure * 0.16})`;
            accentPixels.forEach(([x, y, size]) => {
                ctx.fillRect(x, y, size, size);
            });

            ctx.fillStyle = `rgba(241, 232, 211, ${(isStatic ? 0.055 : 0.075) + pressure * 0.055})`;
            ghostPixels.forEach(([x, y, size]) => {
                ctx.fillRect(x, y, size, size);
            });

            ctx.restore();
        }

        function shouldRunAboutAttractor() {
            return desktopMotionQuery.matches && (motionOverride || !reducedMotionQuery.matches) && !document.hidden;
        }

        function updateAboutAttractorState() {
            if (!aboutAttractorCanvas || !aboutAttractorCtx) {
                return;
            }

            resizeAboutAttractor();
            const nextState = shouldRunAboutAttractor();

            if (attractorEnabled === nextState) {
                if (!nextState && !aboutAttractor.staticDrawn) {
                    drawAboutAttractor(0, true);
                    aboutAttractor.staticDrawn = true;
                }
                return;
            }

            attractorEnabled = nextState;
            if (attractorFrame !== null) {
                window.cancelAnimationFrame(attractorFrame);
                attractorFrame = null;
            }

            if (attractorEnabled) {
                aboutAttractor.staticDrawn = false;
                aboutAttractor.lastTimestamp = 0;
                attractorFrame = window.requestAnimationFrame(renderAboutAttractor);
            } else {
                drawAboutAttractor(0, true);
                aboutAttractor.staticDrawn = true;
            }
        }

        function renderAboutAttractor(timestamp) {
            if (!attractorEnabled) {
                attractorFrame = null;
                return;
            }

            drawAboutAttractor(timestamp, false);
            attractorFrame = window.requestAnimationFrame(renderAboutAttractor);
        }

        function bindMediaQuery(query, handler) {
            if (typeof query.addEventListener === 'function') {
                query.addEventListener('change', handler);
                return;
            }
            if (typeof query.addListener === 'function') {
                query.addListener(handler);
            }
        }

        window.addEventListener('resize', () => {
            updateAboutAttractorState();
            hidePlacePreview(false);
        }, { passive: true });
        document.addEventListener('visibilitychange', () => {
            updateAboutAttractorState();
        }, { passive: true });
        document.addEventListener('pointermove', (event) => {
            if (!field) {
                return;
            }

            const rect = field.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) {
                return;
            }

            aboutAttractor.targetX = Math.max(-1, Math.min(1, ((event.clientX - rect.left) / rect.width - 0.5) * 2));
            aboutAttractor.targetY = Math.max(-1, Math.min(1, ((event.clientY - rect.top) / rect.height - 0.5) * 2));
        }, { passive: true });
        bindMediaQuery(desktopMotionQuery, () => {
            updateAboutAttractorState();
            hidePlacePreview(false);
        });
        bindMediaQuery(reducedMotionQuery, () => {
            updateAboutAttractorState();
        });

        aboutLines.forEach((line) => {
            line.addEventListener('mouseenter', () => {
                setActiveAboutLine(line);
            });
            line.addEventListener('mouseleave', () => {
                setActiveAboutLine(null);
            });
            line.addEventListener('focusin', () => {
                setActiveAboutLine(line);
            });
            line.addEventListener('focusout', (event) => {
                if (!line.contains(event.relatedTarget)) {
                    setActiveAboutLine(null);
                }
            });
        });

        placeTokens.forEach((token) => {
            const placeKey = token.dataset.place;
            token.addEventListener('mouseenter', () => {
                showPlacePreview(placeKey);
            });
            token.addEventListener('mouseleave', () => {
                hidePlacePreview(true);
            });
            token.addEventListener('focus', () => {
                showPlacePreview(placeKey);
            });
            token.addEventListener('blur', () => {
                hidePlacePreview(false);
            });
        });

        updateAboutAttractorState();
    </script>
</body>
</html>
