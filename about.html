<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap');

        body.about-vector {
            background: #f3f1e8;
            color: #0d0d0d;
            overflow: hidden;
            cursor: default !important;
        }

        body.about-vector::before {
            display: none;
        }

        body.about-vector a {
            cursor: pointer !important;
        }

        body.about-vector {
            --meta-size: clamp(0.9rem, 1.04vw, 1.08rem);
            --key-size: var(--meta-size);
            --value-size: var(--meta-size);
            --row-height: clamp(2.3rem, 5.2vh, 2.86rem);
            --row-gap: clamp(0.7rem, 1.04vw, 0.92rem);
            --key-col-width: clamp(102px, 9.8vw, 138px);
        }

        .about-back-link {
            position: fixed;
            top: 1.18rem;
            left: 1.05rem;
            z-index: 220;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.98rem, 1.12vw, 1.18rem);
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            line-height: 1;
            text-decoration: none;
            color: #0d0d0d;
            transition: opacity 180ms ease-in-out;
        }

        .about-back-link:hover {
            opacity: 0.6;
        }

        .about-shell {
            width: min(1480px, 100%);
            height: 100vh;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 47% 53%;
            align-items: center;
            gap: clamp(1.04rem, 1.8vw, 1.86rem);
            padding: clamp(3.2rem, 6.4vh, 3.8rem) clamp(1.04rem, 2.35vw, 2.45rem);
        }

        .about-index {
            align-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
            padding: clamp(0.48rem, 0.78vw, 0.72rem) 0;
            position: relative;
        }

        .about-line {
            display: grid;
            grid-template-columns: var(--key-col-width) minmax(0, 1fr);
            gap: var(--row-gap);
            align-items: end;
            min-height: var(--row-height);
        }

        .about-key {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-weight: 700;
            font-size: var(--key-size);
            letter-spacing: 0.17em;
            text-transform: uppercase;
            color: #1E32D6;
            white-space: nowrap;
            line-height: 1;
        }

        .about-value {
            font-family: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: var(--value-size);
            letter-spacing: 0.055em;
            text-transform: uppercase;
            line-height: 1.06;
        }

        .about-value-home,
        .about-value-previous,
        .about-value-social {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.38rem;
        }

        .about-sep {
            opacity: 0.56;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 0.92em;
            letter-spacing: 0.04em;
        }

        .place-token {
            font: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
            color: inherit;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            line-height: inherit;
            text-decoration: underline;
            text-decoration-color: transparent;
            text-underline-offset: 0.16em;
            transition: color 150ms ease, text-decoration-color 150ms ease, opacity 150ms ease;
            cursor: pointer !important;
        }

        .place-token:hover,
        .place-token:focus-visible {
            color: #1E32D6;
            opacity: 0.95;
            text-decoration-color: #1E32D6;
            outline: none;
        }

        .about-line-social {
            margin-top: clamp(0.12rem, 0.3vw, 0.28rem);
        }

        .about-value-social {
            gap: 0.34rem;
        }

        .about-value-social a {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.6rem, 0.7vw, 0.74rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(13, 13, 13, 0.74);
            text-decoration: none;
            line-height: 1.1;
            transition: color 160ms ease, opacity 160ms ease;
        }

        .about-value-social a:hover,
        .about-value-social a:focus-visible {
            color: #1E32D6;
            opacity: 0.95;
            outline: none;
        }

        .about-place-preview {
            position: absolute;
            left: calc(var(--key-col-width) + var(--row-gap));
            bottom: clamp(0.04rem, 0.48vw, 0.42rem);
            width: min(28vw, 430px);
            max-width: calc(100% - (var(--key-col-width) + var(--row-gap)));
            aspect-ratio: 16 / 10;
            margin: 0;
            border: 1px solid rgba(13, 13, 13, 0.24);
            background: rgba(243, 241, 232, 0.92);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            opacity: 0;
            transform: translateY(4px);
            pointer-events: none;
            transition: opacity 170ms ease, transform 170ms ease;
        }

        .about-place-preview.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .about-place-preview img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-place-preview figcaption {
            position: absolute;
            left: 0.5rem;
            bottom: 0.48rem;
            background: rgba(243, 241, 232, 0.9);
            color: #0d0d0d;
            padding: 0.18rem 0.32rem;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1;
        }

        .about-art {
            align-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .about-formula {
            margin-top: 0.36rem;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.44rem, 0.52vw, 0.54rem);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(13, 13, 13, 0.12);
            text-align: right;
            padding-right: 0.15rem;
            user-select: none;
        }

        .about-field {
            position: relative;
            height: min(720px, calc(100vh - 8.8rem));
            overflow: hidden;
            isolation: isolate;
        }

        .shape {
            position: absolute;
            mix-blend-mode: multiply;
            opacity: 0.95;
            transform-origin: center center;
            will-change: transform;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.11);
        }

        .shape-circle {
            border-radius: 50%;
        }

        .shape-capsule {
            border-radius: 999px;
        }

        .shape-rect {
            border-radius: 10px;
        }

        .shape-thin {
            border-radius: 4px;
        }

        .shape.s1 { width: 41%; aspect-ratio: 1 / 1; background: #FF3D00; }
        .shape.s2 { width: 16%; height: 63%; background: #0037FF; }
        .shape.s3 { width: 33%; aspect-ratio: 1 / 1; background: #FFE600; }
        .shape.s4 { width: 27%; height: 19%; background: #00D5FF; }
        .shape.s5 { width: 17%; height: 43%; background: #FF1D8E; }

        @media screen and (max-width: 899px) {
            body.about-vector {
                overflow: auto;
                --meta-size: 0.78rem;
                --key-size: var(--meta-size);
                --value-size: var(--meta-size);
                --row-height: 2.02rem;
                --row-gap: 0.5rem;
                --key-col-width: 84px;
            }

            .about-shell {
                height: auto;
                min-height: 100vh;
                grid-template-columns: 1fr;
                align-items: start;
                gap: 0.96rem;
                padding: 4.8rem 1rem 1.3rem;
            }

            .about-value-home,
            .about-value-social {
                gap: 0.3rem;
            }

            .about-value-social a {
                font-size: 0.54rem;
                letter-spacing: 0.1em;
            }

            .about-place-preview {
                display: none;
            }

            .about-index {
                order: 1;
                padding-bottom: 0.1rem;
            }

            .about-art {
                order: 2;
            }

            .about-line {
                align-items: baseline;
            }

            .about-formula {
                font-size: 0.48rem;
                margin-top: 0.22rem;
            }

            .about-field {
                height: 50vh;
                min-height: 300px;
            }

            .shape.s1 { width: 51%; }
            .shape.s2 { width: 20%; height: 66%; }
            .shape.s3 { width: 40%; }
            .shape.s4 { width: 37%; height: 18%; }
            .shape.s5 { width: 21%; height: 46%; }
        }

        @media (prefers-reduced-motion: reduce) {
            .place-token,
            .about-value-social a {
                transition: color 120ms linear, opacity 120ms linear, text-decoration-color 120ms linear;
            }

            .about-place-preview {
                transition: opacity 120ms linear;
                transform: none;
            }
        }
    </style>
</head>
<body class="about-vector">
    <a class="about-back-link" href="index.html" aria-label="Back to home">←</a>
    <main class="about-shell">
        <section class="about-index" aria-label="About index">
            <div class="about-line">
                <span class="about-key">HOME</span>
                <span class="about-value about-value-home">
                    <button class="place-token" type="button" data-place="artegna">ARTEGNA</button>
                    <span class="about-sep">/</span>
                    <button class="place-token" type="button" data-place="merthyr">MERTHYR TYDFIL</button>
                    <span class="about-sep">/</span>
                    <button class="place-token" type="button" data-place="sf">SAN FRANCISCO</button>
                </span>
            </div>
            <div class="about-line">
                <span class="about-key">PREVIOUS</span>
                <span class="about-value about-value-previous">
                    <span>PRINCETON</span>
                    <span class="about-sep">/</span>
                    <span>SQUARE</span>
                    <span class="about-sep">/</span>
                    <span>ALGOLIA</span>
                    <span class="about-sep">/</span>
                    <span>SOLANA</span>
                </span>
            </div>
            <div class="about-line">
                <span class="about-key">LEARNING</span>
                <span class="about-value">KOREAN / CHESS / FRONTIER TECH</span>
            </div>
            <div class="about-line">
                <span class="about-key">FOOTBALL</span>
                <span class="about-value">INTER MILAN</span>
            </div>
            <div class="about-line about-line-social">
                <span class="about-key">SOCIAL</span>
                <span class="about-value about-value-social">
                    <a href="https://x.com/drebaglioni" target="_blank" rel="noopener noreferrer">X</a>
                    <span class="about-sep">/</span>
                    <a href="https://www.linkedin.com/in/andrea-baglioni-3b5a2735/" target="_blank" rel="noopener noreferrer">LINKEDIN</a>
                </span>
            </div>
            <figure class="about-place-preview" id="aboutPlacePreview" aria-live="polite" aria-hidden="true">
                <img id="aboutPlacePreviewImg" alt="">
                <figcaption id="aboutPlacePreviewLabel"></figcaption>
            </figure>
        </section>

        <section class="about-art" aria-label="Vector-field composition">
            <div class="about-field" aria-hidden="true">
                <div class="shape shape-circle s1" data-x="-0.34" data-y="-0.18" data-offset="7" data-a="12.8" data-b="8.8" data-w="0.36" data-p="0.3"></div>
                <div class="shape shape-capsule s2" data-x="0.39" data-y="-0.12" data-offset="-5" data-a="9.6" data-b="13.2" data-w="0.48" data-p="1.5"></div>
                <div class="shape shape-circle s3" data-x="-0.03" data-y="0.48" data-offset="11" data-a="9.2" data-b="7.6" data-w="0.62" data-p="2.8"></div>
                <div class="shape shape-rect s4" data-x="0.42" data-y="0.52" data-offset="-2" data-a="10.4" data-b="7.4" data-w="0.42" data-p="0.9"></div>
                <div class="shape shape-thin s5" data-x="-0.58" data-y="0.36" data-offset="5" data-a="11.8" data-b="14.1" data-w="0.32" data-p="2.1"></div>
            </div>
            <div class="about-formula">r_i(t)=r_0+[a cos(omega t + phi), b sin(omega t + phi)]</div>
        </section>
    </main>

    <script>
        const field = document.querySelector('.about-field');
        const shapes = field ? Array.from(field.querySelectorAll('.shape')) : [];
        const desktopMotionQuery = window.matchMedia('(min-width: 900px)');
        const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        const motionOverride = new URLSearchParams(window.location.search).get('motion') === 'on';
        const orbitSpeedMultiplier = 1.5;
        const placeTokens = Array.from(document.querySelectorAll('.place-token'));
        const placePreview = document.getElementById('aboutPlacePreview');
        const placePreviewImg = document.getElementById('aboutPlacePreviewImg');
        const placePreviewLabel = document.getElementById('aboutPlacePreviewLabel');
        const placeImageMap = {
            artegna: { src: 'assets/images/about/home-artegna.jpg', label: 'ARTEGNA', alt: 'Artegna town view' },
            merthyr: { src: 'assets/images/about/home-merthyr.jpg', label: 'MERTHYR TYDFIL', alt: 'Merthyr Tydfil town view' },
            sf: { src: 'assets/images/about/home-sanfrancisco.jpg', label: 'SAN FRANCISCO', alt: 'San Francisco skyline view' }
        };
        let animationFrame = null;
        let orbitEnabled = false;
        let placeHideTimer = null;

        function canShowPlacePreview() {
            return desktopMotionQuery.matches;
        }

        function hidePlacePreview(withDelay = true) {
            if (!placePreview) {
                return;
            }

            const hide = () => {
                placePreview.classList.remove('is-visible');
                placePreview.setAttribute('aria-hidden', 'true');
            };

            if (placeHideTimer !== null) {
                window.clearTimeout(placeHideTimer);
                placeHideTimer = null;
            }

            if (withDelay) {
                placeHideTimer = window.setTimeout(hide, 90);
                return;
            }

            hide();
        }

        function showPlacePreview(placeKey) {
            if (!canShowPlacePreview() || !placePreview || !placePreviewImg || !placePreviewLabel) {
                return;
            }

            const place = placeImageMap[placeKey];
            if (!place) {
                return;
            }

            if (placeHideTimer !== null) {
                window.clearTimeout(placeHideTimer);
                placeHideTimer = null;
            }

            placePreviewImg.src = place.src;
            placePreviewImg.alt = place.alt;
            placePreviewLabel.textContent = place.label;
            placePreview.classList.add('is-visible');
            placePreview.setAttribute('aria-hidden', 'false');
        }

        function vector(x, y) {
            return {
                vx: (-y) + 0.35 * Math.sin(2 * y),
                vy: x + 0.35 * Math.cos(2 * x)
            };
        }

        function positionShapes() {
            if (!field || shapes.length === 0) {
                return;
            }

            shapes.forEach((shape) => {
                const x = Number(shape.dataset.x || 0);
                const y = Number(shape.dataset.y || 0);
                const offset = Number(shape.dataset.offset || 0);
                const { vx, vy } = vector(x, y);

                const angle = (Math.atan2(vy, vx) * 180 / Math.PI) + offset;
                const magnitude = Math.min(1.95, Math.hypot(vx, vy));
                const scale = 0.86 + (magnitude * 0.19);
                const left = ((x + 1) * 50);
                const top = ((y + 1) * 50);

                shape.style.left = left + '%';
                shape.style.top = top + '%';
                shape.dataset.baseAngle = angle.toFixed(4);
                shape.dataset.baseScale = scale.toFixed(4);
            });
        }

        function renderOrbit(timestamp) {
            if (!field || shapes.length === 0) {
                return;
            }

            const time = timestamp / 1000;

            shapes.forEach((shape) => {
                const angle = Number(shape.dataset.baseAngle || 0);
                const scale = Number(shape.dataset.baseScale || 1);
                const a = Number(shape.dataset.a || 0);
                const b = Number(shape.dataset.b || 0);
                const omega = Number(shape.dataset.w || 0.1);
                const phase = Number(shape.dataset.p || 0);
                const orbitTime = (omega * orbitSpeedMultiplier * time) + phase;
                const xShift = orbitEnabled ? a * Math.cos(orbitTime) : 0;
                const yShift = orbitEnabled ? b * Math.sin(orbitTime) : 0;

                shape.style.transform = `translate3d(-50%, -50%, 0) translate3d(${xShift}px, ${yShift}px, 0) rotate(${angle}deg) scale(${scale})`;
            });

            if (orbitEnabled) {
                animationFrame = window.requestAnimationFrame(renderOrbit);
            } else {
                animationFrame = null;
            }
        }

        function shouldOrbit() {
            return desktopMotionQuery.matches && (motionOverride || !reducedMotionQuery.matches) && !document.hidden;
        }

        function updateOrbitState() {
            const nextState = shouldOrbit();

            if (orbitEnabled === nextState) {
                if (!nextState) {
                    renderOrbit(0);
                }
                return;
            }

            orbitEnabled = nextState;

            if (animationFrame !== null) {
                window.cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }

            if (orbitEnabled) {
                animationFrame = window.requestAnimationFrame(renderOrbit);
            } else {
                renderOrbit(0);
            }
        }

        function bindMediaQuery(query, handler) {
            if (typeof query.addEventListener === 'function') {
                query.addEventListener('change', handler);
                return;
            }
            if (typeof query.addListener === 'function') {
                query.addListener(handler);
            }
        }

        window.addEventListener('resize', () => {
            positionShapes();
            updateOrbitState();
            hidePlacePreview(false);
        }, { passive: true });
        document.addEventListener('visibilitychange', updateOrbitState, { passive: true });
        bindMediaQuery(desktopMotionQuery, () => {
            updateOrbitState();
            hidePlacePreview(false);
        });
        bindMediaQuery(reducedMotionQuery, updateOrbitState);

        placeTokens.forEach((token) => {
            const placeKey = token.dataset.place;
            token.addEventListener('mouseenter', () => {
                showPlacePreview(placeKey);
            });
            token.addEventListener('mouseleave', () => {
                hidePlacePreview(true);
            });
            token.addEventListener('focus', () => {
                showPlacePreview(placeKey);
            });
            token.addEventListener('blur', () => {
                hidePlacePreview(false);
            });
        });

        positionShapes();
        updateOrbitState();
    </script>
</body>
</html>
