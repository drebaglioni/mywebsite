<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="assets/images/about/home-sanfrancisco.jpg" fetchpriority="high">
    <link rel="preload" as="image" href="assets/about-collage-light/about-collage-001.jpg">
    <link rel="preload" as="image" href="assets/about-collage-light/about-collage-002.jpg">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@500;700&display=swap">

    <style>
        html {
            background: #050505;
        }

        body.about-vector {
            --ink: #f1ead2;
            --quiet: rgba(241, 234, 210, 0.72);
            --violet: #050505;
            --hot: #ff2a00;
            --gold: #e6ff00;
            --mint: #e6ff00;
            --lake: #0057ff;
            --acid: #e6ff00;
            --paper: #f1ead2;
            --blood: #c00000;
            --plum: #111111;
            --active: #e6ff00;

            min-height: 100%;
            overflow-x: hidden;
            background:
                repeating-linear-gradient(96deg, rgba(255, 42, 0, 0.32) 0 4px, transparent 4px 14px),
                repeating-linear-gradient(27deg, rgba(230, 255, 0, 0.2) 0 2px, transparent 2px 9px),
                repeating-radial-gradient(circle at 78% 30%, rgba(241, 234, 210, 0.22) 0 2px, transparent 2px 7px),
                radial-gradient(circle at 10% 18%, #ff2a00 0 3vw, transparent 3.1vw),
                radial-gradient(circle at 82% 84%, #e6ff00 0 3.4vw, transparent 3.5vw),
                #050505;
            color: var(--ink);
            cursor: default !important;
            isolation: isolate;
            position: relative;
        }

        body.about-vector::before {
            display: none;
        }

        body.about-vector a,
        body.about-vector button {
            cursor: pointer !important;
        }

        .psychedelic-field {
            position: fixed;
            inset: -8vh -8vw;
            z-index: 0;
            width: 116vw;
            height: 116vh;
            pointer-events: none;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .field-backdrop {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(circle, rgba(241, 234, 210, 0.65) 0 1px, transparent 1.8px),
                radial-gradient(circle, rgba(255, 42, 0, 0.72) 0 1.5px, transparent 2.1px),
                repeating-linear-gradient(0deg, rgba(230, 255, 0, 0.18) 0 1px, transparent 1px 5px);
            background-size: 4px 4px, 11px 11px, 100% 100%;
            mix-blend-mode: hard-light;
            opacity: 0.88;
        }

        .about-collage-field {
            position: absolute;
            top: -28vh;
            left: -34vw;
            right: -34vw;
            height: calc(100% + 56vh);
            min-height: 156vh;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.95;
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .about-collage-field::before,
        .about-collage-field::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .about-collage-field::before {
            z-index: 410;
            background:
                linear-gradient(90deg, rgba(5, 5, 5, 0.36) 0 20%, rgba(5, 5, 5, 0.04) 38%, rgba(5, 5, 5, 0) 76%, rgba(5, 5, 5, 0.18) 100%),
                repeating-linear-gradient(0deg, rgba(241, 234, 210, 0.1) 0 1px, transparent 1px 7px),
                repeating-linear-gradient(90deg, rgba(255, 42, 0, 0.06) 0 1px, transparent 1px 9px);
            mix-blend-mode: normal;
        }

        .about-collage-field::after {
            z-index: 420;
            opacity: 0.2;
            background:
                radial-gradient(circle, rgba(241, 234, 210, 0.8) 0 1px, transparent 1.6px),
                radial-gradient(circle, rgba(5, 5, 5, 0.62) 0 1px, transparent 1.9px);
            background-position: 0 0, 3px 5px;
            background-size: 8px 8px, 11px 11px;
            mix-blend-mode: overlay;
        }

        .edge-pan-cues {
            position: fixed;
            inset: 0;
            z-index: 760;
            pointer-events: none;
            opacity: 0.56;
            transition: opacity 180ms ease;
        }

        .edge-cue {
            position: absolute;
            display: block;
            width: clamp(32px, 4vw, 54px);
            height: clamp(86px, 15vh, 164px);
            background:
                radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.74) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.09) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, rgba(255, 248, 223, 0.98), rgba(230, 255, 0, 0.84));
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.64) inset,
                5px 6px 0 rgba(5, 5, 5, 0.72),
                0 0 0 1px rgba(5, 5, 5, 0.3);
            clip-path: polygon(0 8%, 86% 0, 100% 20%, 88% 42%, 100% 64%, 82% 100%, 0 92%);
            transform-origin: center;
            transition: opacity 160ms ease, transform 160ms ease, background 160ms ease;
        }

        .edge-cue::after {
            content: "";
            position: absolute;
            inset: 50% auto auto 50%;
            width: 16px;
            height: 16px;
            border: solid #050505;
            border-width: 0 4px 4px 0;
            transform: translate(-64%, -50%) rotate(135deg);
            opacity: 0.96;
        }

        .edge-cue-left {
            left: 0;
            top: 50%;
            transform: translate(-34%, -50%) rotate(-2deg);
        }

        .edge-cue-right {
            right: 0;
            top: 50%;
            transform: translate(34%, -50%) rotate(2deg) scaleX(-1);
        }

        .edge-cue-top,
        .edge-cue-bottom {
            left: 50%;
            width: clamp(84px, 14vw, 156px);
            height: clamp(28px, 3.8vw, 46px);
        }

        .edge-cue-top {
            top: 0;
            transform: translate(-50%, -32%) rotate(1.5deg);
        }

        .edge-cue-bottom {
            bottom: 0;
            transform: translate(-50%, 32%) rotate(-1.5deg) scaleY(-1);
        }

        .edge-cue-top::after,
        .edge-cue-bottom::after {
            transform: translate(-50%, -68%) rotate(45deg);
        }

        body.is-edge-zone .edge-pan-cues {
            opacity: 0.78;
        }

        body.is-edge-left .edge-cue-left {
            opacity: 1;
            transform: translate(-32%, -50%) rotate(-4deg);
            background:
                radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.1) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, #e6ff00, #fff8df);
        }

        body.is-edge-right .edge-cue-right {
            opacity: 1;
            transform: translate(32%, -50%) rotate(4deg) scaleX(-1);
            background:
                radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.1) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, #e6ff00, #fff8df);
        }

        body.is-edge-top .edge-cue-top {
            opacity: 1;
            transform: translate(-50%, -28%) rotate(3deg);
            background:
                radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.1) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, #e6ff00, #fff8df);
        }

        body.is-edge-bottom .edge-cue-bottom {
            opacity: 1;
            transform: translate(-50%, 28%) rotate(-3deg) scaleY(-1);
            background:
                radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.1) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, #e6ff00, #fff8df);
        }

        .about-collage-tile {
            --x: 50vw;
            --y: 50vh;
            --w: 18vw;
            --r: 0deg;
            --z: 10;
            --o: 0.8;
            --sx: 1;
            --sy: 1;
            --clip: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            --inner-clip: polygon(2% 1%, 99% 3%, 97% 98%, 1% 96%);
            --paper-pad: clamp(6px, 0.72vw, 13px);

            position: absolute;
            left: var(--x);
            top: var(--y);
            z-index: var(--z);
            width: var(--w);
            min-width: 92px;
            max-width: 430px;
            margin: 0;
            padding: var(--paper-pad);
            opacity: var(--o);
            background:
                radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.8) 0 1px, transparent 1.7px),
                radial-gradient(circle at 72% 66%, rgba(5, 5, 5, 0.12) 0 1px, transparent 1.9px),
                repeating-linear-gradient(97deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, #fff9e6, #e9ddbd 72%, #fff6dc);
            background-size: 9px 9px, 13px 13px, auto, auto;
            border: 0;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.72) inset,
                0 -1px 0 rgba(5, 5, 5, 0.22) inset,
                0 11px 19px rgba(5, 5, 5, 0.34),
                0 28px 54px rgba(5, 5, 5, 0.22);
            clip-path: var(--clip);
            transform: translate(-50%, -50%) rotate(var(--r)) scale(var(--sx), var(--sy));
            transform-origin: center;
            mix-blend-mode: normal;
            filter: none;
            overflow: hidden;
            contain: layout paint style;
            backface-visibility: hidden;
        }

        .about-collage-tile.is-screen {
            mix-blend-mode: normal;
            filter: none;
        }

        .about-collage-tile.is-hard {
            mix-blend-mode: normal;
            filter: none;
        }

        .about-collage-tile.is-paper {
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.86) 0 1px, transparent 1.7px),
                repeating-linear-gradient(84deg, rgba(5, 5, 5, 0.09) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, rgba(255, 252, 232, 0.98), rgba(230, 255, 0, 0.26)),
                var(--paper);
        }

        .about-collage-tile.is-taped {
            overflow: visible;
        }

        .about-collage-tile.is-taped::before {
            inset: -14px -10px;
            opacity: 0.9;
            background:
                linear-gradient(104deg, transparent 0 11%, rgba(230, 255, 0, 0.72) 11% 31%, transparent 31% 100%),
                linear-gradient(-12deg, transparent 0 65%, rgba(255, 248, 222, 0.72) 65% 84%, transparent 84% 100%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.4) 0 9px, transparent 9px calc(100% - 8px), rgba(5, 5, 5, 0.08) calc(100% - 8px) 100%),
                repeating-linear-gradient(118deg, rgba(255, 255, 255, 0.24) 0 1px, transparent 1px 6px);
            mix-blend-mode: normal;
        }

        .about-collage-tile img {
            display: block;
            width: 100%;
            aspect-ratio: var(--ratio, 4 / 5);
            object-fit: cover;
            clip-path: var(--inner-clip);
            box-shadow:
                0 0 0 1px rgba(5, 5, 5, 0.28),
                0 2px 8px rgba(5, 5, 5, 0.24);
            filter: none;
        }

        .about-collage-tile::before,
        .about-collage-tile::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .about-collage-tile::before {
            z-index: 2;
            opacity: 0.58;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.56) 0 9px, transparent 9px calc(100% - 8px), rgba(5, 5, 5, 0.08) calc(100% - 8px) 100%),
                linear-gradient(0deg, rgba(5, 5, 5, 0.1) 0 7px, transparent 7px calc(100% - 10px), rgba(255, 255, 255, 0.42) calc(100% - 10px) 100%),
                repeating-linear-gradient(118deg, rgba(255, 255, 255, 0.34) 0 1px, transparent 1px 6px);
            mix-blend-mode: soft-light;
        }

        .about-collage-tile::after {
            z-index: 3;
            opacity: 0.2;
            background:
                repeating-linear-gradient(94deg, rgba(5, 5, 5, 0.22) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, rgba(255, 255, 255, 0.3), transparent 52%);
            mix-blend-mode: overlay;
        }

        .nav-overlay {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 900;
            height: 74px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(1rem, 3vw, 2.4rem);
            pointer-events: none;
        }

        .nav-overlay > * {
            pointer-events: auto;
        }

        .logo-minimal,
        .nav-links a {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.09em;
            line-height: 1;
            color: #050505;
            text-transform: uppercase;
            text-decoration: none;
        }

        .logo-minimal {
            padding: 0.58rem 0.72rem 0.54rem;
            position: relative;
            background:
                radial-gradient(circle at 18% 30%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px),
                repeating-linear-gradient(99deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, #fff8df, #e8dcc2);
            border-radius: 0;
            clip-path: polygon(3% 0, 100% 8%, 94% 100%, 0 86%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.72) inset,
                6px 7px 0 rgba(5, 5, 5, 0.78),
                10px 11px 0 rgba(255, 42, 0, 0.82);
            transform: rotate(-2deg);
        }

        .nav-links {
            display: flex;
            gap: 0.48rem;
            padding: 0;
            background: transparent;
            border-radius: 0;
            box-shadow: none;
            backdrop-filter: none;
        }

        .nav-links a {
            padding: 0.56rem 0.7rem 0.52rem;
            border-radius: 0;
            opacity: 0.92;
            position: relative;
            background:
                radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.74) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, #fff8df, #e6d7b8);
            clip-path: polygon(0 7%, 92% 0, 100% 80%, 8% 100%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.68) inset,
                4px 5px 0 rgba(5, 5, 5, 0.66);
            transform: rotate(var(--nav-rotate, 1deg));
            transition: transform 150ms ease, color 150ms ease, opacity 150ms ease;
        }

        .nav-links a:nth-child(2n) {
            --nav-rotate: -1.6deg;
        }

        .nav-links a:nth-child(3n) {
            --nav-rotate: 2deg;
        }

        .nav-links a:hover,
        .nav-links a:focus-visible,
        .nav-links a[aria-current="page"] {
            background:
                radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.78) 0 1px, transparent 1.8px),
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.09) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, var(--active), #fff9df);
            color: #050505;
            opacity: 1;
            outline: none;
            transform: translate(-2px, -2px) rotate(var(--nav-rotate, 1deg));
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.74) inset,
                5px 6px 0 var(--hot),
                9px 10px 0 rgba(5, 5, 5, 0.74);
        }

        .about-poster {
            position: relative;
            z-index: 500;
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(500px, 0.82fr) minmax(480px, 0.92fr);
            gap: clamp(0.8rem, 2.4vw, 3.2rem);
            align-items: center;
            padding: 82px clamp(0.8rem, 3vw, 3rem) clamp(1.2rem, 4vh, 3rem);
        }

        .about-index {
            position: relative;
            display: grid;
            gap: clamp(0.86rem, 2.2vh, 1.42rem);
            max-width: 880px;
            padding-left: clamp(0rem, 3vw, 2.6rem);
            isolation: isolate;
        }

        .about-index::before {
            content: "";
            position: absolute;
            left: -1.6rem;
            top: -1.3rem;
            bottom: -1.3rem;
            width: clamp(10px, 1.2vw, 18px);
            border-radius: 0;
            background:
                repeating-linear-gradient(180deg, var(--gold) 0 9px, #050505 9px 13px, var(--hot) 13px 18px, #f1ead2 18px 22px);
            box-shadow: 5px 0 0 #050505, 11px 0 0 var(--hot), 18px 0 0 #050505;
        }

        .about-index::after {
            content: "";
            position: absolute;
            z-index: -1;
            left: clamp(-0.4rem, 1.5vw, 1rem);
            top: -2.4vh;
            width: min(44vw, 690px);
            height: min(82vh, 760px);
            background:
                radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.36) 0 1px, transparent 1.8px),
                repeating-linear-gradient(94deg, rgba(5, 5, 5, 0.1) 0 1px, transparent 1px 9px),
                linear-gradient(96deg, rgba(255, 248, 222, 0.42) 0 55%, rgba(241, 234, 210, 0.18) 72%, transparent 100%);
            background-size: 12px 12px, auto, auto;
            clip-path: polygon(2% 0, 90% 4%, 82% 17%, 98% 31%, 86% 49%, 100% 65%, 80% 82%, 92% 100%, 0 96%, 4% 74%, 0 51%, 5% 25%);
            filter: contrast(1.04);
            transform: rotate(-1.2deg);
            box-shadow: 18px 26px 46px rgba(5, 5, 5, 0.32);
            pointer-events: none;
        }

        .index-group {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr);
            gap: clamp(0.8rem, 2vw, 1.25rem);
            align-items: baseline;
            position: relative;
            z-index: 1;
        }

        .index-label {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.56rem, 0.72vw, 0.68rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            line-height: 1;
            width: max-content;
            padding: 0.42em 0.56em;
            color: #050505;
            background:
                repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.12) 0 1px, transparent 1px 6px),
                linear-gradient(135deg, var(--active), #fff9e6);
            clip-path: polygon(0 8%, 94% 0, 100% 72%, 88% 100%, 7% 94%);
            text-transform: uppercase;
            text-shadow: none;
            box-shadow: 5px 5px 0 rgba(5, 5, 5, 0.78);
            transform: rotate(-6deg);
            transform-origin: right center;
        }

        .index-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.52rem 0.7rem;
            align-items: center;
        }

        .index-item {
            appearance: none;
            border: 0;
            border-radius: 0;
            margin: 0;
            padding: 0.08em 0.16em 0.13em;
            position: relative;
            display: inline-block;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 28%, rgba(255, 255, 255, 0.74) 0 1px, transparent 1.7px),
                radial-gradient(circle at 84% 62%, rgba(5, 5, 5, 0.1) 0 1px, transparent 1.8px),
                repeating-linear-gradient(101deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, #fff7dc 0 64%, #e6d8b8 100%);
            background-size: 10px 10px, 13px 13px, auto, auto;
            color: #050505;
            font-family: "Anton", "Arial Narrow", "Arial Black", system-ui, sans-serif;
            font-size: clamp(1.48rem, 3.56vw, 4.8rem);
            font-weight: 400;
            letter-spacing: 0.015em;
            line-height: 0.82;
            white-space: nowrap;
            text-decoration: none;
            text-transform: uppercase;
            -webkit-text-stroke: 0;
            text-shadow:
                0.015em 0.018em 0 rgba(255, 42, 0, 0.42),
                0.035em 0.036em 0 rgba(5, 5, 5, 0.2);
            clip-path: polygon(1% 0, 99% 4%, 96% 95%, 7% 100%, 0 73%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.74) inset,
                0 -1px 0 rgba(5, 5, 5, 0.2) inset,
                7px 8px 0 rgba(5, 5, 5, 0.74);
            transform: rotate(var(--item-rotate, -1deg));
            transition: color 160ms ease, opacity 160ms ease, transform 160ms ease;
        }

        .index-item::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.28;
            pointer-events: none;
            background:
                repeating-linear-gradient(91deg, rgba(5, 5, 5, 0.18) 0 1px, transparent 1px 7px),
                linear-gradient(135deg, rgba(255, 255, 255, 0.24), transparent 54%);
            mix-blend-mode: overlay;
        }

        .index-items .index-item:nth-child(4n + 1) {
            --item-rotate: -2.4deg;
            color: #050505;
        }

        .index-items .index-item:nth-child(4n + 3) {
            --item-rotate: 1.6deg;
            color: #c00000;
            background:
                radial-gradient(circle at 18% 28%, rgba(255, 255, 255, 0.68) 0 1px, transparent 1.7px),
                repeating-linear-gradient(104deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, #fff8e3 0 70%, #f1cbbb 100%);
        }

        .index-items .index-item:nth-child(4n + 5) {
            --item-rotate: 2.2deg;
            color: #003fbd;
            background:
                radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.72) 0 1px, transparent 1.7px),
                repeating-linear-gradient(92deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, #fff8df 0 68%, #cddcff 100%);
        }

        .index-item.is-static {
            cursor: default !important;
        }

        .index-item.is-visual {
            text-decoration: none;
            text-decoration-thickness: 0.06em;
            text-decoration-color: transparent;
            text-underline-offset: 0.1em;
        }

        .index-sep {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.82rem, 1.45vw, 1.52rem);
            font-weight: 700;
            color: #050505;
            line-height: 1;
            padding: 0.08em 0.24em;
            background: rgba(230, 255, 0, 0.88);
            clip-path: polygon(0 14%, 100% 0, 86% 100%, 8% 88%);
            box-shadow: 3px 4px 0 rgba(5, 5, 5, 0.74);
            transform: rotate(8deg);
        }

            opacity: 0.82;

            opacity: 1;
            outline: none;
            transform: translate(-0.04em, -0.07em) rotate(calc(var(--item-rotate, -1deg) - 1deg)) scale(1.04);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.74) inset,
                0 -1px 0 rgba(5, 5, 5, 0.22) inset,
                8px 9px 0 var(--hot),

                0.014em 0.017em 0 rgba(255, 42, 0, 0.45),
                0.032em 0.034em 0 rgba(5, 5, 5, 0.2);
            text-decoration-color: var(--active);
        }

        .image-orbit {
            position: relative;
            display: grid;
            place-items: center;
            min-height: min(78vh, 780px);
            z-index: 2;
        }

        .image-orbit::before,
        .image-orbit::after {
            content: "";
            position: absolute;
            z-index: -1;
            pointer-events: none;
        }

        .image-orbit::before {
            width: min(68vw, 940px);
            height: min(70vw, 940px);
            background:
                radial-gradient(circle at 16% 22%, rgba(255, 255, 255, 0.72) 0 1px, transparent 1.9px),
                radial-gradient(circle at 82% 70%, rgba(5, 5, 5, 0.1) 0 1px, transparent 2px),
                repeating-linear-gradient(98deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 9px),
                linear-gradient(135deg, rgba(255, 248, 224, 0.95), rgba(229, 216, 188, 0.86) 68%, rgba(255, 249, 228, 0.74));
            background-size: 12px 12px, 16px 16px, auto, auto;
            clip-path: polygon(4% 2%, 22% 0, 39% 4%, 58% 1%, 80% 5%, 96% 0, 100% 20%, 94% 39%, 100% 58%, 92% 84%, 98% 100%, 73% 96%, 52% 100%, 31% 95%, 8% 100%, 0 82%, 4% 58%, 0 36%);
            filter: saturate(1.04) contrast(1.04);
            transform: translate3d(0, 0, 0) rotate(-5deg);
            opacity: 0.9;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.72) inset,
                22px 30px 64px rgba(5, 5, 5, 0.34);
        }

        .image-orbit::after {
            width: min(43vw, 560px);
            height: min(43vw, 560px);
            background:
                linear-gradient(99deg, transparent 0 9%, rgba(230, 255, 0, 0.62) 9% 23%, transparent 23% 100%),
                linear-gradient(-8deg, transparent 0 62%, rgba(255, 248, 222, 0.72) 62% 80%, transparent 80% 100%),
                repeating-linear-gradient(112deg, rgba(5, 5, 5, 0.12) 0 1px, transparent 1px 8px);
            mix-blend-mode: normal;
            transform: translate(10%, -8%) rotate(13deg);
            opacity: 0.74;
        }

        .image-frame {
            position: relative;
            width: min(55vw, 840px);
            aspect-ratio: 1.03;
            display: grid;
            padding: clamp(0.86rem, 1.35vw, 1.32rem);
            background:
                radial-gradient(circle at 16% 24%, rgba(255, 255, 255, 0.8) 0 1px, transparent 1.9px),
                radial-gradient(circle at 74% 70%, rgba(5, 5, 5, 0.1) 0 1px, transparent 2px),
                repeating-linear-gradient(97deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 9px),
                linear-gradient(135deg, #fff8df, #e5d7b8);
            background-size: 11px 11px, 15px 15px, auto, auto;
            clip-path: polygon(3% 0, 20% 4%, 42% 1%, 62% 5%, 86% 0, 100% 15%, 94% 39%, 100% 64%, 92% 90%, 74% 100%, 52% 95%, 30% 100%, 0 92%, 7% 65%, 0 36%);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.72) inset,
                0 -1px 0 rgba(5, 5, 5, 0.2) inset,
                13px 16px 0 rgba(5, 5, 5, 0.78),
                22px 28px 0 rgba(255, 42, 0, 0.72),
                0 28px 70px rgba(5, 5, 5, 0.34);
            transform: rotate(-1.5deg);
            overflow: visible;
        }

        .image-frame::before {
            content: "";
            position: absolute;
            inset: -1.2rem -0.9rem;
            z-index: -1;
            background:
                linear-gradient(96deg, transparent 0 10%, rgba(230, 255, 0, 0.72) 10% 30%, transparent 30% 100%),
                linear-gradient(-12deg, transparent 0 66%, rgba(255, 248, 222, 0.78) 66% 84%, transparent 84% 100%),
                repeating-linear-gradient(88deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px);
            clip-path: polygon(4% 8%, 100% 0, 94% 92%, 0 100%);
            transform: rotate(-4deg) scale(1.03);
        }

        .image-frame::after {
            content: "";
            position: absolute;
            inset: clamp(0.86rem, 1.35vw, 1.32rem);
            z-index: 2;
            pointer-events: none;
            opacity: 0.24;
            background:
                repeating-linear-gradient(94deg, rgba(5, 5, 5, 0.22) 0 1px, transparent 1px 8px),
                linear-gradient(135deg, rgba(255, 255, 255, 0.36), transparent 54%);
            mix-blend-mode: overlay;
            clip-path: polygon(2% 2%, 98% 4%, 96% 96%, 8% 99%, 0 72%);
        }

        .about-image {
            width: 100%;
            height: 100%;
            min-height: 0;
            object-fit: cover;
            object-position: var(--image-position, center);
            transform: scale(var(--image-scale, 1));
            background: #050505;
            clip-path: polygon(2% 2%, 98% 4%, 96% 96%, 8% 99%, 0 72%);
            box-shadow:
                0 0 0 1px rgba(5, 5, 5, 0.28),
                0 4px 14px rgba(5, 5, 5, 0.28);
            filter: saturate(1.12) contrast(1.06) brightness(1.08);
            transition: opacity 160ms ease, transform 200ms ease;
        }

        .image-frame.is-contained {
            background:
                repeating-linear-gradient(97deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 9px),
                linear-gradient(135deg, #fff8df, #e5d7b8);

        .image-frame.is-contained .about-image {
            object-fit: contain;
            padding: clamp(2rem, 4vw, 4.4rem);
            background: #fff8df;
            transform: none;
        }

        @media (max-width: 980px) {
            body.about-vector {
                overflow-y: auto;
            }

            .about-collage-field {
                top: -24vh;
                left: -58vw;
                right: -58vw;
                height: calc(100% + 48vh);
                min-height: 148vh;
                opacity: 0.86;
                transform: translate3d(0, 0, 0);
            }

            .about-collage-tile {
                min-width: 78px;
                box-shadow:
                    0 0 0 3px rgba(241, 234, 210, 0.45),
                    0 12px 24px rgba(5, 5, 5, 0.38);
            }

            .edge-pan-cues {
                opacity: 0.5;
            }

            .edge-cue-left,
            .edge-cue-right {
                width: 30px;
                height: 110px;
            }

            .psychedelic-field {
                inset: -5vh -40vw;
                width: 180vw;
                height: 120vh;
            }

            .about-poster {
                grid-template-columns: 1fr;
                align-items: start;
                gap: 2rem;
                padding: 86px 1rem calc(7.2rem + env(safe-area-inset-bottom));
            }

            .about-index {
                max-width: none;
                gap: 0.96rem;
                padding-left: 1rem;
            }

            .about-index::before {
                left: 0;
                top: -0.6rem;
                bottom: -0.6rem;
            }

            .about-index::after {
                left: 1rem;
                top: -1.2rem;
                width: min(100vw, 560px);
                height: 56vh;
                background:
                    radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.34) 0 1px, transparent 1.8px),
                    repeating-linear-gradient(94deg, rgba(5, 5, 5, 0.1) 0 1px, transparent 1px 9px),
                    linear-gradient(96deg, rgba(255, 248, 222, 0.42) 0 70%, rgba(241, 234, 210, 0.18) 88%, transparent 100%);
            }

            .index-group {
                grid-template-columns: 62px minmax(0, 1fr);
                gap: 0.72rem;
            }

            .index-item {
                font-size: clamp(0.98rem, 4.9vw, 1.6rem);
                line-height: 0.94;
                -webkit-text-stroke-width: 0;
                text-shadow:
                    0.014em 0.017em 0 rgba(255, 42, 0, 0.42),
                    0.032em 0.034em 0 rgba(5, 5, 5, 0.2);
            }

            .image-orbit {
                min-height: 40vh;
            }

            .image-orbit::before {
                width: 108vw;
                height: 108vw;
            }

            .image-frame {
                width: min(92vw, 520px);
            }
        }

        @media (max-width: 768px) {
            .nav-overlay {
                height: 64px;
                padding: 0 20px;
            }

            .nav-links {
                position: fixed;
                left: 12px;
                right: 12px;
                bottom: calc(10px + env(safe-area-inset-bottom));
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 6px;
                padding: 0;
                background: transparent;
                border-radius: 0;
                box-shadow: none;
            }

            .nav-links a {
                display: block;
                text-align: center;
                padding: 8px 4px;
                font-size: 10px;
                background:
                    radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.74) 0 1px, transparent 1.8px),
                    repeating-linear-gradient(96deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 8px),
                    linear-gradient(135deg, #fff8df, #e6d7b8);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .psychedelic-field,
            .image-orbit::before,
            .edge-pan-cues,
            .edge-cue,
            .index-item,
            .about-image {
                transition: none;
                transform: none;
            }
        }
    </style>

    <script>
        const aboutCollage = document.getElementById('aboutCollage');
        const aboutIndex = document.getElementById('aboutIndex');
        const imageFrame = document.getElementById('imageFrame');
        const aboutImage = document.getElementById('aboutImage');
        const psychedelicField = document.querySelector('.psychedelic-field');
        const visualItems = Array.from(document.querySelectorAll('[data-visual]'));
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        const collageImageCount = 81;
        const isSmallViewport = window.matchMedia('(max-width: 760px)').matches;
        const collageTileCount = isSmallViewport ? 116 : 196;
        const initialCollageTileCount = isSmallViewport ? 30 : 44;
        const initialCollageSourceCount = isSmallViewport ? 10 : 12;
        const desktopCoverageTiles = [
            [-31, -14, 48, -8], [4, -12, 48, 6], [39, -15, 50, -4], [74, -12, 48, 8], [109, -14, 50, -7],
            [-33, 9, 50, 7], [3, 10, 52, -5], [40, 8, 54, 4], [77, 10, 52, -8], [113, 9, 50, 6],
            [-31, 32, 52, -6], [6, 31, 50, 9], [43, 33, 54, -3], [80, 32, 52, 7], [116, 31, 52, -5],
            [-33, 56, 50, 8], [3, 58, 54, -7], [42, 56, 52, 5], [80, 58, 54, -8], [117, 56, 50, 6],
            [-31, 80, 52, -5], [6, 82, 50, 7], [43, 80, 54, -6], [81, 83, 52, 4], [117, 80, 54, -7],
            [-33, 105, 50, 5], [3, 107, 52, -8], [42, 104, 54, 6], [81, 107, 52, -5], [118, 105, 50, 7],
            [-31, 130, 52, -7], [6, 132, 50, 5], [43, 129, 54, -4], [82, 132, 52, 8], [118, 130, 52, -6]
        ];
        const mobileCoverageTiles = [
            [-48, -10, 92, -7], [28, -12, 94, 6], [104, -10, 92, -5],
            [-46, 16, 94, 8], [30, 15, 96, -6], [108, 17, 94, 7],
            [-48, 43, 96, -5], [30, 45, 98, 6], [110, 42, 96, -8],
            [-46, 72, 96, 7], [30, 73, 98, -5], [110, 71, 96, 6],
            [-48, 101, 94, -6], [30, 103, 98, 8], [110, 101, 96, -7],
            [-46, 130, 96, 6], [30, 132, 98, -8], [110, 130, 96, 7]
        ];
        const coverageTiles = isSmallViewport ? mobileCoverageTiles : desktopCoverageTiles;
        const collageSources = Array.from({ length: collageImageCount }, (_, index) => (
            `assets/about-collage-light/about-collage-${String(index + 1).padStart(3, '0')}.jpg`
        ));
        const collageClips = [
            'polygon(0 4%, 7% 0, 21% 3%, 36% 0, 54% 4%, 74% 1%, 100% 6%, 96% 28%, 100% 48%, 94% 72%, 98% 96%, 78% 100%, 60% 96%, 42% 100%, 22% 95%, 4% 100%, 0 78%, 3% 56%, 0 34%)',
            'polygon(6% 0, 28% 3%, 47% 0, 66% 4%, 88% 1%, 100% 11%, 96% 31%, 100% 58%, 93% 81%, 99% 100%, 74% 96%, 55% 100%, 33% 95%, 10% 100%, 0 88%, 4% 61%, 0 38%, 5% 18%)',
            'polygon(0 12%, 12% 4%, 31% 0, 50% 5%, 70% 0, 95% 6%, 100% 26%, 95% 46%, 100% 70%, 92% 93%, 68% 100%, 47% 96%, 27% 100%, 4% 92%, 0 72%, 5% 50%, 0 30%)',
            'polygon(10% 0, 25% 5%, 43% 1%, 62% 6%, 82% 0, 100% 16%, 94% 37%, 99% 61%, 87% 82%, 92% 100%, 66% 94%, 49% 100%, 25% 93%, 0 98%, 6% 72%, 0 52%, 8% 31%, 2% 12%)',
            'polygon(0 0, 19% 4%, 35% 0, 52% 5%, 69% 0, 86% 4%, 100% 18%, 95% 39%, 100% 63%, 92% 100%, 70% 94%, 53% 100%, 31% 95%, 11% 99%, 0 78%, 4% 57%, 0 33%)',
            'polygon(4% 6%, 22% 0, 45% 5%, 63% 1%, 83% 6%, 100% 0, 94% 24%, 100% 47%, 94% 82%, 72% 100%, 50% 95%, 28% 100%, 0 92%, 5% 67%, 0 42%, 7% 18%)'
        ];
        const collageInnerClips = [
            'polygon(2% 3%, 98% 1%, 96% 97%, 4% 95%)',
            'polygon(3% 1%, 97% 4%, 99% 92%, 2% 98%)',
            'polygon(1% 7%, 94% 2%, 98% 98%, 6% 94%)',
            'polygon(6% 2%, 99% 5%, 94% 96%, 1% 99%)',
            'polygon(2% 2%, 96% 1%, 99% 88%, 82% 98%, 4% 96%)',
            'polygon(4% 1%, 99% 3%, 96% 98%, 18% 94%, 1% 82%)'
        ];
        const coverageClip = 'polygon(0 2%, 12% 0, 27% 2%, 44% 0, 62% 3%, 80% 1%, 100% 4%, 98% 24%, 100% 48%, 97% 74%, 100% 98%, 82% 100%, 63% 97%, 45% 100%, 26% 97%, 7% 100%, 0 88%, 2% 65%, 0 42%, 2% 18%)';
        const coverageInnerClip = 'polygon(1% 1%, 99% 2%, 98% 98%, 2% 99%)';

        function seededRandom(seed) {
            let value = seed >>> 0;
            return () => {
                value += 0x6D2B79F5;
                let next = value;
                next = Math.imul(next ^ (next >>> 15), next | 1);
                next ^= next + Math.imul(next ^ (next >>> 7), next | 61);
                return ((next ^ (next >>> 14)) >>> 0) / 4294967296;
            };
        }

        function pick(random, values) {
            return values[Math.floor(random() * values.length)];
        }

        function makeCollageTile(index, total, random) {
            const figure = document.createElement('figure');
            const image = document.createElement('img');
            const depth = index / Math.max(1, total - 1);
            const coverageTile = coverageTiles[index];
            const clusterBias = index % 7 === 0 ? 1 : 0;
            const x = coverageTile
                ? coverageTile[0]
                : clusterBias
                    ? 50 + random() * 90
                    : -28 + random() * 168;
            const y = coverageTile ? coverageTile[1] : -18 + random() * 154;
            const width = coverageTile
                ? coverageTile[2]
                : index % 11 === 0
                    ? 20 + random() * 16
                    : index % 5 === 0
                        ? 13 + random() * 13
                        : 6 + random() * 13;
            const rotate = coverageTile ? coverageTile[3] : -29 + random() * 58;
            const opacity = coverageTile ? 0.74 + random() * 0.16 : 0.58 + random() * 0.38;
            const scaleX = random() > 0.82 ? -1 : 1;
            const scaleY = 0.9 + random() * 0.22;
            const ratios = ['4 / 5', '1 / 1', '16 / 10', '9 / 13', '3 / 4', '5 / 3'];

            figure.className = 'about-collage-tile';
            if (index % 13 === 0) {
                figure.classList.add('is-screen');
            } else if (index % 17 === 0) {
                figure.classList.add('is-hard');
            } else if (index % 4 === 0) {
                figure.classList.add('is-paper');
            }
            if (index % 9 === 0 || index % 16 === 0) {
                figure.classList.add('is-taped');
            }
            if (coverageTile) {
                figure.classList.add('is-paper');
            }

            figure.style.setProperty('--x', `${x.toFixed(2)}vw`);
            figure.style.setProperty('--y', `${y.toFixed(2)}vh`);
            figure.style.setProperty('--w', `${width.toFixed(2)}vw`);
            figure.style.setProperty('--r', `${rotate.toFixed(2)}deg`);
            figure.style.setProperty('--z', String(10 + Math.floor(depth * 360)));
            figure.style.setProperty('--o', opacity.toFixed(3));
            figure.style.setProperty('--sx', String(scaleX));
            figure.style.setProperty('--sy', scaleY.toFixed(3));
            figure.style.setProperty('--ratio', pick(random, ratios));
            figure.style.setProperty('--clip', coverageTile ? coverageClip : pick(random, collageClips));
            figure.style.setProperty('--inner-clip', coverageTile ? coverageInnerClip : pick(random, collageInnerClips));
            figure.style.setProperty('--paper-pad', `${(5 + random() * 11).toFixed(1)}px`);

            const sourceIndex = index < initialCollageTileCount
                ? index % initialCollageSourceCount
                : index % collageSources.length;
            image.src = collageSources[sourceIndex];
            image.alt = '';
            image.decoding = 'async';
            image.loading = index < 12 ? 'eager' : 'lazy';
            if (index < 8) {
                image.fetchPriority = 'high';
            }

            figure.appendChild(image);
            return figure;
        }

        function appendCollageTiles(startIndex, endIndex, random) {
            const fragment = document.createDocumentFragment();
            for (let index = startIndex; index < endIndex; index += 1) {
                fragment.appendChild(makeCollageTile(index, collageTileCount, random));
            }
            aboutCollage.appendChild(fragment);
        }

        function scheduleCollageRemainder(startIndex, random) {
            let cursor = startIndex;
            const chunkSize = isSmallViewport ? 16 : 22;
            const appendChunk = () => {
                const nextCursor = Math.min(collageTileCount, cursor + chunkSize);
                appendCollageTiles(cursor, nextCursor, random);
                cursor = nextCursor;

                if (cursor >= collageTileCount) {
                    return;
                }

                if ('requestIdleCallback' in window) {
                    window.requestIdleCallback(appendChunk, { timeout: 1800 });
                    return;
                }

                window.setTimeout(appendChunk, 180);
            };

            if ('requestIdleCallback' in window) {
                window.requestIdleCallback(appendChunk, { timeout: 1200 });
                return;
            }

            window.setTimeout(appendChunk, 180);
        }

        function buildAboutCollage() {
            if (!aboutCollage) {
                return;
            }

            const random = seededRandom(0xAB0110);
            aboutCollage.replaceChildren();
            appendCollageTiles(0, initialCollageTileCount, random);

            const loadRemainder = () => scheduleCollageRemainder(initialCollageTileCount, random);
            if (document.readyState === 'complete') {
                loadRemainder();
                return;
            }

            window.addEventListener('load', loadRemainder, { once: true });
        }

        const visuals = {
            sf: {
                src: 'assets/images/about/home-sanfrancisco.jpg',
                alt: 'San Francisco skyline view',
                accent: '#e6ff00',
                position: 'center',
                scale: 1
            },
            artegna: {
                src: 'assets/images/about/home-artegna-about.jpg',
                alt: 'Artegna town view',
                accent: '#ff4b16',
                position: 'center',
                scale: 1.15
            },
            merthyr: {
                src: 'assets/images/about/home-merthyr.jpg',
                alt: 'Merthyr Tydfil town view',
                accent: '#0057ff',
                position: 'center',
                scale: 1.03
            },
            chess: {
                src: 'assets/images/about/chess-knight.svg',
                alt: 'Chess knight illustration',
                accent: '#ff2a00',
                position: 'center',
                scale: 1,
                fit: 'contain'
            },
            frontier: {
                src: 'assets/images/projects/preview-mind-about.jpg',
                alt: 'Private search project preview',
                accent: '#e6ff00',
                position: 'center',
                scale: 1
            }
        };

        let activeVisualKey = null;
        let edgeFrame = 0;
        let edgeDriveX = 0;
        let edgeDriveY = 0;
        let panX = 0;
        let panY = 0;

        function warmVisualImages() {
            Object.values(visuals).forEach((visual) => {
                if (!visual.src || visual.src === aboutImage.getAttribute('src')) {
                    return;
                }

                const image = new Image();
                image.decoding = 'async';
                image.src = visual.src;

                if (image.decode) {
                    image.decode().catch(() => {});
                }
            });
        }

        function scheduleVisualWarmup() {
            if ('requestIdleCallback' in window) {
                window.requestIdleCallback(warmVisualImages, { timeout: 2200 });
                return;
            }

            window.setTimeout(warmVisualImages, 700);
        }

        function setVisual(key) {
            const visualKey = visuals[key] ? key : 'sf';

            if (activeVisualKey === visualKey) {
                return;
            }

            const visual = visuals[visualKey];
            activeVisualKey = visualKey;

            visualItems.forEach((item) => {
                item.classList.toggle('is-active', item.dataset.visual === visualKey);
            });

            aboutIndex.classList.add('has-active');
            document.body.style.setProperty('--active', visual.accent);
            aboutImage.src = visual.src;
            aboutImage.alt = visual.alt;
            aboutImage.style.setProperty('--image-position', visual.position || 'center');
            aboutImage.style.setProperty('--image-scale', visual.scale || 1);
            imageFrame.classList.toggle('is-contained', visual.fit === 'contain');
        }

        visualItems.forEach((item) => {
            const activate = () => setVisual(item.dataset.visual);
            item.addEventListener('pointerenter', activate, { passive: true });
            item.addEventListener('focus', activate);
            item.addEventListener('pointerdown', activate, { passive: true });
        });

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function getPanBounds() {
            return {
                x: Math.min(window.innerWidth * (isSmallViewport ? 0.3 : 0.26), isSmallViewport ? 180 : 320),
                y: Math.min(window.innerHeight * (isSmallViewport ? 0.24 : 0.22), isSmallViewport ? 170 : 240)
            };
        }

        function renderCollagePan() {
            const bounds = getPanBounds();
            panX = clamp(panX + edgeDriveX * 10.5, -bounds.x, bounds.x);
            panY = clamp(panY + edgeDriveY * 8.5, -bounds.y, bounds.y);

            if (aboutCollage) {
                aboutCollage.style.transform = `translate3d(${panX.toFixed(1)}px, ${panY.toFixed(1)}px, 0)`;
            }
            if (psychedelicField) {
                psychedelicField.style.transform = `translate3d(${(panX * 0.08).toFixed(1)}px, ${(panY * 0.08).toFixed(1)}px, 0)`;
            }

            if (edgeDriveX || edgeDriveY) {
                edgeFrame = window.requestAnimationFrame(renderCollagePan);
                return;
            }

            edgeFrame = 0;
        }

        function scheduleEdgePan() {
            if (!edgeFrame) {
                edgeFrame = window.requestAnimationFrame(renderCollagePan);
            }
        }

        function setEdgeCueState(left, right, top, bottom) {
            document.body.classList.toggle('is-edge-left', Boolean(left));
            document.body.classList.toggle('is-edge-right', Boolean(right));
            document.body.classList.toggle('is-edge-top', Boolean(top));
            document.body.classList.toggle('is-edge-bottom', Boolean(bottom));
            document.body.classList.toggle('is-edge-zone', Boolean(left || right || top || bottom));
        }

        function clearEdgeDrive() {
            edgeDriveX = 0;
            edgeDriveY = 0;
            setEdgeCueState(0, 0, 0, 0);
        }

        function updateEdgeDrive(event) {
            const edgeX = window.innerWidth * (isSmallViewport ? 0.18 : 0.14);
            const edgeY = window.innerHeight * (isSmallViewport ? 0.18 : 0.14);
            const left = event.clientX < edgeX ? 1 - event.clientX / edgeX : 0;
            const right = event.clientX > window.innerWidth - edgeX
                ? (event.clientX - (window.innerWidth - edgeX)) / edgeX
                : 0;
            const top = event.clientY < edgeY ? 1 - event.clientY / edgeY : 0;
            const bottom = event.clientY > window.innerHeight - edgeY
                ? (event.clientY - (window.innerHeight - edgeY)) / edgeY
                : 0;
            const wasMoving = Boolean(edgeDriveX || edgeDriveY);
            const nextDriveX = left - right;
            const nextDriveY = top - bottom;

            if (!wasMoving && !nextDriveX && !nextDriveY) {
                return;
            }

            edgeDriveX = nextDriveX;
            edgeDriveY = nextDriveY;
            setEdgeCueState(left, right, top, bottom);
            scheduleEdgePan();
        }

        document.addEventListener('pointermove', (event) => {
            if (reducedMotion.matches) {
                return;
            }

            updateEdgeDrive(event);
        }, { passive: true });

        document.addEventListener('pointerleave', clearEdgeDrive, { passive: true });

        window.addEventListener('blur', clearEdgeDrive);

        window.addEventListener('resize', () => {
            const bounds = getPanBounds();
            panX = clamp(panX, -bounds.x, bounds.x);
            panY = clamp(panY, -bounds.y, bounds.y);

            if (aboutCollage) {
                aboutCollage.style.transform = `translate3d(${panX.toFixed(1)}px, ${panY.toFixed(1)}px, 0)`;
            }
            if (psychedelicField) {
                psychedelicField.style.transform = `translate3d(${(panX * 0.08).toFixed(1)}px, ${(panY * 0.08).toFixed(1)}px, 0)`;
            }
        }, { passive: true });

        const requestedVisual = new URLSearchParams(window.location.search).get('visual');
        buildAboutCollage();
        setVisual(visuals[requestedVisual] ? requestedVisual : 'sf');
        scheduleVisualWarmup();
    </script>
</body>
</html>
