<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap');

        body.about-vector {
            background: #f3f1e8;
            color: #0d0d0d;
            overflow: hidden;
            cursor: default !important;
        }

        body.about-vector::before {
            display: none;
        }

        body.about-vector a {
            cursor: pointer !important;
        }

        .about-shell {
            width: min(1500px, 100%);
            height: 100vh;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 46% 54%;
            align-items: center;
            gap: clamp(0.9rem, 1.5vw, 1.5rem);
            padding: 5.1rem clamp(1rem, 2.1vw, 2rem) 1.1rem;
        }

        .about-index {
            align-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0.44rem;
            border: 1px solid rgba(13, 13, 13, 0.2);
            background: rgba(255, 255, 255, 0.48);
            padding: clamp(0.95rem, 1.35vw, 1.45rem);
        }

        .about-line {
            display: grid;
            grid-template-columns: clamp(90px, 8.7vw, 120px) 1fr;
            gap: 0.62rem;
            align-items: baseline;
            padding-bottom: clamp(0.24rem, 0.52vw, 0.38rem);
            border-bottom: 1px solid rgba(13, 13, 13, 0.18);
        }

        .about-key {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-weight: 700;
            font-size: clamp(0.62rem, 0.78vw, 0.78rem);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #0033CC;
            white-space: nowrap;
        }

        .about-value {
            font-family: "Space Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: clamp(0.76rem, 0.95vw, 0.99rem);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .about-formula {
            margin-top: 0.28rem;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.56rem, 0.66vw, 0.68rem);
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: rgba(13, 13, 13, 0.56);
        }

        .about-field {
            position: relative;
            height: min(780px, calc(100vh - 7rem));
            border: 1px solid rgba(13, 13, 13, 0.14);
            background: linear-gradient(140deg, rgba(255, 255, 255, 0.38) 0%, rgba(255, 255, 255, 0.1) 100%);
            overflow: hidden;
            isolation: isolate;
        }

        .shape {
            position: absolute;
            mix-blend-mode: multiply;
            opacity: 0.96;
            transform-origin: center center;
            will-change: transform;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
        }

        .shape-circle {
            border-radius: 50%;
        }

        .shape-capsule {
            border-radius: 999px;
        }

        .shape-rect {
            border-radius: 10px;
        }

        .shape-thin {
            border-radius: 4px;
        }

        .shape.s1 { width: 44%; aspect-ratio: 1 / 1; background: #FF3D00; }
        .shape.s2 { width: 18%; height: 66%; background: #0037FF; }
        .shape.s3 { width: 36%; aspect-ratio: 1 / 1; background: #FFE600; }
        .shape.s4 { width: 24%; height: 30%; background: #0F0F12; }
        .shape.s5 { width: 30%; height: 20%; background: #00D5FF; }
        .shape.s6 { width: 16%; height: 42%; background: #FF1D8E; }

        @media screen and (max-width: 899px) {
            body.about-vector {
                overflow: auto;
            }

            .about-shell {
                height: auto;
                min-height: 100vh;
                grid-template-columns: 1fr;
                align-items: start;
                gap: 0.9rem;
                padding: 5rem 1rem 1.2rem;
            }

            .about-index {
                order: 1;
                gap: 0.48rem;
            }

            .about-line {
                grid-template-columns: 90px 1fr;
                gap: 0.46rem;
            }

            .about-key {
                font-size: 0.62rem;
            }

            .about-value {
                font-size: 0.77rem;
                line-height: 1.23;
            }

            .about-formula {
                font-size: 0.56rem;
            }

            .about-field {
                order: 2;
                height: 54vh;
                min-height: 320px;
            }

            .shape.s1 { width: 54%; }
            .shape.s2 { width: 22%; height: 68%; }
            .shape.s3 { width: 45%; }
            .shape.s4 { width: 32%; height: 30%; }
            .shape.s5 { width: 40%; height: 20%; }
            .shape.s6 { width: 20%; height: 42%; }
        }
    </style>
</head>
<body class="about-vector">
    <main class="about-shell">
        <header class="identity" style="position: fixed; top: 1.18rem; left: 1.08rem; z-index: 150;">
            <h1>
                <a href="index.html" style="font-size: 2.85rem; line-height: 1;">←</a>
            </h1>
        </header>

        <section class="about-index" aria-label="About index">
            <div class="about-line">
                <span class="about-key">HOME</span>
                <span class="about-value">ARTEGNA / MERTHYR TYDFIL / SAN FRANCISCO</span>
            </div>
            <div class="about-line">
                <span class="about-key">DISCIPLINE</span>
                <span class="about-value">CHESS / SYSTEMS / DECISION-MAKING</span>
            </div>
            <div class="about-line">
                <span class="about-key">LEARNING</span>
                <span class="about-value">KOREAN / CHESS / FRONTIER TECH</span>
            </div>
            <div class="about-line">
                <span class="about-key">AESTHETIC</span>
                <span class="about-value">DESIGN / ART / TYPOGRAPHY</span>
            </div>
            <div class="about-line">
                <span class="about-key">PHILOSOPHY</span>
                <span class="about-value">FORM / LOGIC / MEANING</span>
            </div>
            <div class="about-line">
                <span class="about-key">FOOTBALL</span>
                <span class="about-value">INTER MILAN</span>
            </div>
            <div class="about-formula">F(x,y)=(-y,x)+0.35(sin(2y),cos(2x))</div>
        </section>

        <section class="about-field" aria-hidden="true">
            <div class="shape shape-circle s1" data-x="-0.55" data-y="-0.22" data-offset="5"></div>
            <div class="shape shape-capsule s2" data-x="0.18" data-y="-0.05" data-offset="-4"></div>
            <div class="shape shape-circle s3" data-x="-0.12" data-y="0.56" data-offset="8"></div>
            <div class="shape shape-rect s4" data-x="0.52" data-y="0.54" data-offset="-6"></div>
            <div class="shape shape-rect s5" data-x="0.36" data-y="-0.52" data-offset="12"></div>
            <div class="shape shape-thin s6" data-x="-0.73" data-y="0.38" data-offset="-9"></div>
        </section>
    </main>

    <script>
        const field = document.querySelector('.about-field');
        const shapes = field ? field.querySelectorAll('.shape') : [];

        function vector(x, y) {
            return {
                vx: (-y) + 0.35 * Math.sin(2 * y),
                vy: x + 0.35 * Math.cos(2 * x)
            };
        }

        function positionShapes() {
            if (!field || shapes.length === 0) {
                return;
            }

            shapes.forEach((shape) => {
                const x = Number(shape.dataset.x || 0);
                const y = Number(shape.dataset.y || 0);
                const offset = Number(shape.dataset.offset || 0);
                const { vx, vy } = vector(x, y);

                const angle = (Math.atan2(vy, vx) * 180 / Math.PI) + offset;
                const magnitude = Math.min(1.95, Math.hypot(vx, vy));
                const scale = 0.86 + (magnitude * 0.19);
                const left = ((x + 1) * 50);
                const top = ((y + 1) * 50);

                shape.style.left = left + '%';
                shape.style.top = top + '%';
                shape.style.transform = `translate(-50%, -50%) rotate(${angle}deg) scale(${scale})`;
            });
        }

        window.addEventListener('resize', positionShapes, { passive: true });
        positionShapes();
    </script>
</body>
</html>
