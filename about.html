<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="style.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');

        .about-shell {
            min-height: 100vh;
            width: 100%;
            padding: 5.5rem 1rem 1.2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .about-meta-panel {
            border: 1px solid rgba(26, 26, 26, 0.28);
            background: rgba(255, 255, 255, 0.55);
            padding: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.72rem;
        }

        .meta-stamp {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 0.66rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #0033CC;
            border: 1px solid #0033CC;
            width: fit-content;
            padding: 0.22rem 0.4rem;
            margin-bottom: 0.12rem;
            background: rgba(255, 255, 255, 0.72);
        }

        .meta-list {
            list-style: none;
            display: grid;
            gap: 0.48rem;
        }

        .meta-row {
            display: grid;
            grid-template-columns: 106px 1fr;
            gap: 0.52rem;
            align-items: baseline;
            border-bottom: 1px solid rgba(26, 26, 26, 0.2);
            padding-bottom: 0.36rem;
        }

        .meta-key {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 0.67rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #0033CC;
            white-space: nowrap;
        }

        .meta-value {
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: clamp(0.74rem, 1.7vw, 0.9rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.25;
        }

        .meta-status {
            margin-top: 0.2rem;
            font-family: "IBM Plex Mono", "SFMono-Regular", Menlo, monospace;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #FF4F00;
        }

        .about-visual-cluster {
            position: relative;
            min-height: clamp(300px, 52vw, 460px);
            border: 1px solid rgba(26, 26, 26, 0.18);
            background: rgba(255, 255, 255, 0.36);
            overflow: hidden;
        }

        .piece {
            position: absolute;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(9px 10px 0 rgba(0, 0, 0, 0.14));
            transition: transform 0.22s ease-out;
            user-select: none;
            pointer-events: none;
            will-change: transform;
        }

        .piece-king {
            width: min(58%, 420px);
            max-height: 86%;
            left: 22%;
            top: 9%;
            z-index: 30;
        }

        .piece-knight {
            width: min(44%, 310px);
            right: 3%;
            top: 3%;
            transform: rotate(8deg);
            z-index: 20;
        }

        .piece-rook {
            width: min(41%, 280px);
            left: 3%;
            bottom: 2%;
            transform: rotate(-7deg);
            z-index: 18;
        }

        .piece-ghost {
            width: min(38%, 250px);
            right: 18%;
            bottom: -4%;
            transform: scaleX(-1) rotate(12deg);
            opacity: 0.22;
            z-index: 10;
        }

        @media screen and (min-width: 900px) {
            .about-shell {
                height: 100vh;
                overflow: hidden;
                grid-template-columns: 48% 52%;
                align-items: center;
                gap: clamp(0.8rem, 1.25vw, 1.2rem);
                padding: 5.1rem 1.6rem 1.15rem;
            }

            .about-meta-panel {
                align-self: stretch;
                justify-content: center;
                padding: clamp(0.9rem, 1.15vw, 1.2rem);
            }

            .meta-list {
                gap: clamp(0.38rem, 0.7vw, 0.54rem);
            }

            .meta-row {
                grid-template-columns: clamp(92px, 9.6vw, 128px) 1fr;
                padding-bottom: clamp(0.24rem, 0.45vw, 0.34rem);
            }

            .meta-key {
                font-size: clamp(0.62rem, 0.72vw, 0.76rem);
            }

            .meta-value {
                font-size: clamp(0.74rem, 0.9vw, 0.92rem);
                line-height: 1.22;
            }

            .meta-status {
                font-size: clamp(0.6rem, 0.7vw, 0.72rem);
            }

            .about-visual-cluster {
                min-height: 0;
                height: min(770px, calc(100vh - 7rem));
            }
        }

        @media screen and (max-width: 899px) {
            .meta-row {
                grid-template-columns: 88px 1fr;
                gap: 0.45rem;
            }

            .meta-key {
                font-size: 0.62rem;
            }

            .meta-value {
                font-size: 0.78rem;
                line-height: 1.24;
            }

            .about-visual-cluster {
                min-height: 320px;
                height: 56vh;
            }
        }
    </style>
</head>
<body>
    <main class="about-shell">
        <header class="identity" style="position: fixed; top: 1.25rem; left: 1.15rem; z-index: 130;">
            <h1>
                <a href="index.html" style="font-size: 2.95rem; line-height: 1;">←</a>
            </h1>
        </header>

        <section class="about-meta-panel" aria-label="About metadata">
            <div class="meta-stamp">Profile Metadata // 2026</div>
            <ul class="meta-list">
                <li class="meta-row">
                    <span class="meta-key">HOME</span>
                    <span class="meta-value">ARTEGNA / MERTHYR TYDFIL / SAN FRANCISCO</span>
                </li>
                <li class="meta-row">
                    <span class="meta-key">DISCIPLINE</span>
                    <span class="meta-value">CHESS / SYSTEMS / DECISION-MAKING</span>
                </li>
                <li class="meta-row">
                    <span class="meta-key">LEARNING</span>
                    <span class="meta-value">KOREAN / FRONTIER TECH</span>
                </li>
                <li class="meta-row">
                    <span class="meta-key">AESTHETIC</span>
                    <span class="meta-value">DESIGN / ART / TYPOGRAPHY</span>
                </li>
                <li class="meta-row">
                    <span class="meta-key">PHILOSOPHY</span>
                    <span class="meta-value">FORM / LOGIC / MEANING</span>
                </li>
                <li class="meta-row">
                    <span class="meta-key">FOOTBALL</span>
                    <span class="meta-value">INTER MILAN</span>
                </li>
            </ul>
            <div class="meta-status">STATUS: BUILDING DAILY</div>
        </section>

        <section class="about-visual-cluster" aria-label="Chess-inspired visual composition">
            <img class="piece piece-king" src="assets/images/about/chess-king.svg" alt="Abstract king chess piece">
            <img class="piece piece-knight" src="assets/images/about/chess-knight.svg" alt="Abstract knight chess piece">
            <img class="piece piece-rook" src="assets/images/about/chess-rook.svg" alt="Abstract rook chess piece">
            <img class="piece piece-ghost" src="assets/images/about/chess-knight.svg" alt="Decorative mirrored knight">
        </section>
    </main>

    <script>
        const cluster = document.querySelector('.about-visual-cluster');
        const pieces = cluster ? cluster.querySelectorAll('.piece') : [];
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        function shouldAnimate() {
            return window.innerWidth >= 900 && !reduceMotion.matches;
        }

        document.addEventListener('mousemove', (event) => {
            if (!cluster || pieces.length === 0 || !shouldAnimate()) {
                return;
            }

            const bounds = cluster.getBoundingClientRect();
            const nx = ((event.clientX - bounds.left) / bounds.width - 0.5);
            const ny = ((event.clientY - bounds.top) / bounds.height - 0.5);

            pieces.forEach((piece, index) => {
                const depth = [9, 7, 6, 4][index] || 5;
                const tx = Math.max(-1, Math.min(1, nx)) * depth;
                const ty = Math.max(-1, Math.min(1, ny)) * depth;
                const base = piece.classList.contains('piece-knight')
                    ? ' rotate(8deg)'
                    : piece.classList.contains('piece-rook')
                        ? ' rotate(-7deg)'
                        : piece.classList.contains('piece-ghost')
                            ? ' scaleX(-1) rotate(12deg)'
                            : '';
                piece.style.transform = `translate(${tx}px, ${ty}px)${base}`;
            });
        }, { passive: true });
    </script>
</body>
</html>
